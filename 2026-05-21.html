function nav(h){history.pushState(null,'',h||'#');render(h);window.scrollTo(0,0);}
window.addEventListener('hashchange',()=>render(location.hash));
window.addEventListener('load',()=>render(location.hash));
function render(h){
  const app=document.getElementById('app');
  if(!h||h==='#'||h==='#macro')renderMacro(app);
  else if(h.startsWith('#sector/'))renderSector(app,h.slice(8));
  else if(h.startsWith('#ticker/'))renderTicker(app,h.slice(8).toUpperCase());
  else renderMacro(app);
}
function imp(n){return`<span class="badge imp-${n}">Impact ${n}</span>`;}
function sig(s){return s?`<span class="badge sig-${s}">${s}</span>`:''}
function seclink(slug,name){return`<a class="badge b-muted" href="#sector/${slug}" onclick="nav('#sector/${slug}');return false;">${name}</a>`;}
function tlink(sym){return`<a href="#ticker/${sym}" onclick="nav('#ticker/${sym}');return false;">${sym}</a>`;}
function scCol(v){if(v>=8)return'var(--green)';if(v>=6)return'var(--blue)';if(v>=4)return'var(--yellow)';return'var(--red)';}
function scLbl(v){if(v>=9)return'Unrivaled';if(v>=7.5)return'Strong';if(v>=6)return'Moderate';return'Developing';}
function cardCls(sym){const t=KB.tickers[sym];if(!t)return'';if(t.in_portfolio)return'c-portfolio';if(t.in_rockets)return'c-rocket';if(t.in_compounders)return'c-compounder';return'';}
function healthDot(slug){const items=KB.digest.items.filter(i=>i.sector_slug===slug);if(!items.length)return'hg';const mx=Math.max(...items.map(i=>i.impact));if(mx>=5)return'hr';if(mx>=3)return'ha';return'hg';}
function velBadge(v){if(v==='up active')return'b-purple';if(v==='steady')return'b-muted';return'b-muted';}
function velLabel(v){if(v==='up active')return'↑ active';if(v==='steady')return'→ steady';return'↓ quiet';}

function renderMacro(app){
  const ptickers=Object.values(KB.tickers).filter(t=>t&&t.in_portfolio);
  let h='';
  h+=`<div class="pulse"><div><div class="pulse-regime">🟢 ${KB.meta.regime_label}</div></div><div class="pulse-meta">${KB.meta.backdrop}</div><div class="flex-r"><span class="badge b-green">VIX ${KB.meta.vix}</span><span class="badge b-muted">S&amp;P ${KB.meta.market_level}</span></div></div>`;
  h+=`<div class="sh">🔥 Hot Signals — Last 7 Days</div><div class="hot-strip">`;
  KB.sentiment.hot_tickers.forEach(t=>{h+=`<span class="hot-chip" onclick="nav('#ticker/${t.symbol}')">${t.symbol}<span class="hot-cnt">${t.mentions} signals</span></span>`;});
  h+=`</div>`;
  h+=`<div class="sh">📋 Portfolio — Core Holdings</div><div class="pstrip">`;
  ptickers.forEach(t=>{const r=t.recommendation;h+=`<div class="pc" onclick="nav('#ticker/${t.symbol}')"><div class="pc-header"><span class="pc-sym">${t.symbol}</span>${r?sig(r.signal):''}</div><div class="pc-thesis">${t.one_line_thesis}</div></div>`;});
  h+=`</div>`;
  h+=`<div class="sh">📰 Today's Digest — ${KB.digest.date}</div><div>`;
  KB.digest.items.slice(0,12).forEach(item=>{
    h+=`<div class="di"><div class="di-left">${imp(item.impact)}<a class="badge b-muted" href="#ticker/${item.ticker}" onclick="nav('#ticker/${item.ticker}');return false;">${item.ticker}</a></div><div><div class="di-head">${item.headline}</div><div class="di-sum">${item.summary}</div><div class="mt8">${seclink(item.sector_slug,item.sector)}</div></div></div>`;
  });
  h+=`</div><div class="sh">🗺 Sectors</div><div class="g3">`;
  KB.sectors.forEach(sec=>{
    const dot=healthDot(sec.slug);
    const top=KB.digest.items.find(i=>i.sector_slug===sec.slug);
    h+=`<div class="card" onclick="nav('#sector/${sec.slug}')"><div class="sec-name">${sec.name}</div><div class="sec-meta"><span class="hdot ${dot}"></span><span class="tsm tm">${sec.tickers.length} tickers</span></div><div class="sec-desc">${sec.description}</div>${top?`<div class="sec-news">↳ ${top.headline}</div>`:''}</div>`;
  });
  h+=`</div>`;
  app.innerHTML=h;
}

function renderSector(app,slug){
  const sec=KB.sectors.find(s=>s.slug===slug);
  if(!sec){app.innerHTML=`<p class="empty">Sector not found.</p>`;return;}
  const news=KB.digest.items.filter(i=>i.sector_slug===slug);
  let h=`<div class="bc"><a href="#" onclick="nav('#');return false;">Macro</a><span class="bc-sep">›</span><span class="current">${sec.name}</span></div>`;
  h+=`<h1 style="font-size:22px;font-weight:700;margin-bottom:6px;">${sec.name}</h1>`;
  h+=`<p class="tsm tm" style="margin-bottom:4px;">${sec.description}</p>`;
  if(sec.value_chain)h+=`<p class="tsm" style="color:var(--amber);margin-bottom:16px;">Value chain: ${sec.value_chain}</p>`;
  if(news.length){
    h+=`<div class="sh">📰 Developing News</div><div>`;
    news.forEach(item=>{h+=`<div class="di"><div class="di-left">${imp(item.impact)}</div><div><div class="flex-r" style="margin-bottom:4px;"><a class="badge b-muted" href="#ticker/${item.ticker}" onclick="nav('#ticker/${item.ticker}');return false;">${item.ticker}</a></div><div class="di-head">${item.headline}</div><div class="di-sum">${item.summary}</div></div></div>`;});
    h+=`</div>`;
  }
  h+=`<div class="sh">Tickers in ${sec.name}</div><div class="g3">`;
  sec.tickers.forEach(sym=>{
    const t=KB.tickers[sym];
    if(!t){h+=`<div class="card" style="opacity:.5;">${sym}<br><span class="tsm tm">No data</span></div>`;return;}
    const sent=KB.sentiment.by_ticker[sym]||{mentions:0,velocity:'quiet'};
    h+=`<div class="card ${cardCls(sym)}" onclick="nav('#ticker/${sym}')"><div class="tc-meta"><span class="tc-sym">${sym}</span>${t.recommendation?sig(t.recommendation.signal):''}${t.scoring?`<span class="badge" style="background:${scCol(t.scoring.composite)}22;color:${scCol(t.scoring.composite)};border:1px solid ${scCol(t.scoring.composite)}44;">${t.scoring.composite}/10</span>`:''}${sent.velocity==='up active'?`<span class="badge b-purple">${sent.mentions}↑</span>`:''}</div><div class="tc-name">${t.name}</div><div class="tc-thesis">${t.one_line_thesis}</div></div>`;
  });
  h+=`</div>`;
  app.innerHTML=h;
}

function renderTicker(app,sym){
  const t=KB.tickers[sym];
  if(!t){app.innerHTML=`<div class="bc"><a href="#" onclick="nav('#');return false;">Macro</a><span class="bc-sep">›</span><span class="current">${sym}</span></div><p class="empty">No wiki page found for ${sym}. Run /add-ticker ${sym} to onboard.</p>`;return;}
  const sec=KB.sectors.find(s=>s.slug===t.sector_slug);
  const sent=KB.sentiment.by_ticker[sym]||{mentions:0,velocity:'quiet'};
  let h=`<div class="bc"><a href="#" onclick="nav('#');return false;">Macro</a><span class="bc-sep">›</span>${sec?`<a href="#sector/${t.sector_slug}" onclick="nav('#sector/${t.sector_slug}');return false;">${t.sector}</a><span class="bc-sep">›</span>`:''}<span class="current">${sym}</span></div>`;
  let lb='';
  if(t.in_portfolio)lb='<span class="badge b-amber">Core Holding</span>';
  else if(t.in_rockets)lb='<span class="badge b-orange">Rocket</span>';
  else if(t.in_compounders)lb='<span class="badge b-blue">Compounder</span>';
  h+=`<div class="th-hdr"><div class="th-sym">${sym}</div><div class="th-name">${t.name}</div><div class="th-badges">${sec?seclink(t.sector_slug,t.sector):''}${lb}${t.recommendation?`${sig(t.recommendation.signal)}<span class="badge b-muted">${t.recommendation.confidence} confidence</span>`:''}</div></div>`;
  if(t.recommendation)h+=`<div class="rat">${t.recommendation.rationale}</div>`;
  h+=`<div class="panel"><div class="ptitle">Thesis</div><p style="font-style:italic;margin-bottom:10px;">${t.one_line_thesis}</p>${t.investment_thesis?`<details><summary>Full thesis ▸</summary><p class="tsm" style="margin-top:8px;line-height:1.6;">${t.investment_thesis}</p></details>`:''} ${t.drift_status?`<p class="tsm tm" style="margin-top:8px;">Drift: <span style="color:var(--text)">${t.drift_status}</span></p>`:''} ${t.last_validated?`<p class="tsm tm">Last validated: ${t.last_validated}</p>`:''}</div>`;
  if(t.management&&t.management.length){
    h+=`<div class="panel"><div class="ptitle">Management</div><table class="dt"><thead><tr><th>Role</th><th>Name</th><th>Notes</th></tr></thead><tbody>`;
    t.management.forEach(m=>{h+=`<tr><td>${m.role}</td><td style="font-weight:600;">${m.name}</td><td class="tm tsm">${m.note}</td></tr>`;});
    h+=`</tbody></table></div>`;
  }
  h+=`<div class="panel"><div class="ptitle">Scoring</div>`;
  if(t.scoring){
    const sc=t.scoring;h+=`<div style="font-size:20px;font-weight:700;color:${scCol(sc.composite)};margin-bottom:12px;">${sc.composite}<span style="font-size:14px;color:var(--muted)">/10 · ${scLbl(sc.composite)}</span></div>`;
    if(sc.criteria){
      h+=`<div class="sg">`;
      [['moat','Moat'],['management','Management'],['growth','Growth'],['balance_sheet','Balance Sheet'],['valuation','Valuation'],['momentum','Momentum']].forEach(([k,label])=>{const v=sc.criteria[k]||0;h+=`<div><div class="si-label">${label}</div><div class="si-bg"><div class="si-fill" style="width:${v*10}%;background:${scCol(v)};"></div></div><div class="si-val" style="color:${scCol(v)}">${v}/10</div></div>`;});
      h+=`</div>`;
    }
  }else{h+=`<p class="empty">Scoring not yet run — use /score-ticker ${sym} to populate.</p>`;}
  h+=`</div>`;
  if(t.catalysts&&t.catalysts.length){
    h+=`<div class="panel"><div class="ptitle">Catalyst Timeline</div>`;
    t.catalysts.forEach(c=>{h+=`<div class="cat-item"><input type="checkbox"${c.checked?' checked':''} disabled><span class="${c.checked?'cat-done':''}">${c.text}</span></div>`;});
    h+=`</div>`;
  }
  h+=`<div class="panel"><div class="ptitle">Earnings &amp; Financials</div>`;
  if(t.earnings&&t.earnings.period&&t.earnings.period!=='--'){h+=`<table class="dt"><thead><tr><th>Period</th><th>Revenue</th><th>EPS</th><th>Guidance</th></tr></thead><tbody><tr><td>${t.earnings.period}</td><td style="font-weight:600;">${t.earnings.revenue||'--'}</td><td>${t.earnings.eps||'--'}</td><td>${t.earnings.guidance||'--'}</td></tr></tbody></table>`;}
  else{h+=`<p class="empty">No earnings data logged yet.</p>`;}
  h+=`</div>`;
  if(t.news&&t.news.length){
    h+=`<div class="panel"><div class="ptitle">News &amp; Alpha Log</div>`;
    t.news.slice(0,5).forEach(n=>{h+=`<div class="ne"><div class="ne-row"><span class="ne-dt">${n.date}</span>${n.impact?imp(n.impact):''}</div><div class="ne-head">${n.headline}</div><div class="ne-det">${n.detail||''}</div></div>`;});
    h+=`</div>`;
  }
  if(t.conviction_log&&t.conviction_log.length){
    h+=`<div class="panel"><div class="ptitle">Conviction Log</div>`;
    t.conviction_log.slice(0,3).forEach(c=>{const cls=c.direction==='up'?'conv-up':c.direction==='down'?'conv-dn':'conv-neu';const arrow=c.direction==='up'?'↑':c.direction==='down'?'↓':'→';h+=`<div class="conv-e"><span class="${cls}">${arrow}</span><div><div class="conv-dt">${c.date}</div><div class="conv-txt" style="font-weight:600;">${c.event}</div><div class="conv-txt tm">${c.why}</div></div></div>`;});
    h+=`</div>`;
  }
  h+=`<div class="panel"><div class="ptitle">Social Sentiment</div><div class="flex-r"><span class="badge ${velBadge(sent.velocity)}">${velLabel(sent.velocity)}</span>${sent.mentions?`<span class="tsm tm">${sent.mentions} signals tracked</span>`:'<span class="tsm tm">No signals tracked</span>'}</div></div>`;
  h+=renderEco(sym,t);
  app.innerHTML=h;
}

function renderEco(sym,t){
  const eco=KB.ecosystem_graph.ecosystems[sym];
  let h=`<div class="panel"><div class="ptitle">Ecosystem — Supply Chain Relationships</div>`;
  const reg=new Set(Object.keys(KB.tickers).filter(k=>KB.tickers[k]));
  if(eco){
    h+=`<p class="tsm tm" style="margin-bottom:12px;">Source: Ecosystem Map · ${Object.keys(eco.tiers).length} tiers · Blue border = in KB (clickable)</p>`;
    h+=`<div style="display:flex;justify-content:center;margin-bottom:16px;"><div class="eco-chip anchor" style="align-items:center;padding:10px 20px;"><span class="chip-sym" style="font-size:16px;">● ${sym}</span><span class="chip-rel">Anchor Position</span></div></div>`;
    Object.keys(eco.tiers).sort().forEach(n=>{
      const lbl=eco.tier_labels[n]||`Tier ${n}`;
      h+=`<div class="eco-tier"><div class="eco-tlabel">Tier ${n} — ${lbl}</div><div class="eco-chips">`;
      eco.tiers[n].forEach(node=>{
        const ink=reg.has(node.ticker);
        const cl=ink?'inkb':'notkb';
        const click=ink?`onclick="nav('#ticker/${node.ticker}')" style="cursor:pointer"`:''
        h+=`<div class="eco-chip ${cl}" ${click} title="${node.company}: ${node.relationship}${node.notes?' · '+node.notes:''}"><span class="chip-sym">${node.ticker}</span><span class="chip-rel">${node.relationship.length>22?node.relationship.slice(0,20)+'…':node.relationship}</span></div>`;
      });
      h+=`</div></div>`;
    });
  }else{
    const edges=KB.ecosystem_graph.edges;
    const up=edges.filter(e=>e.target===sym);
    const dn=edges.filter(e=>e.source===sym);
    if(!up.length&&!dn.length){h+=`<p class="empty">No ecosystem relationships mapped yet. Cross-ticker signals will appear here as they are logged.</p>`;}
    else{
      h+=`<p class="tsm tm" style="margin-bottom:12px;">Source: Cross-ticker signal edges</p>`;
      h+=`<div class="zone-center"><div class="zc-sym">${sym}</div><div class="zc-lbl">${t.name}</div></div>`;
      if(up.length){
        h+=`<div class="eco-tier"><div class="eco-tlabel">⬆ Upstream — Signals received from</div><div class="eco-chips">`;
        up.forEach(e=>{const ink=reg.has(e.source);const cl=ink?'inkb':'notkb';const click=ink?`onclick="nav('#ticker/${e.source}')" style="cursor:pointer"`:'';h+=`<div class="eco-chip ${cl}" ${click} title="${e.implication}"><span class="chip-sym">${e.source}</span><span class="chip-rel">${e.type==='ecosystem_map'?'supply chain':'signal'}</span></div>`;});
        h+=`</div></div>`;
      }
      if(dn.length){
        h+=`<div class="eco-tier"><div class="eco-tlabel">⬇ Downstream — Signals emitted to</div><div class="eco-chips">`;
        dn.forEach(e=>{const ink=reg.has(e.target);const cl=ink?'inkb':'notkb';const click=ink?`onclick="nav('#ticker/${e.target}')" style="cursor:pointer"`:'';h+=`<div class="eco-chip ${cl}" ${click} title="${e.implication}"><span class="chip-sym">${e.target}</span><span class="chip-rel">${e.type==='ecosystem_map'?'supply chain':'signal'}</span></div>`;});
        h+=`</div></div>`;
      }
    }
  }
  h+=`</div>`;
  return h;
}
</script>
</body>
</html>
