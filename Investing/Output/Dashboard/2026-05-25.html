<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecosystem Map · 2026-05-25</title>
<style>
:root {
  --bg:#ffffff;--bg2:#f6f8fa;--bg3:#eaeef2;
  --text:#1f2328;--muted:#57606a;--border:#d0d7de;
  --amber:#9a6700;--green:#1a7f37;--blue:#0969da;
  --red:#cf222e;--orange:#bc4c00;--purple:#8250df;--pink:#e4525b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;color:var(--text);background:var(--bg)}

/* Header */
#hdr{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:20;min-height:48px}
.site-title{font-weight:700;font-size:11px;letter-spacing:.07em;color:var(--muted);white-space:nowrap}
.filters{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.filter-btn{padding:4px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text);cursor:pointer;font-size:12px;transition:all .15s}
.filter-btn:hover{border-color:var(--muted)}
.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
#reset-btn{padding:4px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg);color:var(--muted);cursor:pointer;font-size:12px}
#reset-btn:hover{color:var(--red);border-color:var(--red)}

/* Layout */
#layout{display:flex;height:calc(100vh - 48px);overflow:hidden}
#stack-panel{width:45%;min-width:300px;position:relative;overflow-y:auto;border-right:1px solid var(--border);padding:14px}
#edge-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#detail-panel{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}

/* Dimension rows */
.dim-row{margin-bottom:14px}
.dim-label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;padding-left:2px}
.d1{color:var(--purple)}.d2{color:var(--blue)}.d3{color:var(--green)}.d4{color:var(--amber)}.d5{color:var(--pink)}
.dim-sectors{display:flex;flex-wrap:wrap;gap:8px}

/* Sector cards */
.sector-card{padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);cursor:pointer;flex:1;min-width:130px;transition:opacity .2s,box-shadow .2s,border-color .2s}
.sector-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);border-color:var(--muted)}
.sector-card.selected{border-left:3px solid var(--amber);background:var(--bg3)}
.sector-card.upstream{box-shadow:0 0 0 2px var(--green)}
.sector-card.downstream{box-shadow:0 0 0 2px var(--blue)}
.sector-card.dimmed{opacity:.2}
.card-name{font-weight:600;font-size:13px;margin-bottom:4px}
.card-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.dim-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px}
.dim-d1{background:#fbefff;color:var(--purple)}.dim-d2{background:#ddf4ff;color:var(--blue)}
.dim-d3{background:#dafbe1;color:var(--green)}.dim-d4{background:#fff8c5;color:var(--amber)}
.dim-d5{background:#ffebef;color:var(--pink)}
.choke-count{font-size:11px;font-weight:700;color:var(--amber)}
.edge-count{font-size:11px;color:var(--muted)}

/* Detail panel */
.detail-empty{color:var(--muted);font-size:13px;padding:40px 20px;text-align:center;border:1px dashed var(--border);border-radius:8px;margin-top:16px}
.detail-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:16px}
.detail-header h2{font-size:18px;font-weight:700}
.close-drawer{display:none;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:var(--bg3);color:var(--muted);font-size:14px;cursor:pointer;flex-shrink:0;border:none}
.detail-section{margin-bottom:20px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:8px}

/* Tier table */
.tier-table{width:100%;border-collapse:collapse;font-size:12px}
.tier-table th{text-align:left;padding:5px 8px;border-bottom:2px solid var(--border);font-size:11px;color:var(--muted);font-weight:600}
.tier-table td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.tier-name{font-weight:500}
.choke-y{background:var(--amber);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;white-space:nowrap}
.choke-partial{background:#fff3c4;color:var(--amber);font-size:10px;padding:1px 5px;border-radius:3px;white-space:nowrap}
.choke-no{background:var(--bg3);color:var(--muted);font-size:10px;padding:1px 5px;border-radius:3px;white-space:nowrap}

/* Edge cards */
.edge-list{display:flex;flex-direction:column;gap:6px}
.edge-card{display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:12px}
.flow-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px}
.flow-Material{background:#fff1e6;color:var(--orange)}
.flow-Component{background:#ddf4ff;color:var(--blue)}
.flow-Service{background:#dafbe1;color:var(--green)}
.flow-Signal{background:#fbefff;color:var(--purple)}
.edge-sector-chip{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1px 7px;cursor:pointer;font-size:11px;font-weight:600}
.edge-sector-chip:hover{background:var(--border)}
.edge-product{color:var(--muted);font-size:11px;flex:1}
.muted{color:var(--muted);font-size:12px}

/* Mobile */
@media(max-width:768px){
  #hdr{height:auto;flex-direction:column;align-items:flex-start;padding:8px 12px;gap:6px}
  .filters{overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;width:100%;padding-bottom:4px}
  .filter-btn,#reset-btn{flex-shrink:0;scroll-snap-align:start;min-height:40px;padding:0 14px;font-size:13px;border-radius:20px}
  #layout{flex-direction:column;height:auto;overflow:visible}
  #stack-panel{width:100%;border-right:none;padding:12px;overflow-y:visible}
  #edge-svg{display:none}
  .dim-sectors{flex-direction:column;gap:0}
  .sector-card{margin-bottom:8px;min-width:unset;flex:1 1 auto}
  #detail-panel{position:fixed;bottom:0;left:0;right:0;height:55vh;background:var(--bg);border-top:2px solid var(--border);border-radius:16px 16px 0 0;overflow-y:auto;padding:0 16px 24px;transform:translateY(100%);transition:transform .3s ease;z-index:50;box-shadow:0 -4px 24px rgba(0,0,0,.08)}
  #detail-panel.open{transform:translateY(0)}
  #detail-panel::before{content:'';display:block;width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 14px}
  .close-drawer{display:flex}
  body.drawer-open{overflow:hidden}
}
@media(min-width:769px){.close-drawer{display:none}}
</style>
</head>
<body>
<header id="hdr">
  <span class="site-title">ECOSYSTEM MAP · 2026-05-25</span>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All flows</button>
    <button class="filter-btn" data-filter="Material">Material</button>
    <button class="filter-btn" data-filter="Component">Component</button>
    <button class="filter-btn" data-filter="Service">Service</button>
    <button id="reset-btn">Reset</button>
  </div>
</header>

<div id="layout">
  <div id="stack-panel">
    <svg id="edge-svg"><defs>
      <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#0969da"/></marker>
      <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#1a7f37"/></marker>
    </defs></svg>
    <div id="stack"></div>
  </div>
  <div id="detail-panel">
    <div class="detail-empty">Select a sector to explore its supply chain tiers and chokepoint edges.</div>
  </div>
</div>

  edges: [
    {from:"Materials & Mining",from_tier:"Silicon Refining",to:"Semiconductors",to_tier:"Wafer Production",flow:"Material",product:"Polysilicon → silicon wafer",chokepoint:"Y"},
    {from:"Materials & Mining",from_tier:"Rare Earth Separation",to:"Semiconductors",to_tier:"Power Devices",flow:"Material",product:"SiC precursor → SiC substrate",chokepoint:"Y"},
    {from:"Photonics & Optical",from_tier:"Laser Sources",to:"Semiconductors",to_tier:"Lithography Equipment",flow:"Component",product:"EUV light source → ASML scanner",chokepoint:"Y"},
    {from:"Electronic Components",from_tier:"IC Substrate Mfg",to:"Semiconductors",to_tier:"Packaging (OSAT)",flow:"Material",product:"ABF substrate → flip-chip BGA package",chokepoint:"Y"},
    {from:"Semiconductors",from_tier:"Power Devices",to:"Energy & Power",to_tier:"Power Conversion",flow:"Component",product:"SiC MOSFET → inverter / HVDC rectifier",chokepoint:"Y"},
    {from:"Semiconductors",from_tier:"Design (Compute)",to:"Compute Infrastructure",to_tier:"Server Assembly",flow:"Component",product:"GPU / CPU / ASIC → compute node",chokepoint:"Y"},
    {from:"Semiconductors",from_tier:"Design (Memory)",to:"Compute Infrastructure",to_tier:"Server Assembly",flow:"Component",product:"HBM3e stack → GPU memory subsystem",chokepoint:"Y"},
    {from:"Photonics & Optical",from_tier:"Transceiver Mfg",to:"Compute Infrastructure",to_tier:"Networking",flow:"Component",product:"400G / 800G transceiver → spine switch",chokepoint:"Y"},
    {from:"Energy & Power",from_tier:"Power Conversion",to:"Compute Infrastructure",to_tier:"Power Distribution",flow:"Service",product:"800VDC bus → server DC-DC stage",chokepoint:"Y"},
    {from:"Materials & Mining",from_tier:"Rare Earth Separation",to:"Energy & Power",to_tier:"Primary Generation",flow:"Material",product:"NdFeB magnet → wind turbine PMSG rotor",chokepoint:"Y"},
    {from:"Materials & Mining",from_tier:"Rare Earth Separation",to:"Robotics & Edge AI",to_tier:"Actuators & Motors",flow:"Material",product:"NdFeB magnet → servo motor rotor",chokepoint:"Y"},
    {from:"Semiconductors",from_tier:"Design (Edge AI)",to:"Robotics & Edge AI",to_tier:"Edge Compute Module",flow:"Component",product:"Jetson Orin / Hailo-8 NPU → edge inference",chokepoint:"Y"}

const DIM_LABELS = {D1:"D1 · AI Manufacturing Base",D2:"D2 · AI Connectivity",D3:"D3 · AI Infrastructure",D4:"D4 · AI Enablement",D5:"D5 · AI Applications"};
const DIM_ORDER = ["D1","D2","D3","D4","D5"];

function nameToSlug(n){ return n.toLowerCase().replace(/\s*&\s*/g,'-').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function chokeBadge(c){
  if(c==='Y') return '<span class="choke-y">⬥ Y</span>';
  if(c==='Partial') return '<span class="choke-partial">Partial</span>';
  return '<span class="choke-no">–</span>';
}

let currentSelected = null;
let activeFilter = 'all';

function buildStack(){
  const stack = document.getElementById('stack');
  stack.innerHTML = DIM_ORDER.map(dim=>{
    const sectors = DATA.sectors.filter(s=>s.dimension===dim);
    if(!sectors.length) return '';
    const cards = sectors.map(s=>{
      const outCount = DATA.edges.filter(e=>e.from===s.name).length;
      const totalEdges = DATA.edges.filter(e=>e.from===s.name||e.to===s.name).length;
      const chokeMeta = outCount>0?`<span class="choke-count">⬥${outCount}</span>`:'';
      const edgeMeta = totalEdges>0?`<span class="edge-count">${totalEdges} edges</span>`:'';
      return `<div class="sector-card" data-slug="${s.slug}" data-name="${esc(s.name)}">
        <div class="card-name">${esc(s.name)}</div>
        <div class="card-meta">
          <span class="dim-badge dim-${dim.toLowerCase()}">${dim}</span>
          ${chokeMeta}${edgeMeta}
        </div>
      </div>`;
    }).join('');
    const n = DIM_ORDER.indexOf(dim)+1;
    return `<div class="dim-row">
      <div class="dim-label d${n}">${DIM_LABELS[dim]}</div>
      <div class="dim-sectors">${cards}</div>
    </div>`;
  }).join('');

  document.querySelectorAll('.sector-card').forEach(card=>{
    card.addEventListener('click',()=>selectSector(card.dataset.slug));
  });
}

function selectSector(slug){
  currentSelected = slug;
  const sector = DATA.sectors.find(s=>s.slug===slug);
  if(!sector) return;

  document.querySelectorAll('.sector-card').forEach(card=>{
    const cName = card.dataset.name;
    const isSelected = card.dataset.slug===slug;
    const isUp = !isSelected && DATA.edges.some(e=>e.to===sector.name&&e.from===cName);
    const isDown = !isSelected && DATA.edges.some(e=>e.from===sector.name&&e.to===cName);
    card.classList.toggle('selected',isSelected);
    card.classList.toggle('upstream',isUp);
    card.classList.toggle('downstream',isDown);
    card.classList.toggle('dimmed',!isSelected&&!isUp&&!isDown);
  });

  drawEdges(slug, activeFilter);
  renderDetail(slug);

  if(window.innerWidth<=768){
    document.getElementById('detail-panel').classList.add('open');
    document.body.classList.add('drawer-open');
  }
}

function drawEdges(slug, filter){
  if(window.innerWidth<=768) return;
  const svg = document.getElementById('edge-svg');
  const defs = svg.querySelector('defs').outerHTML;
  svg.innerHTML = defs;

  const sector = DATA.sectors.find(s=>s.slug===slug);
  if(!sector) return;

  const panel = document.getElementById('stack-panel');
  const panelRect = panel.getBoundingClientRect();
  const scrollTop = panel.scrollTop;

  let edges = DATA.edges.filter(e=>e.from===sector.name||e.to===sector.name);
  if(filter!=='all') edges = edges.filter(e=>e.flow===filter);

  edges.forEach(edge=>{
    const srcCard = document.querySelector(`[data-slug="${nameToSlug(edge.from)}"]`);
    const tgtCard = document.querySelector(`[data-slug="${nameToSlug(edge.to)}"]`);
    if(!srcCard||!tgtCard) return;

    const sr = srcCard.getBoundingClientRect();
    const tr = tgtCard.getBoundingClientRect();
    const sx = sr.right - panelRect.left;
    const sy = (sr.top + sr.height/2) - panelRect.top + scrollTop;
    const tx = tr.left - panelRect.left;
    const ty = (tr.top + tr.height/2) - panelRect.top + scrollTop;
    const cx = sx + (tx-sx)*0.5;

    const isOut = edge.from===sector.name;
    const stroke = isOut ? '#0969da' : '#1a7f37';
    const marker = isOut ? 'arr-blue' : 'arr-green';

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${sx},${sy} C${cx},${sy} ${cx},${ty} ${tx},${ty}`);
    path.setAttribute('stroke',stroke);
    path.setAttribute('stroke-width','2');
    path.setAttribute('fill','none');
    path.setAttribute('marker-end',`url(#${marker})`);
    path.setAttribute('opacity','0.8');
    svg.appendChild(path);
  });
}

function renderDetail(slug){
  const sector = DATA.sectors.find(s=>s.slug===slug);
  const outbound = DATA.edges.filter(e=>e.from===sector.name);
  const inbound  = DATA.edges.filter(e=>e.to===sector.name);
  const applyFilter = arr => activeFilter==='all' ? arr : arr.filter(e=>e.flow===activeFilter);

  const tierRows = sector.tiers.map(t=>`<tr>
    <td class="tier-name">${esc(t.tier)}</td>
    <td>${chokeBadge(t.chokepoint)}</td>
  </tr>`).join('');

  const fOut = applyFilter(outbound);
  const fIn  = applyFilter(inbound);
  const outHtml = fOut.map(e=>edgeCard(e,'out')).join('')||'<p class="muted">None for this filter.</p>';
  const inHtml  = fIn.map(e=>edgeCard(e,'in')).join('')||'<p class="muted">None for this filter.</p>';

  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-header">
      <div style="display:flex;align-items:center;gap:8px;flex:1">
        <h2>${esc(sector.name)}</h2>
        <span class="dim-badge dim-${sector.dimension.toLowerCase()}">${sector.dimension}</span>
      </div>
      <button class="close-drawer" onclick="closeDrawer()">✕</button>
    </div>
    <div class="detail-section">
      <div class="section-title">Supply Chain Tiers (${sector.tiers.length})</div>
      <table class="tier-table">
        <thead><tr><th>Tier</th><th>Choke</th></tr></thead>
        <tbody>${tierRows}</tbody>
      </table>
    </div>
    <div class="detail-section">
      <div class="section-title">→ Outbound chokepoint flows (${fOut.length})</div>
      <div class="edge-list">${outHtml}</div>
    </div>
    <div class="detail-section">
      <div class="section-title">← Inbound chokepoint flows (${fIn.length})</div>
      <div class="edge-list">${inHtml}</div>
    </div>`;

  document.querySelectorAll('.edge-sector-chip').forEach(chip=>{
    chip.addEventListener('click',()=>selectSector(chip.dataset.slug));
  });
}

function edgeCard(edge, dir){
  const otherName = dir==='out' ? edge.to : edge.from;
  return `<div class="edge-card">
    <span class="flow-badge flow-${esc(edge.flow)}">${esc(edge.flow)}</span>
    <span class="edge-sector-chip" data-slug="${esc(nameToSlug(otherName))}">${esc(otherName)}</span>
    <span class="edge-product">${esc(edge.product)}</span>
  </div>`;
}

function closeDrawer(){
  document.getElementById('detail-panel').classList.remove('open');
  document.body.classList.remove('drawer-open');
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(currentSelected){ drawEdges(currentSelected,activeFilter); renderDetail(currentSelected); }
  });
});

document.getElementById('reset-btn').addEventListener('click',()=>{
  currentSelected = null; activeFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  document.querySelectorAll('.sector-card').forEach(c=>c.classList.remove('selected','upstream','downstream','dimmed'));
  const svg = document.getElementById('edge-svg');
  svg.innerHTML = svg.querySelector('defs').outerHTML;
  document.getElementById('detail-panel').innerHTML = '<div class="detail-empty">Select a sector to explore its supply chain tiers and chokepoint edges.</div>';
  closeDrawer();
});

let touchStartY = 0;
const dp = document.getElementById('detail-panel');
dp.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
dp.addEventListener('touchend',e=>{ if(e.changedTouches[0].clientY-touchStartY>60) closeDrawer(); },{passive:true});
window.addEventListener('resize',()=>{ if(currentSelected) drawEdges(currentSelected,activeFilter); });

buildStack();
</script>
</body>
</html>
