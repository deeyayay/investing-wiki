        { tier: "MLOps & Model Lifecycle Management", fn: "Manage the end-to-end model lifecycle — experiment tracking, versioning, CI/CD pipelines, feature stores, drift monitoring, and automated retraining — to operationalize AI models as reliable, continuously improving production services rather than one-off research artifacts. MLOps closes the gap between a model that performs well in offline evaluation and one that reliably delivers value in production: the same neural network achieving 95% accuracy on a held-out test set can degrade to 70% accuracy within weeks if the input distribution drifts and no monitoring catches the shift. Feature stores ensure training features are served consistently at inference time; model registries version and audit every model deployed; CI/CD pipelines automate the evaluation gate determining whether a new version should replace the incumbent; drift monitors alert teams when input or output distributions diverge from expectations. As organizations deploy dozens to hundreds of models simultaneously, the operational overhead of ad-hoc model management becomes untenable — creating structural demand for MLOps platforms that provide centralized governance, reproducibility, and observability across the entire model portfolio.", chokepoint: "N", capital_intensity: "Low–Medium", moat_type: "Switching cost + Ecosystem", margin_profile: "Medium", companies: [

      tiers: [
        { tier: "Perception Layer", fn: "Provides multi-modal sensing of the physical environment — capturing geometry (LiDAR, depth cameras), semantics (RGB cameras with object detection), and identity (radar, thermal) to give robots and autonomous systems the environmental awareness required for safe navigation and manipulation. The perception layer is the sensory interface between the digital AI stack and the physical world: without accurate, high-rate sensor data, downstream planning and control algorithms have nothing to reason about. LiDAR delivers precise 3D geometry at 10-20 Hz across 100m+ range; cameras provide dense semantic information at 30-120 Hz but require heavy neural network processing to extract depth and identity; radar provides reliable velocity and range estimation in adverse weather where cameras and LiDAR degrade. Modern perception architectures fuse all three modalities, training deep learning models to produce unified scene representations that downstream planners can act on. The sensor cost curve is critical: automotive-grade solid-state LiDAR has fallen from $75,000 (Velodyne HDL-64E, 2010) to under $500 (Ouster REV7, 2024), opening robotics, smart infrastructure, and industrial automation markets that were previously uneconomical.", chokepoint: "Partial", capital_intensity: "Medium", moat_type: "Process IP / Sensor design", margin_profile: "Medium–High", companies: [

        { tier: "Actuators & Motors", fn: "Converts electrical control commands into precise physical motion — the muscular layer of any robot, autonomous vehicle, or industrial automation system that translates AI planning decisions into real-world action. Actuators span a wide range: brushless DC motors with harmonic drives for humanoid robot joints (requiring high torque-to-weight ratio and precise position control); linear actuators for manufacturing robots; hydraulic actuators for heavy machinery; and micro-actuators for medical devices and precision instruments. The limiting factor for humanoid robotics specifically is joint actuator performance: human joints can generate 100+ Nm of torque at low weight, while matching this with electric actuators requires proprietary motor winding geometries, rare-earth permanent magnets (neodymium), and precision gear reduction — a supply chain that intersects directly with the Critical Minerals sector (Nd, Dy for NdFeB magnets). Soft robotics, pneumatic actuators, and electroactive polymer actuators represent alternative approaches that trade peak force for compliance and adaptability, relevant for human-robot interaction applications. No large-cap US pure-play public actuator company exists; the market is served by Maxon, Harmonic Drive, and diversified industrial conglomerates.", chokepoint: "N", capital_intensity: "Medium", moat_type: "Mechanical precision / Application-specific", margin_profile: "Medium", companies: [] },

        { tier: "Fleet Management & Operations Platform", fn: "Monitors, orchestrates, and continuously improves deployed robot fleets across multiple sites in real time — providing the cloud software layer that transforms individual robots from standalone machines into a networked, collectively-learning workforce. Fleet management covers remote monitoring (battery state, fault detection, uptime tracking), mission orchestration (dispatching robots to tasks based on priority and location), over-the-air model and software updates, and fleet-level analytics (throughput per robot, failure frequency by site, ROI vs. human labor). The investment moat at this tier is data network effects: a fleet management platform operating 10,000 robots accumulates a performance and failure dataset that improves routing algorithms, anomaly detection models, and predictive maintenance predictions in ways that a 100-robot competitor cannot match. Each new robot fleet enrolled makes the platform smarter for all other operators. As physical AI scales, fleet management becomes the primary monetization layer for robot-as-a-service (RaaS) business models: the robot itself may be sold at low margin, with recurring software and operations contracts delivering the lifetime value.", chokepoint: "N", capital_intensity: "Low", moat_type: "Data network effects / Switching cost", margin_profile: "High", companies: [] },
        { tier: "Autonomous Vehicles & ADAS", fn: "Productizes the full self-driving and driver-assistance stack for road vehicles — integrating multi-modal perception, crowdsourced HD map generation, motion planning, and safety policy enforcement into products delivered to automakers as both hardware modules (ADAS SoCs, sensor kits) and software-defined features (Over-the-Air Level 2+ upgrades). ADAS represents the highest-volume current application of physical AI: over 60M passenger vehicles shipped annually now include camera-based emergency braking, lane-keep assist, or adaptive cruise control, generating hundreds of billions of miles of training data per year. The moat in ADAS is the data flywheel: Mobileye has collected crowdsourced road data from 200M+ driving miles using its passive REM mapping system embedded in production vehicles, creating an HD map database competitors cannot replicate without the same installed base. Level 3-5 autonomous driving (eyes-off, hands-off at highway speeds or in geofenced areas) remains the large-prize category but is progressing more slowly than forecasts from 2018-2020 projected, with regulatory approval timelines in Western markets adding multi-year delays beyond technical readiness.", chokepoint: "Partial", capital_intensity: "Medium–High", moat_type: "Process IP + Data network effects + ASIL-D qualification", margin_profile: "Medium–High", companies: [

      {"label":"GPU Programming Layer (low-level kernels)","sector":"Software Infrastructure","slug":"software-infrastructure","tier":"GPU Programming Layer","chips":["NVDA","AMD"],"fn":"The low-level GPU programming environment that every ML framework and AI application runs on. NVIDIA's CUDA (Compute Unified Device Architecture) is the dominant layer: a C++ extension, compiler toolchain, and runtime that maps compute operations onto GPU streaming multiprocessors. Every major ML framework — PyTorch, JAX, TensorFlow — compiles ultimately to CUDA kernels on NVIDIA hardware. AMD's ROCm is the only serious alternative, with partial compatibility but a 15-year ecosystem deficit. The GPU programming layer is the most durable software moat in AI: CUDA's installed base includes millions of developer-years of kernel code, 10,000+ published GPU-accelerated libraries, and deep integration with every AI training and inference framework. Porting a CUDA codebase to ROCm requires months of engineering work and often produces lower performance — making GPU vendor switching essentially a datacenter-level capital decision, not a software swap.","chokepoint":"Y","capital_intensity":"Low","moat_type":"Proprietary ecosystem (CUDA)","margin_profile":"Very high — software bundled with GPU hardware"},
      {"label":"Distributed Training Systems","sector":"Software Infrastructure","slug":"software-infrastructure","tier":"Distributed Training Systems","chips":[],"fn":"Frameworks and algorithms coordinating gradient computation and synchronization across hundreds or thousands of GPUs — Megatron-LM, DeepSpeed, PyTorch FSDP, and Ray Train. Training a 70B–1T parameter model requires splitting the model and data across thousands of GPUs simultaneously using four parallelism strategies: data parallelism (each GPU gets a mini-batch), tensor parallelism (matrix multiplications split within a node), pipeline parallelism (model layers assigned to different nodes), and expert parallelism for MoE architectures. The core engineering challenge is overlap: communication of gradients and activations must happen simultaneously with computation, or idle GPU cycles waste millions of dollars per training run. Fault tolerance is equally critical — a single GPU failure in a 10,000-card run must trigger checkpoint recovery in minutes, not hours. Open-source frameworks from Microsoft (DeepSpeed) and NVIDIA (Megatron) dominate, with tight coupling to the underlying InfiniBand or NVLink interconnect fabric.","chokepoint":"N","capital_intensity":"Low","moat_type":"Open-source with hardware-integration advantages","margin_profile":"Low direct — open-source; drives cloud GPU spend"},
      {"label":"Container Orchestration (Kubernetes)","sector":"Software Infrastructure","slug":"software-infrastructure","tier":"Container Orchestration & MLOps","chips":["DDOG","SNOW","PLTR","MDB"],"fn":"Kubernetes-based infrastructure orchestration, ML pipeline management, experiment tracking, data versioning, and model monitoring — the DevOps and DataOps layer for AI production systems. MLOps platforms convert ad-hoc research experiments into reproducible, scalable production pipelines with automated retraining, A/B testing, and drift detection. The stack spans open-source tools (MLflow, Kubeflow, DVC) and commercial platforms: Datadog for observability, Snowflake and MongoDB for the ML data platform, and Palantir AIP for enterprise AI deployment. Container orchestration manages GPU resource quotas, multi-tenant isolation, and node pool scaling across heterogeneous hardware. As AI systems grow more complex (multi-agent, RAG pipelines, fine-tuning loops), MLOps complexity grows proportionally, driving spend on observability, data quality, and pipeline automation platforms.","chokepoint":"N","capital_intensity":"Low–Medium","moat_type":"Platform stickiness + data integration","margin_profile":"Medium–High (SaaS ARR)"},
      {"label":"Inference Optimization Stack","sector":"Software Infrastructure","slug":"software-infrastructure","tier":"Inference Optimization Stack","chips":[],"fn":"Post-training optimization runtimes that reduce the compute cost and latency of running trained models in production — quantization (INT4/INT8/FP8), pruning, kernel fusion, speculative decoding, continuous batching, and hardware-specific compilation. Tools include NVIDIA TensorRT, vLLM (open-source inference server), ONNX Runtime, Hugging Face TGI, and OpenVINO for Intel hardware. As inference volume grows to dwarf training spend (60–70% of total AI compute by 2027), inference optimization becomes the primary lever on AI unit economics: a 4x inference efficiency gain on a $100M compute budget is worth more than a 4x improvement in training throughput. The optimization stack is heavily hardware-coupled — TensorRT is explicitly tied to NVIDIA GPUs and achieves 3–8x speedups versus naive PyTorch inference. vLLM's PagedAttention algorithm for KV-cache management has become a de facto standard for large-model serving, adopted by nearly every major inference provider.","chokepoint":"Partial","capital_intensity":"Low","moat_type":"Hardware co-optimization (NVIDIA/TensorRT); open-source alternatives emerging","margin_profile":"High — bundled with GPU hardware or open-source"}

// tier → layer reverse index ("slug|tier" → layer index)
const _tierLayer={};
STACK.layers.forEach((L,i)=>L.boxes.forEach(b=>{if(b.slug&&b.tier)_tierLayer[b.slug+'|'+b.tier]=i;}));
function _layerLabel(i){const L=STACK.layers[i];return"L"+L.num+" "+L.name;}

function _tierLookup(slug,tierName){
  const s=DATA.sectors.find(x=>x.slug===slug);
  if(!s)return{sector:null,tier:null};
  return{sector:s,tier:s.tiers.find(t=>t.tier===tierName)||null};
}
function _chipHtml(tk,fallbackSector,ctxLabel,ctxFn){
  const info=TICKER_MAP[tk];
  const sName=(fallbackSector||(info&&info.sectorName)||"").replace(/'/g,"\\'");
  const args="'"+tk+"','"+sName+"'"+(ctxLabel?",'"+String(ctxLabel).replace(/'/g,"\\'")+"','"+String(ctxFn||"").replace(/'/g,"\\'")+"'":"");
  return '<span class="chip" onclick="event.stopPropagation();openStackTicker('+args+')">'+esc(tk)+'</span>';
}
function _railFlow(f){return f==="in"?"\u2193 power in":f==="out"?"\u2191 heat out":f==="wrap"?"\u21bb wraps every layer":"";}
// One compact rail sub-box card — wired to its KB tier (clickable) or a muted gap.
function _railBoxCard(b,railTitle){
  if(b.gap){
    const chips=(b.chips||[]).map(t=>_chipHtml(t,"",railTitle,"showLayer(0)")).join("");
    return '<div class="rail-box gap"><div class="rail-box-label">'+esc(b.label)+'<span class="gap-tag">unmapped</span></div>'
      +(chips?'<div class="chip-row">'+chips+'</div>':'')+'</div>';
  }
  const{sector,tier}=_tierLookup(b.slug,b.tier);
  const choke=b.choke!==undefined?b.choke:(tier&&tier.chokepoint==="Y");
  const sName=sector?sector.name:"";
  const chips=(b.chips&&b.chips.length?b.chips:(tier?(tier.companies||[]).map(c=>c.ticker):[]))
    .slice(0,6).map(t=>_chipHtml(t,sName,railTitle,"showLayer(0)")).join("");
  const onclick=(b.slug&&b.tier)?' onclick="openStackTier(\''+b.slug+'\',\''+b.tier.replace(/'/g,"\\'")+'\')"':'';
  return '<div class="rail-box'+(choke?' choke':'')+'"'+onclick+'>'
    +'<div class="rail-box-label">'+(choke?'<span class="choke-mark">⧫</span>':'')+esc(b.label)+'</div>'
    +'<div class="chip-row">'+chips+'</div></div>';
}
function _railHtml(rail){
  const flow=rail.flow?'<span class="rail-flow '+rail.flow+'">'+esc(_railFlow(rail.flow))+'</span>':'';
  const groups=rail.groups.map(g=>{
    const boxes=(g.boxes&&g.boxes.length)?g.boxes.map(b=>_railBoxCard(b,rail.title)).join(""):'';
    return '<div class="rail-group"><div class="rail-group-label">'+esc(g.label)+'</div>'
      +'<div class="rail-box-col">'+boxes+'</div></div>';
  }).join("");
  return '<div class="rail-card '+rail.id+(rail.kind==="surface"?' surface':'')+'"><div class="rail-title">'+esc(rail.title)+flow+'</div>'
    +'<div class="rail-cap">'+esc(rail.cap)+'</div>'+groups+'</div>';
}

// Cluster a layer's boxes by their optional "group" tag, preserving order.
function _groupBoxes(boxes){
  const out=[],idx={};
  boxes.forEach(b=>{
    const g=b.group||"";
    if(idx[g]===undefined){idx[g]=out.length;out.push({group:g,boxes:[]});}
    out[idx[g]].boxes.push(b);
  });
  return out;
}

function _subboxCard(b,i){
  const ctxL=_layerLabel(i),ctxF="openLayer("+i+")";
  if(b.gap){

function openTierFallback(slug,tierName,layerIdx){
  let box=null;

  const scan=(boxes)=>(boxes||[]).forEach(b=>{if(b.slug===slug&&b.tier===tierName)box=b;});
  (STACK.layers||[]).forEach(L=>scan(L.boxes));
  (STACK.rails||[]).forEach(r=>(r.groups||[]).forEach(g=>scan(g.boxes)));
  if(!box)return;
  const sectorName=(DATA.sectors.find(x=>x.slug===slug)||{}).name||box.sector||slug;
  const trail=(li!==null&&li!==undefined)
    ?[{label:"AI Buildout Stack",fn:"showLayer(0)"},{label:_layerLabel(li),fn:"openLayer("+li+")"},{label:tierName}]

function openStackTier(slug,tierName,layerIdx){
  const s=DATA.sectors.find(x=>x.slug===slug);
  if(s){
    activeSector=s;
    activeLayerIdx=(layerIdx!==undefined&&layerIdx!==null)?layerIdx:(_tierLayer[slug+"|"+tierName]!==undefined?_tierLayer[slug+"|"+tierName]:null);
    const idx=s.tiers.findIndex(t=>t.tier===tierName);
    if(idx>=0){openTier(idx);return;}
  }
  openTierFallback(slug,tierName,layerIdx);
}

    }catch(e){WIKI_CACHE[ticker]=null;}
  }
  renderL3(ticker,sName);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Hierarchical breadcrumb trail. parts: [{label, fn?}, …]; an item without fn is the current (non-clickable) crumb.
function crumbTrail(parts){
  return '<div class="breadcrumb">'+parts.map((p,i)=>
    (i>0?'<span class="crumb-sep">›</span>':'')
    +(p.fn?'<span class="crumb-link" onclick="'+p.fn+'">'+esc(p.label)+'</span>'
          :'<span class="crumb-cur">'+esc(p.label)+'</span>')
  ).join('')+'</div>';
}

function inlineMd(text){
  let s=esc(text);
  s=s.replace(/\[\[([^\]]+)\]\]/g,'$1');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(?<![a-zA-Z0-9])_(.+?)_(?![a-zA-Z0-9])/g,'<em>$1</em>');
  s=s.replace(/`([^`]+)`/g,'<code class="wiki-code">$1</code>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}

function parseWiki(md){
  const lines=md.split('\n');
  let html='',inTable=false,tableRows=[],inList=false,listType='',sectionOpen=false;

  function flushTable(){
    if(!tableRows.length)return;
    const rows=tableRows.filter(r=>!/^\|[\s\-:|]+\|/.test(r));
    if(!rows.length){tableRows=[];inTable=false;return;}
    const cells=r=>r.split('|').slice(1,-1).map(c=>c.trim());
    const hdr=cells(rows[0]).map(h=>'<th>'+inlineMd(h)+'</th>').join('');
    const body=rows.slice(1).map(r=>'<tr>'+cells(r).map(c=>'<td>'+inlineMd(c)+'</td>').join('')+'</tr>').join('');
    html+='<div class="wiki-table-wrap"><table class="wiki-table"><thead><tr>'+hdr+'</tr></thead><tbody>'+body+'</tbody></table></div>';
    tableRows=[];inTable=false;
  }
  function flushList(){if(inList){html+='</ul>';inList=false;listType='';}}
  function closeSection(){if(sectionOpen){html+='</div>';sectionOpen=false;}}

  for(const line of lines){
    if(/^# /.test(line)||/^<!--/.test(line.trim()))continue;
    if(/^## /.test(line)){
      flushTable();flushList();closeSection();
      html+='<div class="wiki-section"><h2 class="wiki-h2">'+esc(line.slice(3).trim())+'</h2>';
      sectionOpen=true;continue;
    }
    if(/^### /.test(line)){flushTable();flushList();html+='<h3 class="wiki-h3">'+esc(line.slice(4).trim())+'</h3>';continue;}
    if(/^#### /.test(line)){flushTable();flushList();html+='<h4 class="wiki-h4">'+esc(line.slice(5).trim())+'</h4>';continue;}
    if(/^-{3,}$/.test(line.trim())){flushTable();flushList();continue;}
    if(/^\s*\|/.test(line)){flushList();inTable=true;tableRows.push(line.trimStart());continue;}
    else if(inTable)flushTable();
    if(/^> /.test(line)){flushList();html+='<div class="wiki-blockquote">'+inlineMd(line.slice(2).trim())+'</div>';continue;}
    if(/^- \[[ xX]\]/.test(line)){
      if(!inList||listType!=='checklist'){flushList();html+='<ul class="wiki-checklist">';inList=true;listType='checklist';}
      const done=/^- \[[xX]\]/.test(line);
      html+='<li class="'+(done?'done':'')+'">'+inlineMd(line.slice(6).trim())+'</li>';continue;
    }
    if(/^- /.test(line)){
      if(!inList||listType!=='ul'){flushList();html+='<ul class="wiki-list">';inList=true;listType='ul';}
      html+='<li>'+inlineMd(line.slice(2).trim())+'</li>';continue;
    }
    if(inList&&line.trim()===''){flushList();continue;}
    if(line.trim()===''){flushList();continue;}
    flushList();
    const p=inlineMd(line.trim());
    if(p){
      // italic-only line (e.g. *Last updated: …*)
      if(/^\*[^*].*[^*]\*$/.test(line.trim())||/^\*[^*]\*$/.test(line.trim()))
        html+='<p class="wiki-meta">'+p+'</p>';
      else
        html+='<p class="wiki-p">'+p+'</p>';
    }
  }
  flushTable();flushList();closeSection();
  return html;
}

function buildSearchIdx() {

  });
  DATA.sectors.forEach(s => {

      const li = (layer !== undefined ? layer : "");
      idx.push({ type: "tier", label: t.tier, sub: s.name, slug: s.slug, tierName: t.tier, layerIdx: li, q: (t.tier + " " + (t.fn || "")).toLowerCase() });
      (t.companies || []).forEach(c => {
        const sn = (TICKER_MAP[c.ticker]&&TICKER_MAP[c.ticker].sectorName) || s.name;
        idx.push({ type: "company", label: c.name, ticker: c.ticker || "", sectname: sn, sub: t.tier + " · " + s.name, slug: s.slug, tierName: t.tier, layerIdx: li, q: ((c.ticker || "") + " " + c.name + " " + (c.notes || "")).toLowerCase() });
      });
    });

}

function renderSearchResults(q) {
  const res = document.getElementById("search-results");
  if (!q) { res.hidden = true; return; }
  if (!_searchIdx) _searchIdx = buildSearchIdx();
  const hits = _searchIdx.filter(x => x.q.includes(q)).slice(0, 18);
  if (!hits.length) {
    res.innerHTML = "<div class=\"sr-empty\">No results</div>";
    res.hidden = false;
    return;
  }
  const groups = [["layer", "Layers"], ["tier", "Tiers"], ["company", "Companies"]];
  let html = "";
  groups.forEach(([type, label]) => {
    const group = hits.filter(h => h.type === type);
    if (!group.length) return;
    if (html) html += "<div class=\"sr-divider\"></div>";
    html += "<div class=\"sr-group-label\">" + label + "</div>";
    group.forEach(h => {
      const ticker = h.ticker ? "<span class=\"sr-ticker\">" + h.ticker + "</span>" : "";
      html += "<div class=\"sr-item\" data-type=\"" + h.type + "\""
        + (h.slug !== undefined ? " data-slug=\"" + esc(h.slug) + "\"" : "")
        + (h.tierName !== undefined ? " data-tiername=\"" + esc(h.tierName) + "\"" : "")
        + (h.layerIdx !== undefined && h.layerIdx !== "" ? " data-layer=\"" + h.layerIdx + "\"" : "")

        + (h.sectname ? " data-sectname=\"" + esc(h.sectname) + "\"" : "")

        + "</div>";

}

function daysUntil(dateStr){
  if(!dateStr)return null;
  const d=new Date(dateStr+'T00:00:00');
  const now=new Date();
  now.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}

async function fetchWatchlistMd(){
  const pat=wlPat();
  const headers={'Accept':'application/vnd.github.v3+json'};
  if(pat)headers['Authorization']='Bearer '+pat;
  const res=await fetch(WL_API,{headers,cache:'no-store'});
  if(!res.ok)throw new Error('GitHub API: HTTP '+res.status);
  const json=await res.json();
  _wlSha=json.sha;
  const b64=json.content.replace(/\n/g,'');
  const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

async function writeWatchlistMd(content){
  const pat=wlPat();
  if(!pat)throw new Error('No GitHub PAT stored.');
  const enc=new TextEncoder().encode(content);
  let raw='';
  for(let i=0;i<enc.length;i+=32768)raw+=String.fromCharCode(...enc.subarray(i,i+32768));
  const b64=btoa(raw);
  const res=await fetch(WL_API,{
    method:'PUT',
    headers:{'Authorization':'Bearer '+pat,'Content-Type':'application/json'},
    body:JSON.stringify({message:'Watchlist update via dashboard',content:b64,sha:_wlSha})
  });
  if(!res.ok){const d=await res.json().catch(()=>({}));throw new Error(d.message||'HTTP '+res.status);}
  const d=await res.json();
  if(d.content?.sha)_wlSha=d.content.sha;
}

function parseWatchlistMd(md){
  const entries=[];
  const lines=md.split('\n');
  let category=null;
  for(const line of lines){
    if(line.startsWith('## Core Holdings')){category='Core Holdings';continue;}
    if(line.startsWith('## High Upside Rockets')){category='Rockets';continue;}
    if(line.startsWith('## Compounders')){category='Compounders';continue;}
    if(line.startsWith('## Watching')){category='Watching';continue;}
    if(line.startsWith('## ')||line.trim()==='---'){category=null;continue;}
    if(!category||!line.startsWith('|'))continue;
    const cols=line.split('|').map(c=>c.trim()).filter(c=>c!=='');
    if(!cols.length)continue;
    const first=cols[0];
    if(first==='Ticker'||first.startsWith('---')||first.startsWith(':---'))continue;
    if(!first||first==='-')continue;
    const e={ticker:first,category,name:'',notes:'',strategy:'',score:null};
    if(category==='Core Holdings'&&cols.length>=4){
      e.name=cols[1]||'';e.notes=cols[2]||'';e.strategy=cols[3]||'';
      const s=cols[4]||'';e.score=(s&&s!=='—'&&s!=='-')?parseFloat(s)||null:null;
    } else if(category==='Rockets'&&cols.length>=2){
      e.notes=cols[1]||'';
      const s=cols[2]||'';e.score=(s&&s!=='—'&&s!=='-')?parseFloat(s)||null:null;
    } else if(category==='Compounders'&&cols.length>=3){
      e.name=cols[1]||'';e.notes=cols[2]||'';
      const s=cols[3]||'';e.score=(s&&s!=='—'&&s!=='-')?parseFloat(s)||null:null;
    } else if(category==='Watching'){
      e.notes=cols[1]||'';
    } else continue;
    entries.push(e);
  }
  return entries;
}

function mergeWithDataWatchlist(liveEntries){
  const rich={};
  (DATA.watchlist||[]).forEach(e=>{rich[e.ticker]=e;});
  return liveEntries.map(live=>{

      thesis:r.thesis||live.notes||'',
      scoring:r.scoring||null,
      catalysts:r.catalysts||null,
      hasRichData:!!(r.thesis||r.scoring)
    };
  });
}

function _buildAddMd(md,ticker){
  const WATCH_HDR='## Watching';
  const WATCH_TABLE_HDR='| Ticker | Notes |\n|--------|-------|';
  let lines=md.split('\n');
  const si=lines.findIndex(l=>l.startsWith(WATCH_HDR));
  if(si===-1){
    lines=lines.concat(['','---','',WATCH_HDR,'',WATCH_TABLE_HDR,'| '+ticker+' |  |']);
  } else {
    let lastRow=-1;
    for(let i=si+1;i<lines.length;i++){
      if(lines[i].startsWith('## ')||lines[i].trim()==='---')break;
      if(lines[i].startsWith('|')&&!lines[i].includes('---'))lastRow=i;
    }
    if(lastRow===-1){
      const thi=lines.findIndex((l,idx)=>idx>si&&l.startsWith('| Ticker'));
      const ins=thi!==-1?thi+2:si+1;
      lines.splice(ins,0,'| '+ticker+' |  |');
    } else {
      lines.splice(lastRow+1,0,'| '+ticker+' |  |');
    }
  }
  return lines.join('\n');
}

async function addToWatchlist(ticker){
  for(let attempt=0;attempt<3;attempt++){
    let md;
    try{md=await fetchWatchlistMd();}catch(err){alert('Failed to read Watchlist.md: '+err.message);return;}
    const existing=parseWatchlistMd(md);
    if(existing.find(e=>e.ticker===ticker)){alert(ticker+' is already in the watchlist.');return;}
    try{await writeWatchlistMd(_buildAddMd(md,ticker));await initWatchlistTab(true);return;}
    catch(err){
      if(attempt<2&&String(err.message).includes('does not match'))continue;
      alert('Failed to save: '+err.message);return;
    }
  }
}

async function removeFromWatchlist(ticker){
  for(let attempt=0;attempt<3;attempt++){
    let md;
    try{md=await fetchWatchlistMd();}catch(err){alert('Failed to read Watchlist.md: '+err.message);return;}
    const filtered=md.split('\n').filter(line=>{
      if(!line.startsWith('|'))return true;
      const cols=line.split('|').map(c=>c.trim()).filter(c=>c!=='');
      return cols[0]!==ticker;
    });
    try{await writeWatchlistMd(filtered.join('\n'));await initWatchlistTab(true);return;}
    catch(err){
      if(attempt<2&&String(err.message).includes('does not match'))continue;
      alert('Failed to save: '+err.message);return;
    }
  }
}

function renderWatchlistCard(e,canEdit){
  const scoreCls=e.score==null?'none':e.score>=8?'high':'mid';
  const scoreLabel=e.score!=null?e.score.toFixed(1)+'/10':'Unscored';
  const removeBtn=canEdit?'<button class="wl-remove" onclick="wlConfirmRemove(\''+esc(e.ticker)+'\')" title="Remove">×</button>':'';
  const days=daysUntil(e.next_earnings);
  const soon=days!=null&&days>=0&&days<=14;
  const earningsText=e.next_earnings?(soon?'⚡ ':'')+'Earnings '+e.next_earnings+(days!=null?' ('+(days===0?'today':days+'d')+')':''):'';
  const metaParts=[
    e.sector&&'<span class="wl-pill">'+esc(e.sector)+'</span>',
    e.tier&&'<span class="wl-pill">'+esc(e.tier)+'</span>',
    e.exchange&&'<span class="wl-pill">'+esc(e.exchange)+'</span>',
    earningsText&&'<span class="wl-pill'+(soon?' soon':'')+'">'+esc(earningsText)+'</span>'
  ].filter(Boolean);
  const metaHtml=metaParts.length?'<div class="wl-meta">'+metaParts.join('')+'</div>':'';
  const thesisHtml=e.thesis?'<div class="wl-thesis">'+esc(e.thesis)+'</div>':'';
  let scoringHtml='';
  if(e.scoring){
    const crit=[['Product (Love Factor)',e.scoring.product,5],['Pricing Power',e.scoring.pricing_power,5],['Leadership & Alignment',e.scoring.leadership,5],['Financial Health',e.scoring.financial_health,5],['Macro Environment',e.scoring.macro,5],['Future Potential',e.scoring.future_potential,5]];
    const rows=crit.map(([name,val,max])=>{
      const v=val!=null?val:'—';
      const bar=val!=null?'<span class="wl-bar" style="width:'+Math.round((val/max)*56)+'px"></span>':'';
      return '<tr><td>'+esc(name)+'</td><td class="wl-score-val">'+v+'/'+max+bar+'</td></tr>';
    });
    const comp=e.scoring.composite!=null?e.scoring.composite.toFixed(1):'—';
    rows.push('<tr><td><strong>Composite</strong></td><td class="wl-score-val"><strong>'+comp+'/10</strong></td></tr>');
    scoringHtml='<div class="wl-block-hdr">Scoring</div><div class="wiki-table-wrap"><table class="wl-score-table"><tbody>'+rows.join('')+'</tbody></table></div>';
  } else if(!e.hasRichData){
    scoringHtml='<p class="wl-stub">Run <code>/daily-dashboard --refresh-data</code> to populate scoring &amp; catalysts for this ticker.</p>';
  }
  let catalystsHtml='';
  if(e.catalysts&&e.catalysts.length){
    catalystsHtml='<div class="wl-block-hdr">Upcoming Catalysts</div><ul class="wl-cat-list">'+e.catalysts.slice(0,3).map(c=>'<li class="wl-cat-item">'+esc(c)+'</li>').join('')+'</ul>';
  }
  return '<div class="wl-card">'
    +'<div class="wl-card-hdr"><span class="wl-ticker">'+esc(e.ticker)+'</span>'
    +'<span class="wl-name">'+esc(e.name||'')+'</span>'
    +'<span class="wl-score-badge '+scoreCls+'">'+esc(scoreLabel)+'</span>'
    +removeBtn+'</div>'
    +metaHtml+thesisHtml+scoringHtml+catalystsHtml+'</div>';
}

function renderWatchlist(entries,fallback){
  const container=document.getElementById('watchlist');
  const pat=wlPat();
  const canEdit=!!pat&&!fallback;
  const headerAuthHtml=pat&&!fallback
    ?'<div class="wl-auth-ok"><span>🔓 Editing enabled</span><button class="wl-btn" style="margin-left:8px" onclick="wlClearPat();initWatchlistTab(true)">Sign out</button></div>'
    :'';
  const patPromptHtml=!pat||fallback
    ?'<div class="wl-pat-prompt"><strong>Enable editing</strong> — enter a GitHub PAT with <code>contents:write</code> scope on this repo to add/remove tickers from the dashboard.<br><div class="wl-pat-row"><input id="wl-pat-input" class="wl-pat-input" type="password" placeholder="github_pat_…" /><button class="wl-btn primary" onclick="wlSavePat()">Save &amp; Reload</button></div><div class="wl-pat-note">Token stored in your browser\'s localStorage only — it never leaves your device.</div></div>'
    :'';
  const addRowHtml=canEdit
    ?'<div class="wl-add-row"><input id="wl-add-ticker" class="wl-add-input" type="text" placeholder="Add ticker…" onkeydown="if(event.key===\'Enter\')wlAddFromInput()" /><button class="wl-btn primary" onclick="wlAddFromInput()">Add</button></div>'
    :'';
  const cats=['Watching','Core Holdings','Rockets','Compounders'];
  const catLabels={'Watching':'Watching','Core Holdings':'Core Holdings — Active Positions','Rockets':'High Upside Rockets — Speculative','Compounders':'Compounders Watchlist'};
  const body=cats.map(cat=>{
    const items=entries.filter(e=>e.category===cat);
    if(!items.length)return'';
    return'<div class="wl-section-hdr">'+esc(catLabels[cat])+'</div><div class="wl-cards">'+items.map(e=>renderWatchlistCard(e,canEdit)).join('')+'</div>';
  }).join('');
  const emptyHtml=entries.length?''
    :'<div class="wl-empty">Watchlist is empty.<br>Add a ticker above, or edit <code>Watchlist.md</code> and re-run <code>/daily-dashboard --refresh-data</code>.</div>';
  container.innerHTML=
    '<div class="wl-page-hdr"><div class="wl-title">Watchlist</div>'+headerAuthHtml+'</div>'
    +patPromptHtml+addRowHtml+body+emptyHtml;
}

async function initWatchlistTab(force){
  if(!force&&_wlInitialized)return;
  const container=document.getElementById('watchlist');
  container.innerHTML='<div class="wl-loading">Loading watchlist…</div>';
  try{
    const md=await fetchWatchlistMd();
    const live=parseWatchlistMd(md);
    const entries=mergeWithDataWatchlist(live);
    _wlInitialized=true;
    renderWatchlist(entries,false);
  } catch(err){
    // Fallback: use pre-generated DATA.watchlist (read-only)
    const entries=(DATA.watchlist||[]).map(e=>({...e,hasRichData:true}));
    _wlInitialized=true;
    renderWatchlist(entries,true);
  }
}
</script>
