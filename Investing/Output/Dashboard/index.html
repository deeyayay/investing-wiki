<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Buildout Supply Chain</title>
<style>
:root{--bg:oklch(97.5% .007 75);--bg2:oklch(95% .008 75);--bg3:oklch(92% .010 75);--border:oklch(87% .011 75);--text:oklch(18% .008 280);--muted:oklch(50% .012 260);--amber:oklch(66% .17 62);--amber-bg:oklch(97% .07 75);--d1:oklch(34% .24 278);--d2:oklch(30% .16 148);--d3:oklch(32% .22 258);--d4:oklch(32% .24 310);--d5:oklch(35% .24 27);--d6:oklch(40% .18 55)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.5 system-ui,sans-serif}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10}
.logo{font-weight:700;font-size:16px}.gen-date{color:var(--muted);font-size:12px}
#l0,#l1,#l2{padding:40px 32px;max-width:1200px;margin:0 auto}
.dim-row{margin-bottom:72px}
.dim-label{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.dim-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;color:var(--text);letter-spacing:.05em;flex-shrink:0}
.dim-pill.D1{background:oklch(89% .14 278);color:var(--d1)}.dim-pill.D2{background:oklch(89% .12 148);color:var(--d2)}
.dim-pill.D3{background:oklch(89% .14 258);color:var(--d3)}.dim-pill.D4{background:oklch(89% .14 308);color:var(--d4)}
.dim-pill.D5{background:oklch(91% .12 27);color:var(--d5)}.dim-pill.D6{background:oklch(93% .12 60);color:var(--d6)}
.dim-name{font-weight:700;font-size:16px;letter-spacing:-.01em}
.dim-desc{color:var(--muted);font-size:12px;margin-left:auto;max-width:480px;text-align:right}
.sec-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.sec-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;cursor:pointer;transition:border-color .15s,transform .1s}
.sec-card:hover{border-color:oklch(72% .012 75);transform:translateY(-1px)}
.sec-card-name{font-weight:600;font-size:14px;margin-bottom:6px}
.sec-card-desc{color:var(--muted);font-size:11px;line-height:1.4;margin-bottom:8px}
.sec-meta{display:flex;align-items:center;gap:8px}
.tier-badge{font-size:10px;background:var(--bg3);padding:2px 7px;border-radius:99px;color:var(--muted)}
.choke-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);display:inline-block}
.empty-dim{color:var(--muted);font-size:12px;padding:8px 0;font-style:italic}
.breadcrumb{font-size:12px;color:var(--muted);margin-bottom:28px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:4px 0}
.crumb-link{cursor:pointer;color:var(--muted);transition:color .12s}
.crumb-link:hover{color:var(--text);text-decoration:underline}
.crumb-sep{color:var(--border);font-size:12px}
.crumb-cur{color:var(--text);font-weight:600}
.sector-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sector-title{font-size:22px;font-weight:700}
.sector-desc-full{color:var(--muted);font-size:13px;margin-bottom:12px}
.dim-ctx{font-size:12px;color:var(--muted);margin-bottom:44px;font-style:italic}
.tier-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:18px 20px;margin-bottom:14px;cursor:pointer;transition:border-color .15s,background .15s}
.tier-card:hover{border-color:oklch(72% .012 75);background:oklch(97% .006 75)}
.tier-card.choke-y{border-color:oklch(73% .18 62);background:oklch(98% .08 72)}
.tier-card.choke-y:hover{background:oklch(97% .11 72)}
.tier-card.choke-p{border-color:oklch(76% .012 75);background:oklch(96.5% .005 75)}
.tier-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.tier-name{font-weight:600;font-size:13px}
.choke-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.choke-badge.y{background:var(--amber-bg);color:var(--amber)}
.choke-badge.p{background:oklch(91% .008 75);color:var(--muted)}
.tier-fn{color:var(--muted);font-size:12px;line-height:1.5;margin-bottom:10px}
.tier-pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{font-size:10px;background:var(--bg3);padding:2px 8px;border-radius:99px;color:var(--muted)}
.tier-detail-name{font-size:20px;font-weight:700;margin-bottom:16px}
.tier-fn-full{font-size:15px;line-height:1.6;color:var(--text);margin-bottom:36px}
.invest-section h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px}
.invest-rows{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.invest-row{display:flex;gap:12px;font-size:13px}
.invest-label{color:var(--muted);width:140px;flex-shrink:0}
.invest-val{color:var(--text)}
.choke-box{background:var(--amber-bg);border:1px solid oklch(78% .16 62);border-radius:6px;padding:12px 16px;margin-bottom:20px}
.choke-box p{font-size:13px;color:var(--amber)}
.choke-box-partial{background:oklch(96% .005 75);border:1px solid oklch(82% .010 75);border-radius:6px;padding:12px 16px;margin-bottom:20px}
.choke-box-partial p{font-size:13px;color:var(--muted)}
.co-count{font-size:10px;background:oklch(92% .10 278);color:var(--d1);padding:2px 7px;border-radius:99px}
.co-section{margin-top:32px}
.co-section h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px}
.co-card{padding:14px 0;border-bottom:1px solid var(--border)}
.co-card:last-child{border-bottom:none}
.co-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.co-ticker{font-weight:700;font-size:13px;font-family:monospace;color:var(--text);text-decoration:none}
a.co-ticker:hover{color:var(--d3);text-decoration:underline}
.co-name{font-size:12px;color:var(--muted)}
.co-cap{font-size:10px;padding:2px 7px;border-radius:99px;margin-left:auto}
.co-cap.large{background:oklch(93% .08 258);color:var(--d3)}
.co-cap.mid{background:oklch(95% .09 68);color:var(--amber)}
.co-cap.small{background:oklch(94% .08 25);color:var(--d5)}
.co-notes{font-size:12px;color:var(--muted);line-height:1.5}
@media(max-width:600px){.sec-card{width:100%}.dim-desc{display:none}#l0,#l1,#l2,#l3{padding:16px}}
/* L3 — ticker wiki */
#l3{padding:40px 32px;max-width:1200px;margin:0 auto}
.ticker-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.ticker-sym{font-size:28px;font-weight:700;font-family:monospace;line-height:1}
.ticker-fullname{font-size:16px;color:var(--muted)}
.ticker-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.ticker-tag{font-size:11px;padding:3px 9px;border-radius:99px;background:var(--bg3);color:var(--muted)}
.wiki-empty{color:var(--muted);font-style:italic;font-size:13px;padding:60px 0;text-align:center;line-height:2}
.wiki-loading{color:var(--muted);font-size:13px;padding:60px 0;text-align:center}
.wiki-body{max-width:800px}
.wiki-section{margin-bottom:44px}
.wiki-h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.wiki-h3{font-size:13px;font-weight:700;margin:18px 0 8px;color:var(--text)}
.wiki-h4{font-size:11px;font-weight:700;color:var(--muted);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.05em}
.wiki-p{font-size:13px;line-height:1.7;margin-bottom:10px;color:var(--text)}
.wiki-meta{font-size:11px;color:var(--muted);margin-bottom:14px;font-style:italic}
.wiki-table-wrap{overflow-x:auto;margin-bottom:18px}
.wiki-table{width:100%;border-collapse:collapse;font-size:12px}
.wiki-table th{text-align:left;padding:6px 10px;border-bottom:2px solid var(--border);font-weight:600;color:var(--muted);white-space:nowrap;background:var(--bg2)}
.wiki-table td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.45}
.wiki-table tr:last-child td{border-bottom:none}
.wiki-table tr:hover td{background:var(--bg2)}
.wiki-blockquote{border-left:3px solid var(--border);padding:8px 14px;margin:10px 0 14px;color:var(--muted);font-size:12px;font-style:italic;line-height:1.6}
.wiki-list{padding-left:18px;margin-bottom:14px;font-size:13px;line-height:1.6}
.wiki-list li{margin-bottom:4px}
.wiki-checklist{list-style:none;padding-left:0;margin-bottom:14px;font-size:13px}
.wiki-checklist li{padding:4px 0 4px 24px;position:relative;line-height:1.5}
.wiki-checklist li::before{content:'☐';position:absolute;left:0;color:var(--muted)}
.wiki-checklist li.done{color:var(--muted);text-decoration:line-through}
.wiki-checklist li.done::before{content:'☑';color:var(--d2)}
.wiki-code{font-family:monospace;font-size:11px;background:var(--bg3);padding:1px 4px;border-radius:3px}
.wiki-oneline{background:oklch(95% .06 258);border:1px solid oklch(83% .10 258);padding:12px 16px;border-radius:6px;font-size:14px;line-height:1.6;margin-bottom:4px}
#search-wrap{position:relative;flex:1;max-width:420px}
#search-input{width:100%;padding:7px 12px 7px 34px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
#search-input:focus{border-color:var(--muted)}
#search-input::placeholder{color:var(--muted)}
#search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:14px}
#search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg);border:1px solid var(--border);border-radius:8px;max-height:380px;overflow-y:auto;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.sr-group-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:8px 12px 4px}
.sr-item{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s}
.sr-item:hover{background:var(--bg2)}
.sr-ticker{font-family:monospace;font-weight:700;font-size:11px;background:oklch(92% .10 278);color:var(--d1);padding:2px 7px;border-radius:4px;flex-shrink:0}
.sr-text{flex:1;min-width:0}
.sr-label{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-empty{padding:16px 12px;text-align:center;color:var(--muted);font-size:13px}
.sr-divider{height:1px;background:var(--border);margin:2px 0}
@media(max-width:600px){#search-wrap{order:3;flex:0 0 100%}#hdr{flex-wrap:wrap;padding:10px 16px;row-gap:8px}}
/* Tab navigation */
#tab-nav{display:flex;gap:2px;padding:0 24px;background:var(--bg2);border-bottom:1px solid var(--border)}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:10px 16px;font:13px/1 system-ui,sans-serif;color:var(--muted);cursor:pointer;transition:color .15s,border-color .15s;margin-bottom:-1px;border-radius:0}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
/* Tech races container */
#tech-races,#tech-race-detail{padding:40px 32px;max-width:1200px;margin:0 auto}
.tech-group-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;margin-top:8px}
.race-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:48px}
.race-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:18px;cursor:pointer;transition:border-color .15s,transform .1s;display:flex;flex-direction:column;gap:10px}
.race-card:hover{border-color:oklch(72% .012 75);transform:translateY(-1px)}
.race-card-top{display:flex;align-items:center;gap:8px}
.conviction-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.conviction-badge.high{background:oklch(93% .10 142);color:oklch(34% .18 142)}
.conviction-badge.medium{background:var(--amber-bg);color:var(--amber)}
.conviction-badge.low,.conviction-badge.watch{background:var(--bg3);color:var(--muted)}
.conviction-badge.resolved{background:oklch(92% .10 258);color:var(--d3)}
.status-badge{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--bg3);color:var(--muted);margin-left:auto}
.race-card-name{font-weight:700;font-size:14px}
.race-card-pref{font-size:12px;color:var(--muted);line-height:1.45}
.race-ticker-pills{display:flex;flex-wrap:wrap;gap:6px}
.exposure-pill{font-size:10px;padding:2px 8px;border-radius:99px;white-space:nowrap}
.exposure-pill.primary{background:oklch(92% .10 278);color:var(--d1);font-weight:600}
.exposure-pill.partial{background:var(--amber-bg);color:var(--amber)}
.exposure-pill.indirect{background:var(--bg3);color:var(--muted)}
.race-card-foot{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-top:auto}
.group-pill{background:var(--bg3);padding:2px 7px;border-radius:99px;font-size:10px}
.no-races{color:var(--muted);font-size:12px;font-style:italic;margin-bottom:40px;padding:8px 0}
/* Race detail view */
.race-detail-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.race-detail-name{font-size:22px;font-weight:700;margin-bottom:8px}
.race-detail-pref{font-size:14px;line-height:1.65;color:var(--text);margin-bottom:32px;padding:14px 16px;background:var(--bg2);border-left:3px solid oklch(73% .18 62);border-radius:0 6px 6px 0}
.race-section{margin-bottom:32px}
.race-section-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.race-text{font-size:13px;line-height:1.7;color:var(--text)}
.race-two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.race-col{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px}
.race-col-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.race-col-hdr.bull{color:oklch(34% .18 142)}
.race-col-hdr.bear{color:var(--d5)}
.race-bullet{font-size:12px;line-height:1.6;color:var(--muted);padding:3px 0 3px 14px;position:relative}
.race-bullet::before{content:'·';position:absolute;left:4px;color:var(--text)}
@media(max-width:600px){#tech-races,#tech-race-detail{padding:16px}.race-two-col{grid-template-columns:1fr}#tab-nav{padding:0 16px}}
/* ── Logo subtitle ── */
.logo-wrap{display:flex;flex-direction:column;gap:1px}
.logo-sub{font-size:11px;color:var(--muted);font-weight:400}
/* ── 12-Layer Buildout Stack (homepage) ── */
#l0{max-width:1340px;padding:32px 24px}
.stack-intro{font-size:12px;color:var(--muted);margin-bottom:22px;max-width:820px;line-height:1.6}
.stack-grid{display:grid;grid-template-columns:228px minmax(0,1fr) 232px;gap:18px;align-items:start}
.rail{display:flex;flex-direction:column;gap:12px}
.rail-card{border:1px solid var(--border);border-radius:11px;padding:13px 13px 14px;position:relative;overflow:hidden}
.rail-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--rail-accent,var(--border))}
.rail-card.power{--rail-accent:oklch(64% .18 35);background:oklch(97% .035 35)}
.rail-card.thermal{--rail-accent:oklch(62% .12 215);background:oklch(97% .03 215)}
.rail-card.security{--rail-accent:oklch(55% .17 300);background:oklch(97% .035 300)}
.rail-card.edge{--rail-accent:oklch(60% .18 350);background:oklch(97% .04 350)}
.rail-title{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.rail-cap{font-size:10px;color:var(--muted);margin:2px 0 10px;line-height:1.4}
.rail-group{margin-bottom:9px}
.rail-group:last-child{margin-bottom:0}
.rail-group-label{font-size:10.5px;font-weight:600;color:var(--text);margin-bottom:4px;opacity:.85}
.stack{display:flex;flex-direction:column}
.layer{border-radius:11px;border:1px solid oklch(80% .055 var(--lh,250));background:var(--lbg);position:relative;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.layer-head{display:flex;align-items:baseline;gap:9px;padding:8px 14px;background:oklch(85% .12 var(--lh,250));border-bottom:1px solid oklch(78% .08 var(--lh,250))}
.layer-num{font-size:11px;font-weight:800;font-family:ui-monospace,monospace;color:oklch(32% .15 var(--lh,250))}
.layer-name{font-weight:800;font-size:14px;letter-spacing:-.01em;color:oklch(25% .13 var(--lh,250))}
.layer-tag{font-size:10.5px;color:oklch(40% .07 var(--lh,250));margin-left:auto;text-align:right;max-width:48%}
.subbox-row{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px}
.subbox{flex:1 1 158px;min-width:150px;background:oklch(99.5% .003 90 / .72);border:1px solid oklch(86% .02 var(--lh,250));border-radius:8px;padding:8px 10px;cursor:pointer;transition:transform .1s,box-shadow .12s,border-color .12s}
.subbox:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.08);border-color:oklch(70% .04 var(--lh,250))}
.subbox.choke{border-color:var(--amber);background:oklch(98% .05 72 / .85)}
.subbox-label{font-weight:600;font-size:11.5px;line-height:1.3;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.choke-mark{color:var(--amber);font-size:10px;flex-shrink:0}
.chip-row{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-family:ui-monospace,monospace;font-size:10px;font-weight:600;background:oklch(92% .02 250);color:oklch(35% .04 250);padding:1px 5px;border-radius:4px;cursor:pointer;transition:background .1s}
.chip:hover{background:oklch(86% .06 250)}
.chip.more{background:transparent;color:var(--muted);font-weight:400;cursor:default}
.connector{display:flex;align-items:center;justify-content:center;height:26px;position:relative}
.connector::before{content:"";position:absolute;top:0;bottom:0;left:50%;width:1.5px;background:oklch(80% .01 250);transform:translateX(-50%)}
.connector-label{position:relative;z-index:1;font-size:10px;color:var(--muted);background:var(--bg);padding:2px 9px;border:1px solid var(--border);border-radius:99px;white-space:nowrap}
.connector-label::after{content:"▾";margin-left:6px;font-size:8px;opacity:.6}
.connector.choke::before{background:var(--amber)}
.connector.choke .connector-label{color:var(--amber);border-color:oklch(80% .12 62);font-weight:600}
@media(max-width:980px){.stack-grid{grid-template-columns:1fr}.rail{position:static;flex-direction:row;flex-wrap:wrap}.rail-card{flex:1 1 200px}}
@media(max-width:600px){#l0{padding:16px}.subbox{min-width:120px}.rail-card{flex:1 1 100%}}
/* clickable layer header */
.layer-head{cursor:pointer;transition:filter .12s}
.layer-head:hover{filter:brightness(.97)}
.layer-go{font-size:10.5px;font-weight:700;color:oklch(38% .1 var(--lh,250));opacity:0;transition:opacity .12s;margin-left:8px}
.layer-head:hover .layer-go{opacity:.85}
/* Layer view (L1) */
.layer-view-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.layer-view-num{font-family:ui-monospace,monospace;font-weight:800;font-size:14px;color:oklch(45% .14 var(--lh,250))}
.layer-view-name{font-size:24px;font-weight:800;letter-spacing:-.02em;color:oklch(28% .13 var(--lh,250))}
.layer-view-tag{color:var(--muted);font-size:13px;margin-bottom:26px}
.layer-box-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.layer-box{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:14px 15px;cursor:pointer;transition:border-color .15s,transform .1s,box-shadow .12s}
.layer-box:hover{border-color:oklch(72% .04 250);transform:translateY(-1px);box-shadow:0 3px 14px rgba(0,0,0,.07)}

.wl-empty{text-align:center;padding:60px 0;color:var(--muted);font-size:13px;line-height:2}

@media(max-width:600px){#watchlist{padding:16px}.wl-cards{grid-template-columns:1fr}.wl-add-row{flex-direction:column;align-items:stretch}}

        { tier: "Dedicated Inference Accelerators", fn: "Purpose-built silicon architectures optimized exclusively for AI inference — sacrificing training flexibility to achieve step-change improvements in inference efficiency. Unlike general-purpose GPUs that perform both training and inference, dedicated accelerators are architected from first principles for inference workloads: deterministic memory access patterns, compiled execution graphs, and hardware pipelines that eliminate GPU scheduling overhead. Groq's LPU achieves sub-millisecond token generation by eliminating DRAM bottlenecks with on-chip SRAM; Cerebras WSE uses a wafer-scale die to fit entire model weights in on-chip memory. The market is commercially nascent: no pure-play dedicated inference accelerator company is currently publicly traded at meaningful scale. As inference query volumes reach billions per day per application, the cost-per-token advantage of purpose-built silicon over general GPUs becomes material — but ecosystem fragmentation (each architecture requires separate model compilation) limits adoption beyond the most price-sensitive inference operators.", chokepoint: "N", capital_intensity: "High", moat_type: "Architecture specialization — customer traction early-stage", margin_profile: "Unknown — market pre-scale; no public comparables", companies: [] },

        { tier: "Lithography Equipment", fn: "Project photomask circuit patterns onto photoresist-coated wafers at nanometer precision using deep ultraviolet (DUV, 193nm immersion) or extreme ultraviolet (EUV, 13.5nm) light — the single most critical, most concentrated, and most export-controlled equipment tier in the global semiconductor supply chain. ASML holds a monopoly on EUV lithography scanners: no other company has solved the laser-plasma EUV light source, tin droplet target system, collector mirror optics, and high-NA projection lens simultaneously. A single EUV scanner costs €100–€380M, weighs 180 tons, requires 40 shipping containers to deliver, and must be assembled and qualified by ASML engineers on-site. Without EUV, chips cannot be manufactured at 7nm or below in high volume — meaning ASML is the single point of failure for advanced semiconductor production globally. Export controls imposed by the Netherlands (under US pressure) have blocked ASML from shipping EUV systems to China since 2019, preventing Chinese foundries from reaching sub-7nm, and the US-Netherlands-Japan equipment coalition has extended DUV shipping restrictions as of 2023. The geopolitical centrality of ASML's technology makes it arguably the most strategically important company in manufacturing.", chokepoint: "Y", capital_intensity: "Very High", moat_type: "Process IP + Geographic monopoly", margin_profile: "Very High", companies: [

        { tier: "Deposition & Etch Equipment", fn: "Deposit thin-film layers atom-by-atom through chemical and physical vapor deposition (CVD, ALD, PVD), and etch features with sub-angstrom dimensional control through plasma and wet chemistries — together building the transistor gate stacks, metal interconnects, dielectric isolation layers, and contact structures that constitute a working integrated circuit across 500–1,500 individual process steps. Atomic layer deposition (ALD) has become the critical deposition technique for sub-3nm nodes: it deposits materials one atomic monolayer at a time in a self-limiting surface reaction, enabling conformality in high-aspect-ratio structures (gate-all-around transistors, capacitor trenches) that CVD cannot achieve. The etch equipment market is a functional duopoly: Lam Research and Applied Materials together control ~80% of plasma etch equipment revenue, with Tokyo Electron (TEL) at ~15%. Switching costs are absolute — each etch recipe is qualified on a specific equipment model over months of process development, and re-qualifying on a competitor's tool would require repeating the entire customer qualification process. Applied Materials leads in CVD and PVD; Lam leads in ALD and high-aspect-ratio etch; both are constrained by the same export control framework as ASML for advanced node equipment shipments to China.", chokepoint: "Partial", capital_intensity: "High", moat_type: "Process IP + Switching cost", margin_profile: "High", companies: [] },
        { tier: "Inspection & Metrology", fn: "Measure every critical dimension across each process layer and detect every printable defect before and after exposure — providing the real-time feedback loop that enables yield learning, statistical process control, and overlay correction that make advanced node manufacturing economically viable. Metrology is the sensory system of the fab: without optical and e-beam critical dimension (CD) measurement, overlay verification (confirming each lithography layer aligns to the previous within 1–2nm tolerance), and defect inspection (detecting sub-10nm particles on wafer surfaces), a fab operates blind to the drift in deposition thickness, etch rate, and alignment that continuously degrades yield. KLA Corporation holds ~55% of the process control equipment market — an entrenched position built on decades of recipe qualification: fab engineers develop thousands of inspection recipes tuned to KLA tool optics and algorithms, making switching to Onto Innovation or Zeiss tools a multi-year re-qualification effort that no fab undertakes lightly. As chip density increases and defect budget shrinks with each process node, inspection tool requirements become more stringent: the transition from EUV single-patterning at 5nm to high-NA EUV at 2nm requires detectable defect sizes below 5nm — demanding new inspection tool architectures rather than incremental improvements.", chokepoint: "Partial", capital_intensity: "Medium", moat_type: "Switching cost + Certification", margin_profile: "High", companies: [] },
        { tier: "Wafer Fabrication (Foundry / IDM)", fn: "Execute 500–1,500 precisely sequenced process steps — lithography, deposition, etch, ion implant, anneal, CMP, and metrology at each layer — to transform a blank silicon wafer into a wafer full of functional die, integrating every upstream tier into a manufacturable, yielding, and economically viable production process. Wafer fabrication is the most capital-intensive manufacturing activity on Earth: a leading-edge 3nm fab costs $20B+ to construct, requires 18 months of equipment installation and process qualification before first product wafer, and must achieve 95%+ equipment uptime to meet the cost model. TSMC's manufacturing advantage over Samsung and Intel is measured in yield, not just process node: TSMC consistently achieves 80–90% yield on NVIDIA's H100 (a 814mm² die on N4P) while competitors struggle to achieve comparable yields at smaller die sizes. The foundry model concentrates global advanced manufacturing into two companies — TSMC and Samsung — that together produce 100% of the world's sub-5nm chips and >90% of sub-7nm chips. This concentration is the single largest systemic risk in the AI compute supply chain and the primary motivation for the US CHIPS Act ($52B), EU Chips Act (€43B), and Japan/India semiconductor investment programs.", chokepoint: "Y", capital_intensity: "Very High", moat_type: "Process IP + Scale + Certification", margin_profile: "High (cyclical)", companies: [

        { tier: "Advanced Packaging (CoWoS / SoIC)", fn: "Integrate multiple heterogeneous die — GPU compute die, HBM memory stacks, I/O chiplets, and network interface dies — onto a silicon interposer or via direct 3D hybrid bonding using CoWoS, SoIC, InFO, or Foveros architectures, enabling bandwidth and performance levels that a single monolithic die cannot achieve. Advanced packaging is the fastest-moving and most capacity-constrained step in the AI hardware supply chain: TSMC's CoWoS (Chip-on-Wafer-on-Substrate) capacity was the binding constraint on NVIDIA H100 production in 2023, with lead times of 52+ weeks due to the silicon interposer manufacturing bottleneck. The economic driver is Moore's Law exhaustion: as transistor scaling slows below 3nm, integrating more chips in one package delivers performance gains that single-die scaling can no longer provide cost-effectively. CoWoS places GPU and HBM on a shared silicon interposer to enable the 1.2 TB/s memory bandwidth the H100 delivers — bandwidth that off-package HBM4 or GDDR7 cannot match. SoIC (System on Integrated Chips) takes this further with face-to-face hybrid bonding at <10-micron bump pitch, enabling die-to-die bandwidth of tens of TB/s. The CoWoS silicon interposer supply chain is nearly entirely concentrated at TSMC, with Amkor providing overflow capacity.", chokepoint: "Y", capital_intensity: "High", moat_type: "Process IP + Scale", margin_profile: "High", companies: [

        { tier: "OSAT — Assembly & Test", fn: "Dice wafers into individual die, wire-bond or flip-chip attach die to lead frames or substrates, overmold in epoxy compound, and test finished packages at volume — the high-scale outsourced semiconductor assembly and test (OSAT) tier that handles the majority of global chip packaging volume beneath the specialized advanced packaging layer. OSAT is the labor- and capital-intensive final step that turns a tested wafer into a packaged, marked, and tested device ready for PCB assembly. The market is dominated by ASE Technology (Taiwan), Amkor Technology (US-listed, fabs in Korea/Vietnam/Portugal), and JCET (China) — three companies that collectively handle >60% of outsourced assembly volume. The OSAT market has bifurcated: commodity wire-bond packaging for consumer and automotive chips is migrating to lower-cost geographies (Vietnam, Malaysia, Philippines) as Taiwan capacity cost rises; while advanced flip-chip, SiP (system-in-package), and fan-out wafer-level packaging for high-performance chips remains Taiwan-concentrated due to the substrate and equipment ecosystem. AI-driven demand for advanced packaging (CoWoS, InFO, SoIC) is flowing to TSMC's captive packaging operation rather than OSATs, structurally disadvantaging traditional OSAT players for the highest-value packages.", chokepoint: "Partial", capital_intensity: "High", moat_type: "Scale + Customer lock-in", margin_profile: "Medium", companies: [] },
        { tier: "Test & Burn-In", fn: "Electrically verify every die at wafer probe and every packaged device after assembly; stress-screen for latent defects through elevated temperature and voltage burn-in; and characterize performance bins that determine whether a chip ships as a high-end part or a cost-reduced variant. Test is the quality gatekeeper between the fab and the customer: without 100% electrical testing, defective chips that pass visual inspection would ship to customers, causing field failures in end products where the cost of a warranty return is 10–100× the original chip cost. The semiconductor ATE (automated test equipment) market is a duopoly: Teradyne (~50% share) and Advantest (~35% share) together supply virtually all SoC testers and memory testers used in production. An ATE tester that qualifies for a specific chip design at one customer is not interchangeable with another tool — test programs are customized to each device and represent years of investment by the customer's test engineering team. Burn-in — running chips at elevated temperature (125°C+) and voltage for 24–168 hours — screens for the 'infant mortality' failure rate that exponentially decreases after initial stress, ensuring that the surviving population shipped to customers has a MTBF consistent with the product's reliability specification.", chokepoint: "Partial", capital_intensity: "Low–Medium", moat_type: "Certification", margin_profile: "Low–Medium", companies: [

        { tier: "MLCC Manufacturing", fn: "Stack hundreds of alternating ceramic dielectric and metal electrode layers, cofiring them in a kiln at 1,200°C, then terminating the fired block with conductive end caps to produce multilayer ceramic chip capacitors (MLCCs) — the most ubiquitous passive component in electronics, with approximately 4 trillion units consumed globally per year. MLCCs are the decoupling capacitors that stabilize power delivery to every digital chip: a modern server CPU requires 300–500 MLCCs in its power delivery network to suppress voltage transients during fast load steps; an NVIDIA H100 GPU server contains 10,000+ MLCCs across the mainboard and GPU module. MLCC manufacturing is a precision ceramic process: dielectric layers must be cast as 1–3 micron green ceramic tapes, printed with sub-micron silver electrode patterns, stacked with 200–1,000 alternating layers, and cofired without delamination or camber. The global MLCC market is a tight oligopoly — Murata (~40% share), TDK, Samsung Electro-Mechanics, and Yageo — with the top four players controlling ~80% of volume. AI-server-grade MLCCs command premium pricing due to the X7R/X7T dielectric specification required for stability under the high-frequency switching currents in GPU power delivery networks.", chokepoint: "Partial", capital_intensity: "High", moat_type: "Scale + Process IP", margin_profile: "Medium–High", companies: [

        { tier: "Inductor & Transformer Mfg", fn: "Wind, press, or print inductive components — power inductors, common-mode chokes, RF chokes, pulse transformers, and planar magnetics — for power conversion switching circuits, EMI filtering, and signal isolation across DC-DC converters, power supplies, motor controllers, and communications interfaces. Inductors are the energy-storage elements in every switching power supply: a 48V-to-1V voltage regulator converting power for an AI GPU core requires a bank of high-current output inductors that store energy during the switch-on phase and release it during switch-off — the inductance value and DC resistance of these components directly determine converter efficiency and transient response. Power inductors for AI server power delivery are a fast-growing segment: each NVIDIA B200 GPU uses a 700W+ TDP, requiring multiple phases of point-of-load conversion with high-current inductors operating at multi-MHz switching frequencies. Wirewound inductors (coil wound on a ferrite core) dominate the precision and high-inductance market; thin-film and multilayer inductors (printed layers of conductor and ferrite on ceramic substrate) serve the surface-mount, high-frequency miniature market. TDK, Murata, Würth Elektronik, and Vishay are the primary suppliers, with Japanese magnetic material science forming the underlying intellectual property moat.", chokepoint: "N", capital_intensity: "Medium", moat_type: "Scale + Certification", margin_profile: "Medium", companies: [] },
        { tier: "Power Management ICs & Gate Drivers", fn: "Design and supply the analog power-conversion silicon — voltage regulators (VRMs), point-of-load DC-DC converters, power management ICs (PMICs), and gate drivers — that regulates, sequences, and delivers precise voltages to every digital load in a system, making power delivery efficiency and density the binding constraint on AI compute-node performance per watt. AI server power architecture has undergone a fundamental shift: the industry is transitioning from 12V single-stage power delivery (VRM on motherboard) to 48V-to-point-of-load architectures where a higher bus voltage reaches the CPU/GPU board, then a high-efficiency VRM delivers the final 0.7–1.0V core supply within millimeters of the chip. This transition directly benefits high-integration PMIC designers: Monolithic Power Systems' integrated voltage regulator modules (MPS2971, MPM2920) combine control IC, FETs, and inductor into a tiny package, enabling denser power delivery than discrete component implementations. Gate driver ICs are the interface between the digital PWM controller and the power FET — they must drive the FET gate with precise timing and adequate current (2–10A peaks) to achieve low switching losses at multi-MHz frequencies without ringing or shoot-through. The power density arms race in AI servers is a sustained tailwind for PMIC designers: each generation of GPU requires higher peak current delivery in a smaller PCB area.", chokepoint: "Partial", capital_intensity: "Low–Medium", moat_type: "Process IP + Design-win lock-in", margin_profile: "High", companies: [

        { tier: "PCB Fabrication", fn: "Etch, drill, plate, and laminate copper circuit layers onto insulating substrate materials to create printed circuit boards — the fundamental mechanical and electrical interconnect platform that physically mounts and electrically connects every component in an electronic system. PCB fabrication has bifurcated into commodity (consumer, automotive, standard server) and high-complexity (AI server, RF, high-speed SerDes) segments with very different margin profiles. An AI server mainboard is a 12–24 layer PCB with 100+ micron trace widths, controlled impedance for 112G/224G differential pairs, back-drilling to remove stub reflections, and tight surface finish requirements for high-speed connectors — properties that require specialized materials (low-loss MEGTRON 7 or Rogers laminates) and precise process control. Leading AI-server PCB manufacturers are concentrated in Taiwan (TTM Technologies Taiwan, Tripod Technology) with some capacity in Korea and the US. The global PCB market is $90B+ annually but highly fragmented — hundreds of suppliers globally, with competitive differentiation at the top end based on material capability, layer count, minimum feature size, and reliability testing infrastructure. Advanced HDI (high-density interconnect) PCBs for smartphones and AI computing are technically adjacent to IC substrates at the finest feature sizes.", chokepoint: "N", capital_intensity: "Medium", moat_type: "Scale + Certification", margin_profile: "Low–Medium", companies: [] },
        { tier: "IC Substrate Manufacturing", fn: "Build the fine-pitch IC substrates — organic laminate or ceramic multi-layer structures with microvias, embedded traces, and surface finishes engineered for C4 flip-chip bump attachment — that electrically bridge the IC die's sub-100 micron bump pitch to the PCB's coarser millimeter-scale BGA pattern. IC substrates are the most technically demanding segment of the semiconductor packaging supply chain and the single largest material cost in a flip-chip BGA package: a 50mm × 50mm flip-chip substrate for an NVIDIA GPU or Apple M-series chip costs $30–$80 each, contains 8–10 routing layers built up from an ABF (Ajinomoto Build-up Film) core, and requires laser-drilled microvias with 25–50 micron diameters to route thousands of signals through a 200-layer-deep stack. The global IC substrate market is a tight oligopoly: Ibiden (Japan), Shinko (Japan), Unimicron (Taiwan), and Samsung Electro-Mechanics control the majority of advanced flip-chip substrate capacity. Demand is chronically undersupplied for high-end GPU and AI accelerator substrates: the 2020–2022 substrate shortage delayed GPU and CPU production by 6–12 months, and capacity additions require 3–4 year lead times due to the capital intensity and yield qualification period for leading-edge substrate lines.", chokepoint: "Y", capital_intensity: "High", moat_type: "Process IP + Qualification", margin_profile: "High", companies: [] },
        { tier: "Connector & Socket Manufacturing", fn: "Form, plate, and assemble the mechanical and electrical interfaces — board-to-board connectors, cable-to-board connectors, CPU and GPU sockets, optical fiber connectors, backplane connectors, and blind-mate power connectors — that physically link PCBs, memory modules, storage devices, cables, and rack systems into a functioning electronic product. Connectors are the unglamorous but essential mechanical layer of every system: a modern AI server chassis contains 500–1,000+ individual connector contacts across its power, signal, and data path connections, and a single intermittent contact failure in a high-speed connector can cause the entire system to fail while appearing to work correctly from a distance. High-speed signal integrity is the primary technical driver in the connector market: PCIe Gen5/Gen6, CXL 3.0, and 224G electrical cables require connector designs with controlled impedance, matched length, and low cross-talk — electrical requirements that demand precision molding, plating uniformity, and dimensional tolerances under 10 microns. Amphenol, Molex (now Koch Industries), TE Connectivity, and Samtec dominate the high-speed connector market; their defense and aerospace product lines (MIL-DTL-38999, ARINC 600) command premium pricing due to environmental and qualification requirements that commercial connector designs cannot satisfy.", chokepoint: "N", capital_intensity: "Medium", moat_type: "Switching cost + Certification", margin_profile: "Medium–High", companies: [] },
        { tier: "PCB Assembly (EMS / PCBA)", fn: "Place and solder all surface-mount and through-hole components onto populated printed circuit boards at high volume using automated surface-mount technology (SMT) pick-and-place lines, reflow ovens, selective soldering, and automated optical inspection (AOI) — the final component-level integration step before system-level assembly and test. PCB assembly (PCBA) is where the bill of materials converts into a functioning electronic subassembly: a single AI server motherboard PCBA may contain 2,000–5,000 individual component placements, including fine-pitch BGAs with sub-0.4mm ball pitch, passives at 0201 and 01005 case sizes, and high-pin-count connectors that require precision automated placement beyond human hand-soldering capability. Electronics manufacturing services (EMS) is a highly competitive, thin-margin contract manufacturing industry: Foxconn/Hon Hai (~$200B revenue), Jabil, Flex, and Pegatron compete primarily on labor cost efficiency, geographic footprint matching customer supply chains, and material procurement scale. AI server PCBA is a premium sub-segment: the thermal sensitivity of high-end CPU/GPU packages, complex BGA rework requirements, and customer-specific testing programs (ICT, functional test, burn-in) create switching costs and qualification barriers that commodity PCBA assemblers cannot meet, concentrating AI server PCBA at Foxconn Industrial Internet, Super Micro's in-house manufacturing, and a small number of specialized EMS providers.", chokepoint: "N", capital_intensity: "Low–Medium", moat_type: "Scale + Customer lock-in", margin_profile: "Low–Medium", companies: [] }

        { tier: "Mineral Processing & Concentration", fn: "Liberate and concentrate target minerals from their gangue rock matrix through comminution (crushing and grinding to <200 micron particle sizes), physical separation (flotation, gravity separation, magnetic separation), and de-watering to produce a filter-pressed or thickened concentrate containing 20–35% metal content that can be economically transported to a smelter. Mineral processing is the value-extraction step that transforms low-grade ore (0.3–1.5% copper, 0.5–1.5 g/t gold, 0.1–0.5% lithium equivalent) into a saleable intermediate product: without processing, a 0.5% copper ore body is worth nothing because the energy cost of smelting 200 tons of rock to produce 1 ton of copper would exceed the metal value. Froth flotation is the dominant copper, zinc, lead, and molybdenum concentration method: ore particles are ground fine enough that individual mineral grains separate, then suspended in water with selective chemical reagents (collectors, frothers) that make target mineral surfaces hydrophobic so they attach to air bubbles and float to the surface as concentrate. Lithium processing uses a different route: hard-rock spodumene concentrate is upgraded to lithium carbonate or hydroxide via acid roasting, while brine lithium uses solar evaporation ponds followed by selective chemical precipitation. Processing recovery efficiency — what percentage of contained metal ends up in concentrate rather than tailings — is a key operating metric that separates world-class operations from marginal ones.", chokepoint: "Partial", capital_intensity: "High", moat_type: "Scale + Location", margin_profile: "Cyclical", companies: [] },
        { tier: "Primary Smelting & Pyrometallurgy", fn: "Reduce metal from concentrate using high-temperature furnaces, flux additions, and controlled atmospheric chemistry — through flash smelting, reverberatory furnaces, or electric arc furnaces — to produce crude metal or matte intermediate products for subsequent refining. Pyrometallurgy converts metal sulfide or oxide concentrates into a metal-rich phase by driving off sulfur (as SO₂, captured as sulfuric acid byproduct at modern smelters), gangue materials (as slag), and moisture. Flash smelting (Outotec process, used by most copper smelters) is the industry-leading technology: concentrate and oxygen are injected into a furnace where the sulfide particles combust in flight, reaching 1,200°C+ and producing copper matte (65–70% Cu) in a single continuous step without external fuel. The SO₂ off-gas is the critical environmental control point: MARPOL and EU Industrial Emissions Directive require 99%+ SO₂ capture; non-compliant smelters face operating license cancellation, making environmental compliance a significant capital investment barrier. China controls a disproportionate share of global smelting capacity: approximately 40% of global copper smelting and >70% of rare earth smelting is located in China, creating the geopolitical concentration risk that the US, EU, and allies are attempting to rebalance through reshoring incentives and alternative supply development programs.", chokepoint: "Partial", capital_intensity: "Very High", moat_type: "Scale + Geographic concentration", margin_profile: "Cyclical", companies: [] },
        { tier: "Electrolytic Refining & Hydrometallurgy", fn: "Remove impurities from crude metal through electrochemical dissolution and selective deposition (electrolytic refining) or through aqueous chemical dissolution and selective precipitation (hydrometallurgy) to produce refined metal meeting London Metal Exchange (LME) delivery grade specifications: 99.99% purity for copper cathode, 99.9% for nickel, 99.99% for cobalt. Electrolytic copper refining is the final purification step: crude 'blister copper' (98.5–99.5% Cu) cast as anodes is suspended in copper sulfate electrolyte, and pure copper selectively dissolves and deposits onto cathode blanks at controlled current density, leaving precious metal impurities (gold, silver, platinum group metals) as anode slime that is further processed to recover them. Hydrometallurgy (solvent extraction-electrowinning, SX-EW) enables copper extraction directly from oxide ores that flotation cannot process: copper dissolves in dilute sulfuric acid (heap leach or vat leach), is selectively stripped into an organic solvent, and is electroplated directly to cathode grade without a smelting step — allowing operations at lower grades and in jurisdictions where SO₂ emission permits for smelters are unavailable. Battery-grade lithium production requires hydrometallurgical refining to 99.5%+ Li₂CO₃ or LiOH·H₂O purity, with trace contaminants (iron, calcium, magnesium) controlled to below 10ppm to avoid battery performance degradation.", chokepoint: "N", capital_intensity: "High", moat_type: "Scale + Process IP", margin_profile: "Cyclical", companies: [

        { tier: "Rare Earth Separation & Critical Mineral Refining", fn: "Separate individual rare earth elements (REEs) — neodymium, praseodymium, dysprosium, terbium, lanthanum, cerium, and 11 others — from mixed rare earth carbonate or chloride feed using solvent extraction (SX) circuits that exploit subtle differences in REE ionic radii, and refine critical byproduct metals (gallium, indium, germanium, cobalt) from process streams to device-usable purity. Rare earth separation is the chokepoint that defines China's effective monopoly over global REE supply: while rare earth ores are mined in multiple countries (Australia, US, Canada, India), the solvent extraction separation chemistry required to produce individual rare earth oxides or metals at commercial scale is a process IP that China has spent 40 years developing and that is extremely difficult to replicate without decades of operational experience. A full REE SX circuit requires 50–200 mixer-settler stages arranged in cascade, custom-designed organic extractants (Cyanex, PC88A, D2EHPA) with REE-specific selectivity, and acid/base regeneration loops — generating significant acidic wastewater requiring licensed treatment. The strategic criticality is acute: neodymium-praseodymium (NdPr) metal is the essential input to NdFeB permanent magnets used in EV motors, wind turbine generators, and military guidance systems; China processes ~90% of global NdPr, creating a single-point-of-failure in the supply chains of every major energy transition technology.", chokepoint: "Y", capital_intensity: "High", moat_type: "Geographic monopoly + Process IP", margin_profile: "High", companies: [

        { tier: "Silicon & SiC Precursor Production", fn: "Upgrade metallurgical-grade silicon (MG-Si, 98–99% purity, produced by arc-furnace reduction of quartz) through the Siemens process or fluidized bed reactor (FBR) to electronic-grade polysilicon (EG-Si, 99.9999999% or 9N purity), and synthesize silicon carbide (SiC) powder at controlled stoichiometry and particle size for advanced power semiconductor substrates. Polysilicon production is a highly energy-intensive, multi-step chemical purification process: MG-Si is converted to trichlorosilane (SiHCl₃) gas, distilled through fractional distillation to remove boron and phosphorus impurities to below 1 part per trillion, then decomposed on heated silicon rods at 1,100°C (Siemens process) or in a fluidized bed (FBR process, lower energy, preferred by newer capacity). Global polysilicon supply is now dominated by Chinese producers (GCL-Poly, Daqo, Tongwei) after a decade of overcapacity-driven pricing that drove out Western producers — Wacker Chemie (Germany) remains the largest non-Chinese polysilicon producer. SiC powder synthesis requires reacting high-purity silica sand with petroleum coke in an Acheson resistance furnace at 2,200°C — an energy-intensive, batch process that produces alpha-SiC crystals subsequently milled, classified, and purified to the particle size and impurity specifications required for SiC crystal growth (PVT method) to produce SiC wafers for power device applications.", chokepoint: "Y", capital_intensity: "Very High", moat_type: "Process IP + Scale", margin_profile: "High", companies: [] },

        { tier: "Launch Services", fn: "Deliver payloads to orbit via expendable or reusable launch vehicles — the physical access layer that enables every satellite constellation, space station resupply, and government space mission. Launch is the gating bottleneck for any satellite-based connectivity system: a constellation requires dozens to hundreds of launches over several years, and launch vehicle availability, cadence, and cost-per-kilogram determine whether a satellite business model is economically viable. SpaceX's Falcon 9 reusability breakthrough has reduced launch costs from ~$60,000/kg to ~$2,700/kg since 2010, expanding the addressable market for small satellite constellations from a handful of government programs to hundreds of commercial operators. The investable opportunity in launch is concentrated at the margins of SpaceX's dominance: Rocket Lab serves the dedicated small-payload market (1–300kg) that cannot fill a Falcon 9 rideshare slot without mission schedule compromise. Reusability economics increasingly favor rockets with high flight rates — the first-stage refurbishment cost is amortized across more launches — creating a winner-take-most dynamic in each payload class that limits the number of sustainable commercial launch providers globally.", chokepoint: "Partial", capital_intensity: "Very High", moat_type: "Scale + Reusability economics", margin_profile: "Low–Medium", companies: [
          { ticker: "RKLB", name: "Rocket Lab USA", mkt_cap: "Mid", notes: "The only US rocket company besides SpaceX launching commercially on a regular cadence — serves small satellite operators for whom SpaceX's Falcon 9 is overkill, and is the US government's mandated second-source for national security launches." }
        ]},
        { tier: "Satellite Bus Manufacturing", fn: "Design and produce the structural, electrical power, thermal management, propulsion, and attitude-control subsystems that physically host a satellite payload in orbit and maintain its position, pointing, and health for the design lifetime of 5–15 years. The satellite bus is the common platform layer beneath every satellite mission: whether the payload is a broadband communications transponder, an Earth observation camera, or a scientific instrument, it relies on the bus for solar panel power generation, battery storage, thruster maneuverability, reaction wheel attitude control, thermal radiators, and command/telemetry communication with the ground segment. Bus manufacturing has bifurcated into two approaches: traditional large GEO buses (SSL, Airbus OneWeb Technologies) optimized for 15-year lifespan in individual satellites; and high-volume LEO bus designs (SpaceX Starlink, Planet Labs) that treat satellites as mass-produced consumer electronics with 3-5 year design lives and regular replenishment launches. Rocket Lab's Photon and Pioneer bus platforms extend its vertically integrated model from launch vehicle through spacecraft — capturing a second revenue stream from customers who need a complete satellite solution rather than just a rocket.", chokepoint: "Partial", capital_intensity: "High", moat_type: "Vertical integration + Qualification", margin_profile: "Medium", companies: [

        { tier: "Payload Manufacturing", fn: "Design and produce the mission-specific payload — RF transponders, optical apertures, synthetic aperture radar (SAR) antennas, or multispectral imaging cameras — that transmits, receives, or collects the data that defines the satellite's commercial value. The payload is the revenue-generating element of a satellite system; the bus simply keeps it alive and pointed. RF payloads for broadband communications (Ka-band or V-band transponders, phased-array antennas, digital signal processors) determine spectral efficiency and throughput per satellite. Earth observation payloads are differentiated by resolution: sub-30cm resolution cameras are subject to US export controls, creating a domestic advantage for US-based satellite imagery providers. The chokepoint at this tier is radiation-hardened electronics: satellite-grade components must be manufactured to withstand years of cosmic ray and Van Allen belt radiation without bit-flip errors that would corrupt data or trigger incorrect commands. Rad-hard FPGA, memory, and processing components are produced in very small volumes by specialized manufacturers (Microchip Technology, BAE Systems), creating long lead times and supply constraints for new constellation programs.", chokepoint: "Y", capital_intensity: "Very High", moat_type: "Process IP + Spectrum licensing", margin_profile: "High", companies: [] },

        { tier: "Satellite Connectivity Services", fn: "Sell broadband internet, IoT data backhaul, narrowband messaging, and direct-to-device connectivity services to enterprise, government, maritime, aviation, and consumer end markets over owned satellite capacity or resold wholesale bandwidth from other operators. Satellite connectivity is experiencing its first structural TAM expansion in a decade driven by LEO constellation deployment: SpaceX Starlink has demonstrated that LEO orbits (340–550km altitude) enable latency of 20-40ms, making satellite internet genuinely competitive with DSL and cable in rural markets for the first time. The addressable market spans geographic white spaces (rural broadband, maritime, aviation) that terrestrial networks cannot economically reach; regulated industries requiring backup connectivity (energy, mining, government); and the emerging direct-to-cell market (ASTS SpaceMobile) that provides satellite coverage directly to existing consumer smartphones without any user hardware. The direct-to-cell opportunity is the largest total addressable market in satellite history: the global installed base of LTE/5G smartphones is 6+ billion devices, and providing satellite coverage to users in areas without terrestrial signal could generate meaningful per-subscriber revenue for the operators whose networks are extended.", chokepoint: "N", capital_intensity: "Low", moat_type: "Customer relationships + Spectrum", margin_profile: "Medium", companies: [

        { tier: "User Terminal Manufacturing", fn: "Produce the phased-array antennas, modems, RF front-ends, and weatherproof enclosures that end users install at their premises (home, vessel, aircraft, vehicle) to connect to a satellite broadband network. User terminal economics are the primary gating variable for consumer satellite broadband adoption: SpaceX's Starlink terminal initially cost $599 to produce and was subsidized to $499 retail, representing a 3-5 year payback on terminal hardware costs alone — a consumer adoption barrier that later manufacturing scale and flat-panel phased-array cost reductions are reducing toward $200. Phased-array user terminals — electronically steered flat-panel antennas without moving mechanical parts — are replacing traditional dish antennas in LEO constellations because they can track satellites moving across the sky at 27,000 km/h without motors, tolerating vibration and enabling mobile applications (maritime, aviation, vehicle). The terminal RFIC and beamforming chip inside phased-array antennas (typically GaN or SiGe at Ka-band) is the highest-value component and primary differentiator between antenna generations. Volume manufacturing of consumer-priced satellite terminals requires electronics manufacturing scale comparable to consumer electronics production, favoring ODMs with established high-mix, high-volume assembly capabilities.", chokepoint: "Partial", capital_intensity: "Medium", moat_type: "RFIC design IP + Ecosystem lock-in", margin_profile: "Medium–High", companies: [] },
        { tier: "Satellite Manufacturing Support & Testing", fn: "Supply the radiation-hardened electronics (rad-hard FPGAs, processors, memory), specialty materials (carbon-fiber composite structures, multi-layer insulation, atomic oxygen-resistant coatings), and environmental test services (thermal vacuum cycling, vibration, acoustic, and electromagnetic compatibility testing) that ensure satellite reliability through the harsh launch and orbital environments. Environmental testing is the final gate before launch: every satellite must survive vibration loads equivalent to rocket liftoff, thermal cycling between -180°C (eclipse) and +120°C (sunlight) in vacuum, and radiation dose accumulation equivalent to years of cosmic ray exposure — all without failure, since on-orbit repair is impossible. Radiation hardening is the most specialized requirement: total ionizing dose (TID) from the Van Allen belts degrades standard CMOS circuits over years of exposure, and single-event upsets (SEUs) from heavy ion strikes can flip bits in memory and registers — requiring either inherently rad-hard manufacturing processes or error-correction coding at every memory tier. The qualification moat is absolute: a new rad-hard component supplier must accumulate years of space-heritage data (successful missions in orbit) before defense or civil space agencies will specify it in new programs.", chokepoint: "Partial", capital_intensity: "High", moat_type: "Qualification moat", margin_profile: "High", companies: [] },
        { tier: "Spectrum & Orbital Operations", fn: "Coordinate, file, and manage radio frequency spectrum allocations and orbital slot assignments through the ITU (International Telecommunication Union) coordination process across the full satellite lifecycle — from initial filing through successful coordination with all other spectrum users, through active operations management of interference cases, and finally through deorbit or graveyard orbit disposal at mission end. Spectrum and orbital position are the scarcest, most legally defensible assets in the satellite industry: orbital slots in the geostationary arc (35,786km) are finite and allotted by ITU member states; non-geostationary (NGSO) spectrum filings require complex coordination across overlapping constellations; and the seven-year ITU 'bring into use' deadline (a satellite must be launched within seven years of filing or the spectrum rights lapse) creates a race to launch paper constellations before competitors. LEO mega-constellations (Starlink, OneWeb, Amazon Kuiper) are creating unprecedented coordination complexity in the Ku, Ka, and V frequency bands, with each new filing requiring bilateral coordination with hundreds of previously filed systems. Spectrum filings are intangible assets whose value exceeds the physical satellites in many cases — a strategic moat that no amount of capital can accelerate past ITU timelines.", chokepoint: "Y", capital_intensity: "Low–Medium", moat_type: "Regulatory moat", margin_profile: "High", companies: [] }

        { tier: "High-Voltage Transmission & Grid Infrastructure", fn: "Transform, transmit, and switch electrical power at extra-high and high voltage levels (66kV–800kV) from generation source to load center, including the substations, transformers, switchgear, and transmission lines that form the bulk power network. High-voltage transmission is the most critical bottleneck in the AI power buildout: the US grid has a 3-5 year lead time on new high-voltage transformer procurement and a 7-10 year permitting timeline for new transmission corridors, while AI data center demand is materializing in 12-24 months. The transformer shortage is real and severe: HVDC transformers used in new data center interconnects have lead times of 70-100 weeks, and the global supply is concentrated in a handful of manufacturers (ABB, Hitachi Energy, Siemens Energy). HVDC (High-Voltage Direct Current) transmission is becoming the preferred architecture for long-distance power delivery from remote renewables to urban AI data center clusters, with Siemens Energy's HVDC converters and ABB's HVDC Lite systems commanding substantial premiums. This tier's investment case is a structural multi-decade infrastructure deficit meeting an accelerating demand shock.", chokepoint: "Y", capital_intensity: "Very High", moat_type: "Scale + Certification + Geographic monopoly", margin_profile: "Medium (regulated)", companies: [

        { tier: "Grid-Scale Energy Storage (BESS)", fn: "Store bulk electrical energy in electrochemical form (lithium iron phosphate battery systems, flow batteries) and discharge on demand to provide grid capacity, frequency response services, and energy arbitrage — the buffering layer that firms up variable renewable generation and enables grid operators to match supply and demand in real time. Battery Energy Storage Systems (BESS) have become a critical grid infrastructure asset as the rapid buildout of solar and wind generation creates a structural need for dispatchable, fast-responding storage to balance load and prevent curtailment. For AI data centers, grid-scale BESS adjacent to the facility provides a dual benefit: backup power resilience during grid outages, and demand-charge management that reduces peak electricity costs by discharging stored energy during high-price periods. BESS deployments have grown from niche grid services to multi-hundred-megawatt installations co-located with renewable farms, now representing a $30B+ annual global market. The dominant battery chemistry for grid storage is LFP (lithium iron phosphate) due to its thermal stability, cycle life (4,000-6,000 cycles), and falling cost curve.", chokepoint: "N", capital_intensity: "High", moat_type: "Scale + Software", margin_profile: "Medium", companies: [

        { tier: "Advanced Nuclear — SMR & Microreactor", fn: "Design, license, manufacture, and operate small modular reactors (SMRs, 50–300 MWe) and microreactors (1–20 MWe) that provide firm, dispatchable, carbon-free power at scales suitable for industrial users, military installations, and remote AI data centers that cannot access the main grid. The AI-nuclear connection is becoming concrete: Microsoft signed a power purchase agreement to restart Three Mile Island Unit 1 (835MW) for data center power; Amazon and Google have signed SMR pre-purchase agreements with Kairos Power and X-energy. The investment case for SMRs rests on three advantages over large conventional nuclear: factory-manufactured modules that reduce construction risk versus site-built reactors; smaller footprint that enables co-location with AI data center campuses; and passive safety systems that eliminate the need for external cooling in a loss-of-coolant accident. NRC licensing timelines (10-15 years for conventional plants; NRC is developing streamlined SMR review processes targeting 3-5 years) remain the primary constraint. Microreactors targeting 1-20 MWe are pursuing even more aggressive timelines for remote and military applications.", chokepoint: "Partial", capital_intensity: "Very High", moat_type: "Certification + Process IP", margin_profile: "Very High (operating) / N/A (development)", companies: [

        { tier: "Hardware Security Root", fn: "Provides the silicon-level root of trust — the tamper-resistant cryptographic anchor that every higher software tier depends on for attestation, key storage, and verified boot. A hardware security root, implemented as a TPM 2.0 chip, ARM TrustZone secure enclave, AMD PSP, or Intel TDX, generates and stores private keys in hardware that software cannot exfiltrate, signs attestation evidence verifying a system's integrity before loading sensitive workloads, and establishes the unbroken chain of trust from power-on through hypervisor and application initialization. For AI infrastructure, hardware roots of trust have become essential for confidential computing: Intel TDX and AMD SEV-SNP create hardware-attested execution environments where model weights and customer data are encrypted even from the cloud operator — satisfying emerging regulatory requirements around AI data sovereignty and model IP protection. No large-cap public pure-play exists in this tier; major suppliers are Intel, AMD, and ARM (integrated into processors) and Infineon (discrete TPM chips). Investment exposure is indirect, through Compute Hardware sector tickers.", chokepoint: "Partial", capital_intensity: "Medium", moat_type: "Certification · Process IP", margin_profile: "High", companies: [] },
        { tier: "Identity & Access Management (IAM/PAM)", fn: "Governs who and what can authenticate to, and authorize actions within, enterprise systems, cloud resources, and AI infrastructure — the first and most foundational control plane in any security architecture. IAM covers authentication (verifying identity via password, MFA, passkey, or certificate), authorization (enforcing least-privilege RBAC and ABAC policies defining what an authenticated identity can do), and privileged access management (securing the most sensitive credentials behind time-limited, audited just-in-time access). For AI, IAM has expanded to cover non-human identities: the API keys, service principals, and machine accounts that AI agents and automated pipelines use are often more numerous and higher-privilege than human accounts, and their compromise has caused the majority of recent cloud security breaches. High switching costs — every application and cloud resource integrates with the IAM provider — combined with regulatory mandates (SOC 2, FedRAMP, ISO 27001 all require documented access controls), make IAM the stickiest tier of the enterprise security stack with near-zero voluntary churn.", chokepoint: "Partial", capital_intensity: "Low", moat_type: "Switching cost · Ecosystem", margin_profile: "Very High", companies: [
          { ticker: "SAIL", name: "SailPoint, Inc.", mkt_cap: "Large", notes: "Governs who can access what across large enterprises — enforces least-privilege access for thousands of employees and IT systems, shrinking the attack surface before any breach occurs. ~120% net revenue retention signals strong lock-in." }
        ]},
        { tier: "Endpoint Detection & Response (EDR)", fn: "Monitors every process, file, registry key, and network call on endpoints — laptops, servers, and cloud workloads — to detect and contain threats in real time by correlating behavioral signals that signature-based antivirus cannot catch. EDR agents collect continuous telemetry from the kernel level, streaming it to a cloud-native detection platform that applies behavioral analytics and machine learning to distinguish legitimate software from malware, ransomware delivery chains, and lateral movement activity. Modern XDR platforms extend EDR telemetry with network, identity, cloud, and email signals into a unified dataset, enabling attack chains to be reconstructed across multiple environments simultaneously. The market consolidation toward multi-module XDR increases switching costs: replacing the EDR agent requires renegotiating coverage for endpoints, identity, cloud, and SIEM simultaneously. AI-powered behavioral baselines (CrowdStrike Charlotte AI, Microsoft Security Copilot) are extending detection beyond known attack patterns to novel zero-day behaviors, further widening the quality gap between AI-native and legacy AV vendors.", chokepoint: "Partial", capital_intensity: "Low", moat_type: "Switching cost · Ecosystem · Scale", margin_profile: "Very High", companies: [
          { ticker: "CRWD", name: "CrowdStrike", mkt_cap: "Large", notes: "The definitive AI-native endpoint security platform — Falcon runs on 28M+ endpoints and detects novel threats without signature updates. Its Charlotte AI security agent sets the autonomous threat detection standard that every EDR competitor benchmarks against." }
        ] },
        { tier: "Network Detection & Response (NDR)", fn: "Inspects east-west (lateral, server-to-server) and north-south (perimeter, client-to-internet) traffic flows to detect anomalies, lateral movement, command-and-control beaconing, and data exfiltration attempts that endpoint agents cannot observe. NDR systems receive a copy of network traffic via SPAN port or TAP, decode protocols at layers 2–7, and apply behavioral analytics to identify deviations from learned baselines — a server suddenly communicating with an unusual external IP, or an endpoint scanning internal subnets (a classic lateral-movement indicator). Modern next-generation firewalls (NGFWs) combine stateful packet inspection, IPS/IDS, SSL inspection, and application-layer visibility into a single policy engine, blurring the boundary between traditional firewall, NDR, and SD-WAN. The investment thesis for network security vendors rests on the persistence of the network perimeter in hybrid environments: even as workloads move to the cloud, enterprise campuses, OT networks, branch offices, and AI training cluster fabrics continue to require hardware appliances for traffic inspection and enforcement.", chokepoint: "N", capital_intensity: "Medium", moat_type: "Scale · Switching cost", margin_profile: "High", companies: [
          { ticker: "FTNT", name: "Fortinet", mkt_cap: "Large", notes: "Network security appliance leader with a price-performance advantage over Palo Alto Networks for enterprise and mid-market — FortiGate firewalls dominate network perimeters, and its unified platform bundles SD-WAN, firewall, and NDR at a cost structure competitors struggle to match." }
        ] },
        { tier: "Cloud Security Posture (CSPM/CNAPP)", fn: "Continuously audits cloud infrastructure configurations and workload runtime behavior against security benchmarks (CIS Benchmarks, NIST CSF) and compliance frameworks (SOC 2, PCI-DSS, HIPAA), detecting and remediating the misconfigurations responsible for over 80% of cloud security breaches. CSPM corrects configuration drift by comparing each cloud resource's current settings against a desired secure state and alerting or auto-remediating deviations. CNAPP extends CSPM to include runtime threat detection in containers and Kubernetes workloads (CWPP), infrastructure-as-code scanning, API security posture, and developer security tooling embedded in CI/CD pipelines. The shift to multicloud environments dramatically expands the CNAPP TAM: each additional cloud (AWS, Azure, GCP, OCI) adds a distinct control plane with its own misconfiguration vectors, requiring a vendor-agnostic layer to provide unified visibility and remediation. As enterprises run AI workloads across multiple clouds simultaneously, CNAPP coverage of AI model serving endpoints and training infrastructure is becoming mandatory in regulated industries.", chokepoint: "N", capital_intensity: "Low", moat_type: "Ecosystem · Switching cost", margin_profile: "Very High", companies: [

        ] },
        { tier: "Data Security & Backup / Recovery", fn: "Protects data at rest and in motion through encryption, data loss prevention (DLP), rights management, and classification — and ensures recovery from ransomware, accidental deletion, or hardware failure through immutable, air-gapped backup architectures. Data security has become the last line of defense in the ransomware era: when perimeter and endpoint controls fail, the ability to recover clean data from an immutable backup that attackers cannot delete or encrypt determines whether the victim pays a ransom or recovers cleanly. Rubrik and Cohesity pioneered the data resilience category with snapshot-based immutable backup that stores multiple recovery points in a format attackers cannot modify, even with domain admin credentials. DLP tools monitor and block data movement to unauthorized destinations, addressing insider threat and accidental exfiltration. For AI, data security must extend to training data provenance and model weight protection — ensuring proprietary training corpora and fine-tuned model weights cannot be exfiltrated by attackers or insiders, a requirement increasingly cited in enterprise AI governance frameworks.", chokepoint: "Partial", capital_intensity: "Medium", moat_type: "Switching cost · Certification", margin_profile: "High", companies: [

        ]},
        { tier: "Security Operations (SIEM/SOAR/XDR)", fn: "Aggregates telemetry from all other security tiers — endpoint, network, identity, cloud, and email — correlates it into a unified event timeline, and automates investigation and response workflows to compress the time between attacker initial access and detection. SIEM ingests logs and events from hundreds of sources; SOAR automates the playbooks that tier-1 analysts follow when an alert fires; XDR extends native telemetry integration across the security stack into a cohesive response surface. The secular driver is attacker dwell time: enterprise teams must detect and contain breaches in minutes, not the days or weeks that manual SIEM workflows allow. AI-native SOC automation is collapsing this window — LLM-powered alert triage can reduce analyst review time per alert from 30 minutes to under 2, enabling smaller security teams to maintain higher coverage rates. Cortex XSIAM (PANW) and Microsoft Sentinel represent the two competing architectures: best-of-breed AI-native SOC versus hyperscaler-bundled security operations.", chokepoint: "N", capital_intensity: "Low", moat_type: "Scale · Ecosystem · Switching cost", margin_profile: "High", companies: [

        { tier: "Alignment & Safety Tuning", fn: "Adapt base foundation models to be helpful, harmless, and honest through supervised fine-tuning (SFT), preference learning (RLHF, DPO, PPO), and systematic safety evaluation that reduces harmful outputs while improving instruction-following quality. Alignment is the production-readiness step between a raw pre-trained base model and a deployable AI assistant: a base LLM trained on raw internet text will produce incoherent, harmful, or deceptive outputs without the SFT and RLHF stages that teach it to follow instructions, decline harmful requests, and express uncertainty. Constitutional AI (Anthropic), RLHF with human labelers (OpenAI), and Direct Preference Optimization are competing techniques for eliciting aligned behavior without reducing capability. For enterprise deployment, alignment encompasses domain-specific fine-tuning (adapting a general model to medical, legal, or financial conventions) and red-teaming (adversarial testing to discover jailbreaks before release). Regulatory pressure from the EU AI Act and US executive orders is institutionalizing alignment and safety evaluation as mandatory pre-deployment steps for high-risk AI systems. No large-cap public pure-play exists; this work is performed internally by foundation model labs.", chokepoint: "N", capital_intensity: "Low–Medium", moat_type: "Process IP", margin_profile: "Medium", companies: [] },
        { tier: "Model Optimization & Compilation", fn: "Reduce model size, latency, and compute cost for production inference without unacceptable quality degradation, using quantization, pruning, distillation, and hardware-specific kernel compilation. A Llama 3 70B model at full BF16 precision requires ~140GB of VRAM — more than any single GPU holds — but quantized to INT4 using GPTQ or AWQ, the same model fits in 35GB and runs on two A100s with under 3% quality degradation on standard benchmarks. Techniques include: post-training quantization (PTQ) — reducing weight precision from 32/16-bit to 8/4/3-bit; structured pruning — removing attention heads or layers whose ablation minimally impacts output quality; knowledge distillation — training a smaller student model to mimic a larger teacher; and hardware-specific kernel compilation (CUDA kernels, TensorRT, XLA for TPUs) that optimizes memory access patterns for each accelerator architecture. These optimizations span a 100x efficiency gap: a model that costs $10 per million tokens unoptimized can cost $0.10 optimized — the difference that determines whether AI applications are economically viable in production at consumer scale.", chokepoint: "N", capital_intensity: "Low", moat_type: "Process IP (inference kernels) + Switching cost", margin_profile: "Medium–High", companies: [] },
        { tier: "Inference Serving & Scaling", fn: "Serve model inference at scale with low P50/P95 latency, high throughput, and cost-efficient GPU utilization through continuous batching, KV cache management, speculative decoding, and dynamic request routing. Inference serving is distinct from training: while training maximizes GPU utilization over long deterministic runs, inference must respond to unpredictable request bursts with consistent latency while maximizing the concurrent requests sharing GPU memory. vLLM's PagedAttention (2023) was the breakthrough: managing the KV cache like a virtual memory system, enabling GPU memory to be shared across thousands of concurrent requests without reallocation overhead. Speculative decoding allows a small draft model to predict next tokens while the large model verifies in parallel, reducing per-token latency 2–3x with no quality loss. Continuous batching allows new requests to join mid-flight. The economics are stark: an unoptimized deployment might achieve 10% GPU utilization; an optimized vLLM or TensorRT-LLM deployment reaches 70–80%, reducing per-token cost 7–8x. Hyperscalers and GPU clouds are the primary providers of inference compute at scale.", chokepoint: "Y", capital_intensity: "High", moat_type: "Ecosystem + Process IP + Switching cost", margin_profile: "High", companies: [
