<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Ecosystem Map · 2026-05-26</title>
<style>
:root {
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
  --text:#e6edf3; --muted:#8b949e; --border:#30363d;
  --amber:#d4a017; --green:#3fb950; --blue:#58a6ff;
  --orange:#e3812b; --purple:#bc8cff; --pink:#ff7b72;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5}

/* ── Shell ── */
#app{display:flex;flex-direction:column;height:100vh}
#hdr{display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden}
.logo{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--muted);white-space:nowrap;flex-shrink:0}
.fbar{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.fbar::-webkit-scrollbar{display:none}
.fbtn{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.fbtn:hover{color:var(--text);border-color:var(--muted)}
.fbtn.on{background:transparent;color:var(--text);border-color:var(--blue)}

#main{display:flex;flex:1;overflow:hidden}

/* ── Graph Panel ── */
#gp{width:50%;border-right:1px solid var(--border);overflow:auto;background:var(--bg);position:relative;flex-shrink:0}
#eco-svg{display:block}

/* ── Detail Panel ── */
#dp{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}

/* ── Empty state ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:40px;text-align:center}
.empty-ico{font-size:36px;opacity:.2}
.empty-h{font-size:15px;color:var(--muted)}
.empty-sub{font-size:12px;color:var(--border);line-height:1.6;max-width:260px}

/* ── SVG node states ── */
@keyframes flowFwd{to{stroke-dashoffset:-22}}
.eco-edge{fill:none;pointer-events:none}
.eco-edge.anim{stroke-dasharray:6 4;animation:flowFwd 1.4s linear infinite}
.eco-edge.slow{animation-duration:2.5s}
.eco-edge.fast{animation-duration:.75s}

/* ── Breadcrumb ── */
.bc{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);flex-shrink:0}
.bc a{color:var(--blue);cursor:pointer}
.bc a:hover{text-decoration:underline}
.bc-sep{color:var(--border)}

/* ── Detail body ── */
.db{padding:20px}
.dh{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.dt{font-size:22px;font-weight:700}
.dd{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:20px;max-width:560px}

/* ── Sections ── */
.sec{margin-bottom:24px}
.sec-h{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* ── Badges ── */
.dim-b{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.06em}
.dim-D1{background:#1a0d2e;color:var(--purple)}
.dim-D2{background:#0d1f35;color:var(--blue)}
.dim-D3{background:#0d2010;color:var(--green)}
.dim-D4{background:#2d1a00;color:var(--amber)}
.dim-D5{background:#2d0d1a;color:var(--pink)}
.ck-b{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700}
.ck-Y{background:#2d1a00;color:var(--amber)}
.ck-P{background:#1a1200;color:#b07a20}

/* ── Tier cards ── */
.tlist{display:flex;flex-direction:column;gap:6px}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:10px}
.tc:hover{background:var(--bg3)}
.tc.ck-Y{border-left:3px solid var(--amber)}
.tc.ck-P{border-left:3px solid #5a4200}
.tc-body{flex:1;min-width:0}
.tc-name{font-weight:600;font-size:13px;margin-bottom:2px}
.tc-fn{font-size:11px;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tc-arr{color:var(--muted);font-size:14px;flex-shrink:0}

/* ── Edge cards ── */
.elist{display:flex;flex-direction:column;gap:6px}
.ec{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;cursor:pointer;transition:background .15s;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.ec:hover{background:var(--bg3)}
.fl-b{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.04em;flex-shrink:0}
.fl-Material{background:#2d1500;color:var(--orange)}
.fl-Component{background:#0d1f35;color:var(--blue)}
.fl-Service{background:#0d2010;color:var(--green)}
.fl-Signal{background:#1a0d2e;color:var(--purple)}
.fl-Process{background:#2d2000;color:var(--amber)}
.ec-sec{font-size:12px;font-weight:600;color:var(--text)}
.ec-chk{color:var(--amber);font-weight:700;font-size:11px;flex-shrink:0}
.ec-prod{font-size:11px;color:var(--muted);flex-basis:100%;line-height:1.5}

/* ── Tier detail ── */
.td-title{font-size:18px;font-weight:700}
.meta-row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 16px}
.mp{padding:3px 10px;border-radius:4px;font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
.mp b{color:var(--text);font-weight:600}
.fn-text{font-size:13px;color:var(--text);line-height:1.65;margin-bottom:16px}

/* ── Mobile ── */
@media(max-width:768px){
  #gp{width:100%;border-right:none}
  #dp{
    position:fixed;bottom:0;left:0;right:0;
    height:72vh;
    background:var(--bg2);
    border-top:1px solid var(--border);border-radius:14px 14px 0 0;
    transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0);
    z-index:20;overflow-y:auto;flex-direction:column
  }
  #dp.open{transform:translateY(0)}
  #dp::before{content:'';display:block;width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0}
  #main{overflow:hidden;position:relative}
  .logo{display:none}
  .dt{font-size:18px}
  .tc{min-height:54px;padding:14px}
  .tc-name{font-size:14px}
}
</style>
</head>

/* ===== CONSTANTS ===== */
const DIMS=[
  {id:'D1',label:'D1 · AI Manufacturing Base',color:'#bc8cff',bg:'rgba(188,140,255,0.07)'},
  {id:'D2',label:'D2 · AI Connectivity',      color:'#58a6ff',bg:'rgba(88,166,255,0.07)'},
  {id:'D3',label:'D3 · AI Infrastructure',    color:'#3fb950',bg:'rgba(63,185,80,0.07)'},
  {id:'D4',label:'D4 · AI Enablement',        color:'#d4a017',bg:'rgba(212,160,23,0.07)'},
  {id:'D5',label:'D5 · AI Applications',      color:'#ff7b72',bg:'rgba(255,123,114,0.07)'}
];
const FCOL={Material:'#e3812b',Component:'#58a6ff',Service:'#3fb950',Signal:'#bc8cff',Process:'#d4a017'};
const NODE_H=78, ROW_H=140, PAD_X=16, PAD_Y=38, GAP_X=10;

/* ===== STATE ===== */
let activeF='all', selSlug=null;

/* ===== UTILS ===== */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function nslug(name){return(DATA.sectors.find(s=>s.name===name)||{}).slug||name.toLowerCase().replace(/[^a-z0-9]+/g,'-')}
function sname(slug){return(DATA.sectors.find(s=>s.slug===slug)||{}).name||slug}
function dimBadge(d){return`<span class="dim-b dim-${d}">${d}</span>`}
function ckBadge(c){if(c==='Y')return`<span class="ck-b ck-Y">⬥ CHOKEPOINT</span>`;if(c==='Partial')return`<span class="ck-b ck-P">⬥ PARTIAL</span>`;return''}
function flBadge(f){return`<span class="fl-b fl-${f}">${f}</span>`}
function filt(edges){if(activeF==='all')return edges;if(activeF==='Y')return edges.filter(e=>e.chokepoint==='Y');return edges.filter(e=>e.flow===activeF)}
function bc(parts){return`<div class="bc">${parts.map((p,i)=>i===parts.length-1?`<span>${esc(p.l)}</span>`:`<a onclick="${p.fn}">${esc(p.l)}</a>`).join('<span class="bc-sep"> › </span>')}</div>`}

/* ===== BUILD GRAPH ===== */
function buildGraph(){
  const panel=document.getElementById('gp');
  const W=Math.max(panel.clientWidth||640, 620);
  const pos={};

  DIMS.forEach((dim,di)=>{
    const row=DATA.sectors.filter(s=>s.dimension===dim.id);
    const maxPerRow=3;
    const nodeW=Math.min(182,Math.floor((W-2*PAD_X-(row.length-1)*GAP_X)/row.length));
    const totalW=row.length*nodeW+(row.length-1)*GAP_X;
    const startX=(W-totalW)/2;
    const y=PAD_Y+di*ROW_H+24;
    row.forEach((sec,i)=>{
      const x=startX+i*(nodeW+GAP_X);
      pos[sec.slug]={x,y,cx:x+nodeW/2,cy:y+NODE_H/2,nw:nodeW};
    });
  });

  const H=PAD_Y+DIMS.length*ROW_H+NODE_H+20;
  let svg=`<svg id="eco-svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"><defs>`;

  // Arrow markers
  Object.entries(FCOL).forEach(([t,c])=>{
    svg+=`<marker id="a-${t}" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="${c}" opacity=".9"/></marker>`;
  });
  svg+=`<marker id="a-chk" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#d4a017"/></marker>`;
  svg+=`</defs>`;

  // Dimension bands
  DIMS.forEach((dim,di)=>{
    const y=PAD_Y+di*ROW_H;
    const bh=NODE_H+ROW_H-NODE_H+ROW_H-ROW_H+NODE_H; // = NODE_H+24 approx
    svg+=`<rect x="0" y="${y-4}" width="${W}" height="${NODE_H+28}" fill="${dim.bg}"/>`;
    svg+=`<text x="${PAD_X}" y="${y-6}" font-size="9.5" font-weight="700" fill="${dim.color}" letter-spacing="1.2" font-family="-apple-system,BlinkMacSystemFont,sans-serif">${dim.label}</text>`;
  });

  // Edges
  DATA.edges.forEach(edge=>{
    const src=DATA.sectors.find(s=>s.name===edge.from);
    const tgt=DATA.sectors.find(s=>s.name===edge.to);
    if(!src||!tgt)return;
    const sp=pos[src.slug],tp=pos[tgt.slug];
    if(!sp||!tp)return;
    const isChk=edge.chokepoint==='Y';
    const col=isChk?'#d4a017':(FCOL[edge.flow]||'#8b949e');
    const sw=isChk?2.5:1.5;
    const mk=isChk?'a-chk':`a-${edge.flow}`;
    const spd=edge.flow==='Signal'?'fast':edge.flow==='Material'?'slow':'';
    let d;
    if(src.dimension===tgt.dimension){
      const sx=sp.x+sp.nw,sy=sp.cy,tx=tp.x,ty=tp.cy;
      const arc=Math.abs(tx-sx)*0.5+30;
      d=`M${sx},${sy} C${sx+arc},${sy-40} ${tx-arc},${ty-40} ${tx},${ty}`;
    } else if(sp.y<tp.y){
      const sx=sp.cx,sy=sp.y+NODE_H,tx=tp.cx,ty=tp.y;
      const dy=ty-sy;
      d=`M${sx},${sy} C${sx},${sy+dy*.42} ${tx},${ty-dy*.42} ${tx},${ty}`;
    } else {
      const sx=sp.cx,sy=sp.y,tx=tp.cx,ty=tp.y+NODE_H;
      const dy=sy-ty;
      d=`M${sx},${sy} C${sx},${sy-dy*.35} ${tx},${ty+dy*.35} ${tx},${ty}`;
    }
    svg+=`<path class="eco-edge anim ${spd}" data-from="${src.slug}" data-to="${tgt.slug}" data-flow="${edge.flow}" data-chk="${edge.chokepoint}" d="${d}" stroke="${col}" stroke-width="${sw}" opacity=".8" marker-end="url(#${mk})"/>`;
  });

  // Nodes
  DATA.sectors.forEach(sec=>{
    const p=pos[sec.slug];if(!p)return;
    const dim=DIMS.find(d=>d.id===sec.dimension);
    const yChk=DATA.edges.filter(e=>e.from===sec.name&&e.chokepoint==='Y').length;
    const ect=DATA.edges.filter(e=>e.from===sec.name||e.to===sec.name).length;
    const meta=`${ect} edge${ect!==1?'s':''}${yChk?` · ⬥${yChk}`:''}`;
    const ff=`font-family="-apple-system,BlinkMacSystemFont,sans-serif"`;
    // Wrap name if long
    const words=sec.name.split(' ');
    let line1=sec.name,line2='';
    if(words.length>2&&sec.name.length>14){line1=words.slice(0,Math.ceil(words.length/2)).join(' ');line2=words.slice(Math.ceil(words.length/2)).join(' ');}
    const nameY=line2?20:28;
    svg+=`<g class="sector-node" data-slug="${sec.slug}" transform="translate(${p.x},${p.y})" onclick="selSec('${sec.slug}')">
      <rect class="node-bg" width="${p.nw}" height="${NODE_H}" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="${p.nw/2}" y="${nameY}" text-anchor="middle" font-size="12" font-weight="600" fill="#e6edf3" ${ff}>${esc(line1)}</text>
      ${line2?`<text x="${p.nw/2}" y="${nameY+16}" text-anchor="middle" font-size="12" font-weight="600" fill="#e6edf3" ${ff}>${esc(line2)}</text>`:''}
      <text x="${p.nw/2}" y="${line2?55:46}" text-anchor="middle" font-size="9" font-weight="700" fill="${dim?dim.color:'#8b949e'}" letter-spacing=".08em" ${ff}>${sec.dimension}</text>
      <text x="${p.nw/2}" y="${line2?68:60}" text-anchor="middle" font-size="9.5" fill="#8b949e" ${ff}>${esc(meta)}</text>
    </g>`;
  });

  svg+='</svg>';
  panel.innerHTML=svg;

  // Wire hover
  panel.querySelectorAll('.sector-node').forEach(n=>{
    n.addEventListener('mouseenter',()=>{if(!selSlug)hovSec(n.dataset.slug)});
    n.addEventListener('mouseleave',()=>{if(!selSlug)clearHL()});
  });
  applyFilter(activeF);
}

/* ===== HIGHLIGHT ===== */
function related(slug){
  const name=sname(slug);
  const ups=new Set(),dns=new Set();
  DATA.edges.forEach(e=>{if(e.from===name)dns.add(e.to);if(e.to===name)ups.add(e.from)});
  return{name,ups,dns};
}

function applyStates(slug,isSel){
  const{name,ups,dns}=related(slug);
  document.querySelectorAll('.sector-node').forEach(n=>{
    const s=n.dataset.slug,sn=sname(s),isTgt=s===slug;
    const isUp=ups.has(sn),isDn=dns.has(sn),conn=isUp||isDn;
    const r=n.querySelector('rect');
    r.setAttribute('fill',isTgt&&isSel?'#21262d':'#161b22');
    r.setAttribute('stroke',isTgt&&isSel?'#d4a017':isUp?'#3fb950':isDn?'#58a6ff':'#30363d');
    r.setAttribute('stroke-width',isTgt&&isSel?2:conn?1.5:1);
    n.style.opacity=(!isTgt&&!conn&&isSel)?'0.12':'1';
  });
  document.querySelectorAll('.eco-edge').forEach(e=>{
    const vis=e.dataset.from===slug||e.dataset.to===slug;
    e.style.opacity=vis?'0.92':'0.07';
  });
}

function hovSec(slug){applyStates(slug,false)}
function clearHL(){
  document.querySelectorAll('.sector-node').forEach(n=>{
    n.style.opacity='1';
    const r=n.querySelector('rect');
    r.setAttribute('fill','#161b22');r.setAttribute('stroke','#30363d');r.setAttribute('stroke-width','1');
  });
  document.querySelectorAll('.eco-edge').forEach(e=>{e.style.opacity='0.8'});
}

/* ===== FILTER ===== */
function applyFilter(f){
  document.querySelectorAll('.eco-edge').forEach(e=>{
    let show=true;
    if(f==='Y')show=e.dataset.chk==='Y';
    else if(f!=='all')show=e.dataset.flow===f;
    e.style.display=show?'':'none';
  });
}

/* ===== NAVIGATION ===== */
function selSec(slug){
  selSlug=slug;
  applyStates(slug,true);
  applyFilter(activeF);
  renderSec(slug);
  document.getElementById('dp').classList.add('open');
}

function goHome(){
  selSlug=null;clearHL();applyFilter(activeF);
  document.getElementById('dp').classList.remove('open');
  document.getElementById('dp').innerHTML=`<div class="empty"><div class="empty-ico">◈</div><div class="empty-h">Select a sector to explore</div><div class="empty-sub">Click any node to drill into supply chain tiers and cross-sector flows</div></div>`;
}

/* ===== RENDER SECTOR ===== */
function renderSec(slug){
  const sec=DATA.sectors.find(s=>s.slug===slug);if(!sec)return;
  const out=DATA.edges.filter(e=>e.from===sec.name);
  const inn=DATA.edges.filter(e=>e.to===sec.name);
  const outF=filt(out),innF=filt(inn);

  const tierHtml=(sec.tiers||[]).map((t,i)=>`
    <div class="tc ${t.chokepoint==='Y'?'ck-Y':t.chokepoint==='Partial'?'ck-P':''}" onclick="selTier('${slug}',${i})">
      <div class="tc-body"><div class="tc-name">${esc(t.tier)}</div>${t.function?`<div class="tc-fn">${esc(t.function)}</div>`:''}</div>
      ${t.chokepoint!=='No'?ckBadge(t.chokepoint):''}
      <div class="tc-arr">›</div>
    </div>`).join('');

  const ecard=(e,dir)=>`<div class="ec" onclick="selSec('${nslug(dir==='out'?e.to:e.from)}')">${flBadge(e.flow)}<span class="ec-sec">${esc(dir==='out'?e.to:e.from)}</span>${e.chokepoint==='Y'?'<span class="ec-chk">⬥Y</span>':''}<span class="ec-prod">${esc(e.product||'')}</span></div>`;

  document.getElementById('dp').innerHTML=`
    ${bc([{l:'Ecosystem',fn:'goHome()'},{l:sec.name}])}
    <div class="db">
      <div class="dh"><div class="dt">${esc(sec.name)}</div>${dimBadge(sec.dimension)}</div>
      ${sec.description?`<div class="dd">${esc(sec.description)}</div>`:''}
      <div class="sec"><div class="sec-h">Supply Chain — ${(sec.tiers||[]).length} Tiers</div><div class="tlist">${tierHtml||'<p style="color:var(--muted);font-size:12px">No tier data.</p>'}</div></div>
      <div class="sec"><div class="sec-h">→ Outbound Flows (${out.length})</div><div class="elist">${outF.map(e=>ecard(e,'out')).join('')||'<p style="color:var(--muted);font-size:12px">None match current filter.</p>'}</div></div>
      <div class="sec"><div class="sec-h">← Inbound Flows (${inn.length})</div><div class="elist">${innF.map(e=>ecard(e,'in')).join('')||'<p style="color:var(--muted);font-size:12px">None match current filter.</p>'}</div></div>
    </div>`;
}

/* ===== RENDER TIER ===== */
function selTier(sectorSlug,idx){
  const sec=DATA.sectors.find(s=>s.slug===sectorSlug);if(!sec)return;
  const tier=(sec.tiers||[])[idx];if(!tier)return;
  const tEdges=DATA.edges.filter(e=>(e.from===sec.name&&e.from_tier===tier.tier)||(e.to===sec.name&&e.to_tier===tier.tier));

  const edgeHtml=tEdges.map(e=>{
    const dir=e.from===sec.name?'→':'←';
    const other=e.from===sec.name?e.to:e.from;
    return`<div class="ec" onclick="selSec('${nslug(other)}')">${flBadge(e.flow)}<span class="ec-sec">${dir} ${esc(other)}</span>${e.chokepoint==='Y'?'<span class="ec-chk">⬥Y</span>':''}<span class="ec-prod">${esc(e.product||'')}</span></div>`;
  }).join('');

  document.getElementById('dp').innerHTML=`
    ${bc([{l:'Ecosystem',fn:'goHome()'},{l:sec.name,fn:`selSec('${sectorSlug}')`},{l:tier.tier}])}
    <div class="db">
      <div class="dh" style="margin-bottom:12px"><div class="td-title">${esc(tier.tier)}</div>${tier.chokepoint!=='No'?ckBadge(tier.chokepoint):''}</div>
      ${tier.function?`<div class="fn-text">${esc(tier.function)}</div>`:''}
      <div class="meta-row">
        ${tier.moat_type?`<div class="mp">Moat <b>${esc(tier.moat_type)}</b></div>`:''}
        ${tier.capital_intensity?`<div class="mp">CapEx <b>${esc(tier.capital_intensity)}</b></div>`:''}
        ${tier.margin_profile?`<div class="mp">Margin <b>${esc(tier.margin_profile)}</b></div>`:''}
      </div>
      <div class="sec">
        <div class="sec-h">Cross-Sector Flows Through This Tier</div>
        <div class="elist">${edgeHtml||'<p style="color:var(--muted);font-size:12px">No edges mapped to this specific tier yet.</p>'}</div>
      </div>
    </div>`;
}

/* ===== FILTER BUTTONS ===== */
document.getElementById('fbar').addEventListener('click',e=>{
  const btn=e.target.closest('.fbtn');if(!btn)return;
  activeF=btn.dataset.f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilter(activeF);
  if(selSlug)renderSec(selSlug);
});

/* ===== INIT ===== */
window.addEventListener('DOMContentLoaded',buildGraph);
let _rt;window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(()=>{buildGraph();if(selSlug)applyStates(selSlug,true)},120)});
</script>
