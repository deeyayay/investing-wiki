function nav(hash){history.pushState(null,'',hash||'#');render(hash);}
window.addEventListener('hashchange',()=>render(location.hash));
window.addEventListener('load',()=>render(location.hash));

function render(hash){
  const app=document.getElementById('app');
  if(!hash||hash==='#'||hash==='#macro') renderMacro(app);
  else if(hash.startsWith('#sector/')) renderSector(app,hash.slice(8));
  else if(hash.startsWith('#ticker/')) renderTicker(app,hash.slice(8).toUpperCase());
  else renderMacro(app);
}

function lnk(href,text,cls=''){return `<a href="${href}" onclick="nav('${href}');return false;" class="${cls}">${text}</a>`;}
function imp(n){return `<span class="imp imp-${n}">${n}</span>`;}
function sig(s){return `<span class="sig sig-${s}">${s}</span>`;}
function dim(d){return `<span class="dim-badge dim-${d}">${d}</span>`;}
function health(slug){
  const max=KB.digest.items.filter(i=>i.sector_slug===slug).reduce((m,i)=>Math.max(m,i.impact),0);
  return max>=4?'red':max>=3?'amber':'green';
}
function driftPill(d){
  if(!d||d==='—')return`<span class="drift-pill drift-none">No drift set</span>`;
  if(d.startsWith('On track'))return`<span class="drift-pill drift-on">${d}</span>`;
  return`<span class="drift-pill drift-watch">${d}</span>`;
}

function renderMacro(app){
  const portCards=KB.portfolio.map(sym=>{
    const t=KB.tickers[sym];if(!t)return'';
    const s=t.recommendation?t.recommendation.signal:'HOLD';
    return`<div class="portfolio-card" onclick="nav('#ticker/${sym}')"><div style="display:flex;align-items:center;justify-content:space-between">${sym} ${sig(s)}</div><div class="thesis">${t.one_line_thesis}</div></div>`;
  }).join('');

  const digestRows=KB.digest.items.map(i=>
    `<div class="digest-item"><div class="digest-meta">${imp(i.impact)} ${lnk('#ticker/'+i.ticker,i.ticker,'tchip')} ${lnk('#sector/'+i.sector_slug,i.sector,'schip')}</div><div class="digest-body"><div class="digest-headline">${i.headline}</div><div class="digest-summary">${i.summary}</div></div></div>`
  ).join('');

  const secCards=KB.sectors.map(s=>{
    const h=health(s.slug);
    const top=KB.digest.items.find(i=>i.sector_slug===s.slug);
    return`<div class="sector-card" onclick="nav('#sector/${s.slug}')">
      <div class="sector-card-header"><div class="sector-name">${s.name}</div><div class="sector-meta">${dim(s.dimension)}<span class="health-dot health-${h}"></span><span class="ticker-count">${s.tickers.length} tickers</span></div></div>
      <div class="sector-desc">${s.description}</div>
      ${top?`<div style="font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:6px">${imp(top.impact)} ${top.headline}</div>`:''}
    </div>`;
  }).join('');

  const sentChips=KB.sentiment.hot.map(sym=>{
    const s=KB.sentiment.by_ticker[sym];
    return`<div class="sent-chip" onclick="nav('#ticker/${sym}')">${sym} <span class="sent-vel">${s?s.vel:''}</span> <span style="color:var(--muted);font-size:11px">${s?s.mentions:''}</span></div>`;
  }).join('');

  const dimDefs=[
    {id:'D1',label:'D1 — AI Manufacturing Base',slugs:['semiconductors','electronic-components','materials-mining'],color:'var(--purple)',bg:'#1a0d2e'},
    {id:'D2',label:'D2 — AI Connectivity',slugs:['photonics-optical','space-communications'],color:'var(--blue)',bg:'#0d1f35'},
    {id:'D3',label:'D3 — AI Infrastructure',slugs:['compute-infrastructure','energy-power'],color:'var(--green)',bg:'#0d2010'},
    {id:'D4',label:'D4 — AI Enablement',slugs:['cybersecurity'],color:'var(--amber)',bg:'#2d1a00'},
    {id:'D5',label:'D5 — AI Applications',slugs:['robotics-edge-ai','fintech-commerce-ai'],color:'var(--pink)',bg:'#2d0d1a'},
  ];
  const ecoRows=dimDefs.map((d,idx)=>{
    const boxes=d.slugs.map(slug=>{
      const sec=KB.sectors.find(s=>s.slug===slug);if(!sec)return'';
      const inb=KB.interrelationships.filter(r=>r.to===sec.name).length;
      const outb=KB.interrelationships.filter(r=>r.from===sec.name).length;
      const chk=KB.interrelationships.filter(r=>r.from===sec.name&&r.c==='Y').length;
      return`<div class="eco-sector-box" onclick="nav('#sector/${slug}')"><div class="eco-sector-name">${sec.name}</div><div class="eco-sector-stats">↓${inb} in · ↑${outb} out${chk?` · <span class="chokepoint-badge">⬥${chk}Y</span>`:''}</div></div>`;
    }).join('');
    return(idx>0?'<div class="eco-arrow">↕</div>':'')+`<div class="eco-dim" style="background:${d.bg};border-color:${d.color}55"><div class="eco-dim-label" style="color:${d.color};border:1px solid ${d.color}44;background:${d.bg}">${d.label}</div><div class="eco-sectors">${boxes}</div></div>`;
  }).join('');

  app.innerHTML=`
    <div class="pulse-banner">
      <div class="pulse-item"><div class="pulse-label">VIX</div><div class="pulse-value" style="color:var(--green)">17.3</div></div>
      <div class="pulse-item"><div class="pulse-label">S&amp;P 500</div><div class="pulse-value">7,337</div></div>
      <div class="pulse-item"><div class="pulse-label">Regime</div><div class="pulse-regime">Tech-Favorable / Goldilocks</div></div>
      <div class="pulse-item"><div class="pulse-label">Digest</div><div style="color:var(--muted);font-size:13px">${KB.digest.date}</div></div>
    </div>
    <div class="section"><div class="section-title">Hot Signals — Last 7 Days</div><div class="sentiment-strip">${sentChips}</div></div>
    <div class="section"><div class="section-title">Portfolio Quick View</div><div class="portfolio-strip">${portCards}</div></div>
    <div class="section"><div class="section-title">Today's Digest — ${KB.digest.date}</div>${digestRows}</div>
    <div class="section"><div class="section-title">D1 → D5 Ecosystem Stack</div><div class="eco-stack">${ecoRows}</div></div>
    <div class="section"><div class="section-title">Sectors (${KB.sectors.length})</div><div class="card-grid">${secCards}</div></div>`;
}

function renderSector(app,slug){
  const sec=KB.sectors.find(s=>s.slug===slug);
  if(!sec){app.innerHTML='<p style="padding:20px;color:var(--muted)">Sector not found.</p>';return;}

  function chainTab(){
    if(!sec.chain||!sec.chain.length)return'<p style="color:var(--muted)">No supply chain map available.</p>';
    const cols=sec.chain.map(tier=>{
      const cls=tier.c==='Y'?'choke-Y':tier.c==='Partial'?'choke-Partial':'';
      const badge=tier.c==='Y'?'<span style="display:block;font-size:9px;color:var(--amber);text-align:center">CHOKEPOINT</span>':'';
      const tks=tier.tk&&tier.tk.length?tier.tk.map(s=>`<div class="tier-ticker" onclick="nav('#ticker/${s}')">${s}${tier.c==='Y'?'<span class="choke-diamond">◆</span>':''}</div>`).join(''):'<div class="tier-empty">—</div>';
      return`<div class="tier-col"><div class="tier-header ${cls}">${tier.t}${badge}</div><div class="tier-body">${tks}</div></div>`;
    }).join('');
    return`<div class="chain-map">${cols}</div><p style="font-size:11px;color:var(--muted);margin-top:10px">◆ = Y chokepoint tier. Amber border = chokepoint. Click chips to drill down.</p>`;
  }

  function tickersTab(){
    if(!sec.tickers.length)return`<p style="color:var(--muted)">No tickers registered. Run <code>/add-ticker TICKER --sector "${sec.name}"</code> to add.</p>`;
    return`<div class="ticker-grid">${sec.tickers.map(sym=>{
      const t=KB.tickers[sym];if(!t)return`<div class="ticker-card" onclick="nav('#ticker/${sym}')"><div class="ticker-symbol">${sym}</div></div>`;
      const cls=t.in_portfolio?'portfolio':t.in_rockets?'rocket':t.in_compounders?'compounder':'';
      return`<div class="ticker-card ${cls}" onclick="nav('#ticker/${sym}')">
        <div class="ticker-symbol">${sym}</div><div class="ticker-name">${t.name||''}</div>
        <div class="ticker-thesis">${t.one_line_thesis||''}</div>
        ${driftPill(t.drift_status)}
        ${t.scoring?`<div style="margin-top:8px;font-size:12px">Score: <span class="score-composite">${t.scoring.composite}</span>/10</div>`:''}
      </div>`;
    }).join('')}</div>`;
  }

  function newsTab(){
    const items=KB.digest.items.filter(i=>i.sector_slug===slug);
    if(!items.length)return'<p style="color:var(--muted)">No digest items for this sector.</p>';
    return items.map(i=>`<div class="digest-item"><div class="digest-meta">${imp(i.impact)} ${lnk('#ticker/'+i.ticker,i.ticker,'tchip')}</div><div class="digest-body"><div class="digest-headline">${i.headline}</div><div class="digest-summary">${i.summary}</div></div></div>`).join('');
  }

  function interTab(){
    const inb=KB.interrelationships.filter(r=>r.to===sec.name);
    const outb=KB.interrelationships.filter(r=>r.from===sec.name);
    if(!inb.length&&!outb.length)return'<p style="color:var(--muted)">No interrelationships mapped.</p>';
    const rows=[
      ...inb.map(r=>{const s2=KB.sectors.find(s=>s.name===r.from);return`<tr><td style="color:var(--green);padding:5px 8px">← in</td><td style="padding:5px 8px">${lnk('#sector/'+(s2?s2.slug:'#'),r.from)}</td><td style="padding:5px 8px;color:var(--muted)">${r.flow}</td><td style="padding:5px 8px;color:var(--muted);font-size:12px">${r.product}</td><td style="padding:5px 8px">${r.c==='Y'?'<span style="color:var(--amber)">⬥Y</span>':r.c}</td></tr>`;}),
      ...outb.map(r=>{const s2=KB.sectors.find(s=>s.name===r.to);return`<tr><td style="color:var(--blue);padding:5px 8px">→ out</td><td style="padding:5px 8px">${lnk('#sector/'+(s2?s2.slug:'#'),r.to)}</td><td style="padding:5px 8px;color:var(--muted)">${r.flow}</td><td style="padding:5px 8px;color:var(--muted);font-size:12px">${r.product}</td><td style="padding:5px 8px">${r.c==='Y'?'<span style="color:var(--amber)">⬥Y</span>':r.c}</td></tr>`;})
    ].join('');
    return`<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="color:var(--muted);border-bottom:1px solid var(--border)"><th style="padding:4px 8px;text-align:left">Dir</th><th style="padding:4px 8px;text-align:left">Sector</th><th style="padding:4px 8px;text-align:left">Flow</th><th style="padding:4px 8px;text-align:left">Product / Process</th><th style="padding:4px 8px;text-align:left">Choke</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  app.innerHTML=`
    <div class="breadcrumb">${lnk('#','Macro')} <span>›</span> ${sec.name}</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap"><h1 style="font-size:24px;font-weight:700">${sec.name}</h1>${dim(sec.dimension)}</div>
    <p style="color:var(--muted);margin-bottom:20px;max-width:700px">${sec.description}</p>
    <div class="tabs">
      <button class="tab-btn active" onclick="st(this,'chain')">Chain Map</button>
      <button class="tab-btn" onclick="st(this,'tickers')">Tickers (${sec.tickers.length})</button>
      <button class="tab-btn" onclick="st(this,'news')">News</button>
      <button class="tab-btn" onclick="st(this,'inter')">Interrelationships</button>
    </div>
    <div id="tab-chain" class="tab-content active">${chainTab()}</div>
    <div id="tab-tickers" class="tab-content">${tickersTab()}</div>
    <div id="tab-news" class="tab-content">${newsTab()}</div>
    <div id="tab-inter" class="tab-content">${interTab()}</div>`;
}

function st(btn,id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

function renderTicker(app,sym){
  const t=KB.tickers[sym];
  if(!t){app.innerHTML=`<div class="breadcrumb">${lnk('#','Macro')}</div><p style="color:var(--muted)">${sym} not found in registry.</p>`;return;}
  const sec=KB.sectors.find(s=>s.slug===t.sector_slug);

  const newsHtml=t.news&&t.news.length
    ?t.news.map(n=>`<div class="news-item">${imp(n.impact)}<div class="news-body"><div class="news-date">${n.date}</div><div class="news-headline">${n.headline}</div></div></div>`).join('')
    :`<p style="color:var(--muted)">No recent news logged.</p>`;

  const scoreHtml=t.scoring?`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">Composite Score: <span class="score-composite">${t.scoring.composite}</span> / 10</div>
    ${t.scoring.criteria&&Object.keys(t.scoring.criteria).length?Object.entries(t.scoring.criteria).map(([k,v])=>`<div class="score-bar-row"><div class="score-bar-label">${k}</div><div class="score-bar-track"><div class="score-bar-fill" style="width:${(v/5)*100}%"></div></div><span style="font-size:12px;color:var(--amber);width:20px">${v}</span></div>`).join(''):''}
  </div>`:'';

  const recHtml=t.recommendation?`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">${sig(t.recommendation.signal)}<span style="font-size:12px;color:var(--muted)">Confidence: ${t.recommendation.confidence}</span></div>
    <div style="font-size:13px">${t.recommendation.rationale}</div>
  </div>`:'';

  const lists=['in_portfolio','in_rockets','in_compounders'].filter(k=>t[k]).map(k=>`<span class="badge badge-amber">${k.replace('in_','').replace('_',' ')}</span>`).join(' ');

  app.innerHTML=`
    <div class="breadcrumb">${lnk('#','Macro')} <span>›</span> ${lnk('#sector/'+(t.sector_slug||''),t.sector||'')} <span>›</span> ${sym}</div>
    <div class="ticker-detail-header">
      <div><div class="ticker-big-symbol">${sym}</div><div class="ticker-company-name">${t.name||''}</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">${lists}</div></div>
      <div style="flex:1;max-width:600px"><p style="font-size:14px;font-style:italic;margin-bottom:10px">${t.one_line_thesis||''}</p>${driftPill(t.drift_status)}</div>
    </div>
    ${recHtml}${scoreHtml}
    <div class="section"><div class="section-title">Recent News</div><div class="news-list">${newsHtml}</div></div>`;
}
</script>
</body>
</html>
