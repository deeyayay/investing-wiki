<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Buildout Supply Chain</title>
<style>
:root{--bg:oklch(97.5% .007 75);--bg2:oklch(95% .008 75);--bg3:oklch(92% .010 75);--border:oklch(87% .011 75);--text:oklch(18% .008 280);--muted:oklch(50% .012 260);--amber:oklch(66% .17 62);--amber-bg:oklch(97% .07 75);--d1:oklch(34% .24 278);--d2:oklch(30% .16 148);--d3:oklch(32% .22 258);--d4:oklch(32% .24 310);--d5:oklch(35% .24 27);--d6:oklch(40% .18 55)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.5 system-ui,sans-serif}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10}
.logo{font-weight:700;font-size:16px}.gen-date{color:var(--muted);font-size:12px}
#l0,#l1,#l2{padding:40px 32px;max-width:1200px;margin:0 auto}
.dim-row{margin-bottom:72px}
.dim-label{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.dim-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;color:var(--text);letter-spacing:.05em;flex-shrink:0}
.dim-pill.D1{background:oklch(89% .14 278);color:var(--d1)}.dim-pill.D2{background:oklch(89% .12 148);color:var(--d2)}
.dim-pill.D3{background:oklch(89% .14 258);color:var(--d3)}.dim-pill.D4{background:oklch(89% .14 308);color:var(--d4)}
.dim-pill.D5{background:oklch(91% .12 27);color:var(--d5)}.dim-pill.D6{background:oklch(93% .12 60);color:var(--d6)}
.dim-name{font-weight:700;font-size:16px;letter-spacing:-.01em}
.dim-desc{color:var(--muted);font-size:12px;margin-left:auto;max-width:480px;text-align:right}
.sec-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.sec-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;cursor:pointer;transition:border-color .15s,transform .1s}
.sec-card:hover{border-color:oklch(72% .012 75);transform:translateY(-1px)}
.sec-card-name{font-weight:600;font-size:14px;margin-bottom:6px}
.sec-card-desc{color:var(--muted);font-size:11px;line-height:1.4;margin-bottom:8px}
.sec-meta{display:flex;align-items:center;gap:8px}
.tier-badge{font-size:10px;background:var(--bg3);padding:2px 7px;border-radius:99px;color:var(--muted)}
.choke-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);display:inline-block}
.empty-dim{color:var(--muted);font-size:12px;padding:8px 0;font-style:italic}
.breadcrumb{font-size:12px;color:var(--muted);margin-bottom:28px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:4px 0}
.crumb-link{cursor:pointer;color:var(--muted);transition:color .12s}
.crumb-link:hover{color:var(--text);text-decoration:underline}
.crumb-sep{color:var(--border);font-size:12px}
.crumb-cur{color:var(--text);font-weight:600}
.sector-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sector-title{font-size:22px;font-weight:700}
.sector-desc-full{color:var(--muted);font-size:13px;margin-bottom:12px}
.dim-ctx{font-size:12px;color:var(--muted);margin-bottom:44px;font-style:italic}
.tier-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:18px 20px;margin-bottom:14px;cursor:pointer;transition:border-color .15s,background .15s}
.tier-card:hover{border-color:oklch(72% .012 75);background:oklch(97% .006 75)}
.tier-card.choke-y{border-color:oklch(73% .18 62);background:oklch(98% .08 72)}
.tier-card.choke-y:hover{background:oklch(97% .11 72)}
.tier-card.choke-p{border-color:oklch(76% .012 75);background:oklch(96.5% .005 75)}
.tier-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.tier-name{font-weight:600;font-size:13px}
.choke-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.choke-badge.y{background:var(--amber-bg);color:var(--amber)}
.choke-badge.p{background:oklch(91% .008 75);color:var(--muted)}
.tier-fn{color:var(--muted);font-size:12px;line-height:1.5;margin-bottom:10px}
.tier-pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{font-size:10px;background:var(--bg3);padding:2px 8px;border-radius:99px;color:var(--muted)}
.tier-detail-name{font-size:20px;font-weight:700;margin-bottom:16px}
.tier-fn-full{font-size:15px;line-height:1.6;color:var(--text);margin-bottom:36px}
.invest-section h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px}
.invest-rows{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.invest-row{display:flex;gap:12px;font-size:13px}
.invest-label{color:var(--muted);width:140px;flex-shrink:0}
.invest-val{color:var(--text)}
.choke-box{background:var(--amber-bg);border:1px solid oklch(78% .16 62);border-radius:6px;padding:12px 16px;margin-bottom:20px}
.choke-box p{font-size:13px;color:var(--amber)}
.choke-box-partial{background:oklch(96% .005 75);border:1px solid oklch(82% .010 75);border-radius:6px;padding:12px 16px;margin-bottom:20px}
.choke-box-partial p{font-size:13px;color:var(--muted)}
.co-count{font-size:10px;background:oklch(92% .10 278);color:var(--d1);padding:2px 7px;border-radius:99px}
.co-section{margin-top:32px}
.co-section h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px}
.co-card{padding:14px 0;border-bottom:1px solid var(--border)}
.co-card:last-child{border-bottom:none}
.co-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.co-ticker{font-weight:700;font-size:13px;font-family:monospace;color:var(--text);text-decoration:none}
a.co-ticker:hover{color:var(--d3);text-decoration:underline}
.co-name{font-size:12px;color:var(--muted)}
.co-cap{font-size:10px;padding:2px 7px;border-radius:99px;margin-left:auto}
.co-cap.large{background:oklch(93% .08 258);color:var(--d3)}
.co-cap.mid{background:oklch(95% .09 68);color:var(--amber)}
.co-cap.small{background:oklch(94% .08 25);color:var(--d5)}
.co-notes{font-size:12px;color:var(--muted);line-height:1.5}
@media(max-width:600px){.sec-card{width:100%}.dim-desc{display:none}#l0,#l1,#l2,#l3{padding:16px}}
/* L3 — ticker wiki */
#l3{padding:40px 32px;max-width:1200px;margin:0 auto}
.ticker-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.ticker-sym{font-size:28px;font-weight:700;font-family:monospace;line-height:1}
.ticker-fullname{font-size:16px;color:var(--muted)}
.ticker-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.ticker-tag{font-size:11px;padding:3px 9px;border-radius:99px;background:var(--bg3);color:var(--muted)}
.wiki-empty{color:var(--muted);font-style:italic;font-size:13px;padding:60px 0;text-align:center;line-height:2}
.wiki-loading{color:var(--muted);font-size:13px;padding:60px 0;text-align:center}
.wiki-body{max-width:800px}
.wiki-section{margin-bottom:44px}
.wiki-h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.wiki-h3{font-size:13px;font-weight:700;margin:18px 0 8px;color:var(--text)}
.wiki-h4{font-size:11px;font-weight:700;color:var(--muted);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.05em}
.wiki-p{font-size:13px;line-height:1.7;margin-bottom:10px;color:var(--text)}
.wiki-meta{font-size:11px;color:var(--muted);margin-bottom:14px;font-style:italic}
.wiki-table-wrap{overflow-x:auto;margin-bottom:18px}
.wiki-table{width:100%;border-collapse:collapse;font-size:12px}
.wiki-table th{text-align:left;padding:6px 10px;border-bottom:2px solid var(--border);font-weight:600;color:var(--muted);white-space:nowrap;background:var(--bg2)}
.wiki-table td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.45}
.wiki-table tr:last-child td{border-bottom:none}
.wiki-table tr:hover td{background:var(--bg2)}
.wiki-blockquote{border-left:3px solid var(--border);padding:8px 14px;margin:10px 0 14px;color:var(--muted);font-size:12px;font-style:italic;line-height:1.6}
.wiki-list{padding-left:18px;margin-bottom:14px;font-size:13px;line-height:1.6}
.wiki-list li{margin-bottom:4px}
.wiki-checklist{list-style:none;padding-left:0;margin-bottom:14px;font-size:13px}
.wiki-checklist li{padding:4px 0 4px 24px;position:relative;line-height:1.5}
.wiki-checklist li::before{content:'☐';position:absolute;left:0;color:var(--muted)}
.wiki-checklist li.done{color:var(--muted);text-decoration:line-through}
.wiki-checklist li.done::before{content:'☑';color:var(--d2)}
.wiki-code{font-family:monospace;font-size:11px;background:var(--bg3);padding:1px 4px;border-radius:3px}
.wiki-oneline{background:oklch(95% .06 258);border:1px solid oklch(83% .10 258);padding:12px 16px;border-radius:6px;font-size:14px;line-height:1.6;margin-bottom:4px}
#search-wrap{position:relative;flex:1;max-width:420px}
#search-input{width:100%;padding:7px 12px 7px 34px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
#search-input:focus{border-color:var(--muted)}
#search-input::placeholder{color:var(--muted)}
#search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:14px}
#search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg);border:1px solid var(--border);border-radius:8px;max-height:380px;overflow-y:auto;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.sr-group-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:8px 12px 4px}
.sr-item{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s}
.sr-item:hover{background:var(--bg2)}
.sr-ticker{font-family:monospace;font-weight:700;font-size:11px;background:oklch(92% .10 278);color:var(--d1);padding:2px 7px;border-radius:4px;flex-shrink:0}
.sr-text{flex:1;min-width:0}
.sr-label{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-empty{padding:16px 12px;text-align:center;color:var(--muted);font-size:13px}
.sr-divider{height:1px;background:var(--border);margin:2px 0}
@media(max-width:600px){#search-wrap{order:3;flex:0 0 100%}#hdr{flex-wrap:wrap;padding:10px 16px;row-gap:8px}}
/* Tab navigation */
#tab-nav{display:flex;gap:2px;padding:0 24px;background:var(--bg2);border-bottom:1px solid var(--border)}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:10px 16px;font:13px/1 system-ui,sans-serif;color:var(--muted);cursor:pointer;transition:color .15s,border-color .15s;margin-bottom:-1px;border-radius:0}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
/* Tech races container */
#tech-races,#tech-race-detail{padding:40px 32px;max-width:1200px;margin:0 auto}
.tech-group-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;margin-top:8px}
.race-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:48px}
.race-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:18px;cursor:pointer;transition:border-color .15s,transform .1s;display:flex;flex-direction:column;gap:10px}
.race-card:hover{border-color:oklch(72% .012 75);transform:translateY(-1px)}
.race-card-top{display:flex;align-items:center;gap:8px}
.conviction-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.conviction-badge.high{background:oklch(93% .10 142);color:oklch(34% .18 142)}
.conviction-badge.medium{background:var(--amber-bg);color:var(--amber)}
.conviction-badge.low,.conviction-badge.watch{background:var(--bg3);color:var(--muted)}
.conviction-badge.resolved{background:oklch(92% .10 258);color:var(--d3)}
.status-badge{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--bg3);color:var(--muted);margin-left:auto}
.race-card-name{font-weight:700;font-size:14px}
.race-card-pref{font-size:12px;color:var(--muted);line-height:1.45}
.race-ticker-pills{display:flex;flex-wrap:wrap;gap:6px}
.exposure-pill{font-size:10px;padding:2px 8px;border-radius:99px;white-space:nowrap}
.exposure-pill.primary{background:oklch(92% .10 278);color:var(--d1);font-weight:600}
.exposure-pill.partial{background:var(--amber-bg);color:var(--amber)}
.exposure-pill.indirect{background:var(--bg3);color:var(--muted)}
.race-card-foot{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-top:auto}
.group-pill{background:var(--bg3);padding:2px 7px;border-radius:99px;font-size:10px}
.no-races{color:var(--muted);font-size:12px;font-style:italic;margin-bottom:40px;padding:8px 0}
/* Race detail view */
.race-detail-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.race-detail-name{font-size:22px;font-weight:700;margin-bottom:8px}
.race-detail-pref{font-size:14px;line-height:1.65;color:var(--text);margin-bottom:32px;padding:14px 16px;background:var(--bg2);border-left:3px solid oklch(73% .18 62);border-radius:0 6px 6px 0}
.race-section{margin-bottom:32px}
.race-section-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.race-text{font-size:13px;line-height:1.7;color:var(--text)}
.race-two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.race-col{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px}
.race-col-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.race-col-hdr.bull{color:oklch(34% .18 142)}
.race-col-hdr.bear{color:var(--d5)}
.race-bullet{font-size:12px;line-height:1.6;color:var(--muted);padding:3px 0 3px 14px;position:relative}
.race-bullet::before{content:'·';position:absolute;left:4px;color:var(--text)}
@media(max-width:600px){#tech-races,#tech-race-detail{padding:16px}.race-two-col{grid-template-columns:1fr}#tab-nav{padding:0 16px}}
/* ── Logo subtitle ── */
.logo-wrap{display:flex;flex-direction:column;gap:1px}
.logo-sub{font-size:11px;color:var(--muted);font-weight:400}
/* ── 12-Layer Buildout Stack (homepage) ── */
#l0{max-width:1340px;padding:32px 24px}
.stack-intro{font-size:12px;color:var(--muted);margin-bottom:22px;max-width:820px;line-height:1.6}
.stack-grid{display:grid;grid-template-columns:228px minmax(0,1fr) 232px;gap:18px;align-items:start}
.rail{display:flex;flex-direction:column;gap:12px}
.rail-card{border:1px solid var(--border);border-radius:11px;padding:13px 13px 14px;position:relative;overflow:hidden}
.rail-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--rail-accent,var(--border))}
.rail-card.power{--rail-accent:oklch(64% .18 35);background:oklch(97% .035 35)}
.rail-card.thermal{--rail-accent:oklch(62% .12 215);background:oklch(97% .03 215)}
.rail-card.security{--rail-accent:oklch(55% .17 300);background:oklch(97% .035 300)}
.rail-card.edge{--rail-accent:oklch(60% .18 350);background:oklch(97% .04 350)}
.rail-title{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.rail-cap{font-size:10px;color:var(--muted);margin:2px 0 10px;line-height:1.4}
.rail-group{margin-bottom:9px}
.rail-group:last-child{margin-bottom:0}
.rail-group-label{font-size:10.5px;font-weight:600;color:var(--text);margin-bottom:4px;opacity:.85}
.stack{display:flex;flex-direction:column}
.layer{border-radius:11px;border:1px solid oklch(80% .055 var(--lh,250));background:var(--lbg);position:relative;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.layer-head{display:flex;align-items:baseline;gap:9px;padding:8px 14px;background:oklch(85% .12 var(--lh,250));border-bottom:1px solid oklch(78% .08 var(--lh,250))}
.layer-num{font-size:11px;font-weight:800;font-family:ui-monospace,monospace;color:oklch(32% .15 var(--lh,250))}
.layer-name{font-weight:800;font-size:14px;letter-spacing:-.01em;color:oklch(25% .13 var(--lh,250))}
.layer-tag{font-size:10.5px;color:oklch(40% .07 var(--lh,250));margin-left:auto;text-align:right;max-width:48%}
.subbox-row{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px}
.subbox{flex:1 1 158px;min-width:150px;background:oklch(99.5% .003 90 / .72);border:1px solid oklch(86% .02 var(--lh,250));border-radius:8px;padding:8px 10px;cursor:pointer;transition:transform .1s,box-shadow .12s,border-color .12s}
.subbox:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.08);border-color:oklch(70% .04 var(--lh,250))}
.subbox.choke{border-color:var(--amber);background:oklch(98% .05 72 / .85)}
.subbox-label{font-weight:600;font-size:11.5px;line-height:1.3;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.choke-mark{color:var(--amber);font-size:10px;flex-shrink:0}
.chip-row{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-family:ui-monospace,monospace;font-size:10px;font-weight:600;background:oklch(92% .02 250);color:oklch(35% .04 250);padding:1px 5px;border-radius:4px;cursor:pointer;transition:background .1s}
.chip:hover{background:oklch(86% .06 250)}
.chip.more{background:transparent;color:var(--muted);font-weight:400;cursor:default}
.connector{display:flex;align-items:center;justify-content:center;height:26px;position:relative}
.connector::before{content:"";position:absolute;top:0;bottom:0;left:50%;width:1.5px;background:oklch(80% .01 250);transform:translateX(-50%)}
.connector-label{position:relative;z-index:1;font-size:10px;color:var(--muted);background:var(--bg);padding:2px 9px;border:1px solid var(--border);border-radius:99px;white-space:nowrap}
.connector-label::after{content:"▾";margin-left:6px;font-size:8px;opacity:.6}
.connector.choke::before{background:var(--amber)}
.connector.choke .connector-label{color:var(--amber);border-color:oklch(80% .12 62);font-weight:600}
@media(max-width:980px){.stack-grid{grid-template-columns:1fr}.rail{position:static;flex-direction:row;flex-wrap:wrap}.rail-card{flex:1 1 200px}}
@media(max-width:600px){#l0{padding:16px}.subbox{min-width:120px}.rail-card{flex:1 1 100%}}
/* clickable layer header */
.layer-head{cursor:pointer;transition:filter .12s}
.layer-head:hover{filter:brightness(.97)}
.layer-go{font-size:10.5px;font-weight:700;color:oklch(38% .1 var(--lh,250));opacity:0;transition:opacity .12s;margin-left:8px}
.layer-head:hover .layer-go{opacity:.85}
/* Layer view (L1) */
.layer-view-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.layer-view-num{font-family:ui-monospace,monospace;font-weight:800;font-size:14px;color:oklch(45% .14 var(--lh,250))}
.layer-view-name{font-size:24px;font-weight:800;letter-spacing:-.02em;color:oklch(28% .13 var(--lh,250))}
.layer-view-tag{color:var(--muted);font-size:13px;margin-bottom:26px}
.layer-box-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.layer-box{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:14px 15px;cursor:pointer;transition:border-color .15s,transform .1s,box-shadow .12s}
.layer-box:hover{border-color:oklch(72% .04 250);transform:translateY(-1px);box-shadow:0 3px 14px rgba(0,0,0,.07)}

        { tier: "Advanced Nuclear — SMR & Microreactor", fn: "Design, license, manufacture, and operate small modular reactors (SMRs, 50–300 MWe) and microreactors (1–20 MWe) that provide firm, dispatchable, carbon-free power at scales suitable for industrial users, military installations, and remote AI data centers that cannot access the main grid. The AI-nuclear connection is becoming concrete: Microsoft signed a power purchase agreement to restart Three Mile Island Unit 1 (835MW) for data center power; Amazon and Google have signed SMR pre-purchase agreements with Kairos Power and X-energy. The investment case for SMRs rests on three advantages over large conventional nuclear: factory-manufactured modules that reduce construction risk versus site-built reactors; smaller footprint that enables co-location with AI data center campuses; and passive safety systems that eliminate the need for external cooling in a loss-of-coolant accident. NRC licensing timelines (10-15 years for conventional plants; NRC is developing streamlined SMR review processes targeting 3-5 years) remain the primary constraint. Microreactors targeting 1-20 MWe are pursuing even more aggressive timelines for remote and military applications.", chokepoint: "Partial", capital_intensity: "Very High", moat_type: "Certification + Process IP", margin_profile: "Very High (operating) / N/A (development)", companies: [

        { tier: "Identity & Access Management (IAM/PAM)", fn: "Governs who and what can authenticate to, and authorize actions within, enterprise systems, cloud resources, and AI infrastructure — the first and most foundational control plane in any security architecture. IAM covers authentication (verifying identity via password, MFA, passkey, or certificate), authorization (enforcing least-privilege RBAC and ABAC policies defining what an authenticated identity can do), and privileged access management (securing the most sensitive credentials behind time-limited, audited just-in-time access). For AI, IAM has expanded to cover non-human identities: the API keys, service principals, and machine accounts that AI agents and automated pipelines use are often more numerous and higher-privilege than human accounts, and their compromise has caused the majority of recent cloud security breaches. High switching costs — every application and cloud resource integrates with the IAM provider — combined with regulatory mandates (SOC 2, FedRAMP, ISO 27001 all require documented access controls), make IAM the stickiest tier of the enterprise security stack with near-zero voluntary churn.", chokepoint: "Partial", capital_intensity: "Low", moat_type: "Switching cost · Ecosystem", margin_profile: "Very High", companies: [

        { tier: "Endpoint Detection & Response (EDR)", fn: "Monitors every process, file, registry key, and network call on endpoints — laptops, servers, and cloud workloads — to detect and contain threats in real time by correlating behavioral signals that signature-based antivirus cannot catch. EDR agents collect continuous telemetry from the kernel level, streaming it to a cloud-native detection platform that applies behavioral analytics and machine learning to distinguish legitimate software from malware, ransomware delivery chains, and lateral movement activity. Modern XDR platforms extend EDR telemetry with network, identity, cloud, and email signals into a unified dataset, enabling attack chains to be reconstructed across multiple environments simultaneously. The market consolidation toward multi-module XDR increases switching costs: replacing the EDR agent requires renegotiating coverage for endpoints, identity, cloud, and SIEM simultaneously. AI-powered behavioral baselines (CrowdStrike Charlotte AI, Microsoft Security Copilot) are extending detection beyond known attack patterns to novel zero-day behaviors, further widening the quality gap between AI-native and legacy AV vendors.", chokepoint: "Partial", capital_intensity: "Low", moat_type: "Switching cost · Ecosystem · Scale", margin_profile: "Very High", companies: [

        ] },
        { tier: "Network Detection & Response (NDR)", fn: "Inspects east-west (lateral, server-to-server) and north-south (perimeter, client-to-internet) traffic flows to detect anomalies, lateral movement, command-and-control beaconing, and data exfiltration attempts that endpoint agents cannot observe. NDR systems receive a copy of network traffic via SPAN port or TAP, decode protocols at layers 2–7, and apply behavioral analytics to identify deviations from learned baselines — a server suddenly communicating with an unusual external IP, or an endpoint scanning internal subnets (a classic lateral-movement indicator). Modern next-generation firewalls (NGFWs) combine stateful packet inspection, IPS/IDS, SSL inspection, and application-layer visibility into a single policy engine, blurring the boundary between traditional firewall, NDR, and SD-WAN. The investment thesis for network security vendors rests on the persistence of the network perimeter in hybrid environments: even as workloads move to the cloud, enterprise campuses, OT networks, branch offices, and AI training cluster fabrics continue to require hardware appliances for traffic inspection and enforcement.", chokepoint: "N", capital_intensity: "Medium", moat_type: "Scale · Switching cost", margin_profile: "High", companies: [

        ] },
        { tier: "Cloud Security Posture (CSPM/CNAPP)", fn: "Continuously audits cloud infrastructure configurations and workload runtime behavior against security benchmarks (CIS Benchmarks, NIST CSF) and compliance frameworks (SOC 2, PCI-DSS, HIPAA), detecting and remediating the misconfigurations responsible for over 80% of cloud security breaches. CSPM corrects configuration drift by comparing each cloud resource's current settings against a desired secure state and alerting or auto-remediating deviations. CNAPP extends CSPM to include runtime threat detection in containers and Kubernetes workloads (CWPP), infrastructure-as-code scanning, API security posture, and developer security tooling embedded in CI/CD pipelines. The shift to multicloud environments dramatically expands the CNAPP TAM: each additional cloud (AWS, Azure, GCP, OCI) adds a distinct control plane with its own misconfiguration vectors, requiring a vendor-agnostic layer to provide unified visibility and remediation. As enterprises run AI workloads across multiple clouds simultaneously, CNAPP coverage of AI model serving endpoints and training infrastructure is becoming mandatory in regulated industries.", chokepoint: "N", capital_intensity: "Low", moat_type: "Ecosystem · Switching cost", margin_profile: "Very High", companies: [

        ] },
        { tier: "Data Security & Backup / Recovery", fn: "Protects data at rest and in motion through encryption, data loss prevention (DLP), rights management, and classification — and ensures recovery from ransomware, accidental deletion, or hardware failure through immutable, air-gapped backup architectures. Data security has become the last line of defense in the ransomware era: when perimeter and endpoint controls fail, the ability to recover clean data from an immutable backup that attackers cannot delete or encrypt determines whether the victim pays a ransom or recovers cleanly. Rubrik and Cohesity pioneered the data resilience category with snapshot-based immutable backup that stores multiple recovery points in a format attackers cannot modify, even with domain admin credentials. DLP tools monitor and block data movement to unauthorized destinations, addressing insider threat and accidental exfiltration. For AI, data security must extend to training data provenance and model weight protection — ensuring proprietary training corpora and fine-tuned model weights cannot be exfiltrated by attackers or insiders, a requirement increasingly cited in enterprise AI governance frameworks.", chokepoint: "Partial", capital_intensity: "Medium", moat_type: "Switching cost · Certification", margin_profile: "High", companies: [

        { tier: "Security Operations (SIEM/SOAR/XDR)", fn: "Aggregates telemetry from all other security tiers — endpoint, network, identity, cloud, and email — correlates it into a unified event timeline, and automates investigation and response workflows to compress the time between attacker initial access and detection. SIEM ingests logs and events from hundreds of sources; SOAR automates the playbooks that tier-1 analysts follow when an alert fires; XDR extends native telemetry integration across the security stack into a cohesive response surface. The secular driver is attacker dwell time: enterprise teams must detect and contain breaches in minutes, not the days or weeks that manual SIEM workflows allow. AI-native SOC automation is collapsing this window — LLM-powered alert triage can reduce analyst review time per alert from 30 minutes to under 2, enabling smaller security teams to maintain higher coverage rates. Cortex XSIAM (PANW) and Microsoft Sentinel represent the two competing architectures: best-of-breed AI-native SOC versus hyperscaler-bundled security operations.", chokepoint: "N", capital_intensity: "Low", moat_type: "Scale · Ecosystem · Switching cost", margin_profile: "High", companies: [

        { tier: "Distributed Training Orchestration", fn: "Orchestrate GPU/TPU clusters at scale for model pre-training and reinforcement learning using parallelism strategies that saturate interconnect bandwidth and minimize idle compute time. Training a frontier model with 70B–1T+ parameters requires coordinating thousands of GPUs across four parallelism strategies simultaneously: data parallelism (split batch across GPUs), tensor parallelism (split matrix operations across GPUs within a node), pipeline parallelism (split model layers across nodes), and expert parallelism for mixture-of-experts architectures. Efficient orchestration must overlap computation with communication — streaming gradient all-reduces over the network fabric while the GPU is still computing — to prevent fabric latency from stalling the training loop. Fault tolerance is critical: a 10,000-GPU training run that fails and restarts from a stale checkpoint wastes weeks of compute and millions of dollars. Training orchestration software (Megatron-LM, DeepSpeed, PyTorch FSDP) manages these challenges, but the GPU cloud providing bare metal — with dedicated InfiniBand fabric and fast parallel storage — is the physical substrate that makes or breaks training throughput.", chokepoint: "Partial", capital_intensity: "High", moat_type: "Process IP + Ecosystem", margin_profile: "High", companies: [

        { tier: "Alignment & Safety Tuning", fn: "Adapt base foundation models to be helpful, harmless, and honest through supervised fine-tuning (SFT), preference learning (RLHF, DPO, PPO), and systematic safety evaluation that reduces harmful outputs while improving instruction-following quality. Alignment is the production-readiness step between a raw pre-trained base model and a deployable AI assistant: a base LLM trained on raw internet text will produce incoherent, harmful, or deceptive outputs without the SFT and RLHF stages that teach it to follow instructions, decline harmful requests, and express uncertainty. Constitutional AI (Anthropic), RLHF with human labelers (OpenAI), and Direct Preference Optimization are competing techniques for eliciting aligned behavior without reducing capability. For enterprise deployment, alignment encompasses domain-specific fine-tuning (adapting a general model to medical, legal, or financial conventions) and red-teaming (adversarial testing to discover jailbreaks before release). Regulatory pressure from the EU AI Act and US executive orders is institutionalizing alignment and safety evaluation as mandatory pre-deployment steps for high-risk AI systems. No large-cap public pure-play exists; this work is performed internally by foundation model labs.", chokepoint: "N", capital_intensity: "Low–Medium", moat_type: "Process IP", margin_profile: "Medium", companies: [] },
        { tier: "Model Optimization & Compilation", fn: "Reduce model size, latency, and compute cost for production inference without unacceptable quality degradation, using quantization, pruning, distillation, and hardware-specific kernel compilation. A Llama 3 70B model at full BF16 precision requires ~140GB of VRAM — more than any single GPU holds — but quantized to INT4 using GPTQ or AWQ, the same model fits in 35GB and runs on two A100s with under 3% quality degradation on standard benchmarks. Techniques include: post-training quantization (PTQ) — reducing weight precision from 32/16-bit to 8/4/3-bit; structured pruning — removing attention heads or layers whose ablation minimally impacts output quality; knowledge distillation — training a smaller student model to mimic a larger teacher; and hardware-specific kernel compilation (CUDA kernels, TensorRT, XLA for TPUs) that optimizes memory access patterns for each accelerator architecture. These optimizations span a 100x efficiency gap: a model that costs $10 per million tokens unoptimized can cost $0.10 optimized — the difference that determines whether AI applications are economically viable in production at consumer scale.", chokepoint: "N", capital_intensity: "Low", moat_type: "Process IP (inference kernels) + Switching cost", margin_profile: "Medium–High", companies: [] },
        { tier: "Inference Serving & Scaling", fn: "Serve model inference at scale with low P50/P95 latency, high throughput, and cost-efficient GPU utilization through continuous batching, KV cache management, speculative decoding, and dynamic request routing. Inference serving is distinct from training: while training maximizes GPU utilization over long deterministic runs, inference must respond to unpredictable request bursts with consistent latency while maximizing the concurrent requests sharing GPU memory. vLLM's PagedAttention (2023) was the breakthrough: managing the KV cache like a virtual memory system, enabling GPU memory to be shared across thousands of concurrent requests without reallocation overhead. Speculative decoding allows a small draft model to predict next tokens while the large model verifies in parallel, reducing per-token latency 2–3x with no quality loss. Continuous batching allows new requests to join mid-flight. The economics are stark: an unoptimized deployment might achieve 10% GPU utilization; an optimized vLLM or TensorRT-LLM deployment reaches 70–80%, reducing per-token cost 7–8x. Hyperscalers and GPU clouds are the primary providers of inference compute at scale.", chokepoint: "Y", capital_intensity: "High", moat_type: "Ecosystem + Process IP + Switching cost", margin_profile: "High", companies: [

        { tier: "MLOps & Model Lifecycle Management", fn: "Manage the end-to-end model lifecycle — experiment tracking, versioning, CI/CD pipelines, feature stores, drift monitoring, and automated retraining — to operationalize AI models as reliable, continuously improving production services rather than one-off research artifacts. MLOps closes the gap between a model that performs well in offline evaluation and one that reliably delivers value in production: the same neural network achieving 95% accuracy on a held-out test set can degrade to 70% accuracy within weeks if the input distribution drifts and no monitoring catches the shift. Feature stores ensure training features are served consistently at inference time; model registries version and audit every model deployed; CI/CD pipelines automate the evaluation gate determining whether a new version should replace the incumbent; drift monitors alert teams when input or output distributions diverge from expectations. As organizations deploy dozens to hundreds of models simultaneously, the operational overhead of ad-hoc model management becomes untenable — creating structural demand for MLOps platforms that provide centralized governance, reproducibility, and observability across the entire model portfolio.", chokepoint: "N", capital_intensity: "Low–Medium", moat_type: "Switching cost + Ecosystem", margin_profile: "Medium", companies: [

      tiers: [
        { tier: "Perception Layer", fn: "Provides multi-modal sensing of the physical environment — capturing geometry (LiDAR, depth cameras), semantics (RGB cameras with object detection), and identity (radar, thermal) to give robots and autonomous systems the environmental awareness required for safe navigation and manipulation. The perception layer is the sensory interface between the digital AI stack and the physical world: without accurate, high-rate sensor data, downstream planning and control algorithms have nothing to reason about. LiDAR delivers precise 3D geometry at 10-20 Hz across 100m+ range; cameras provide dense semantic information at 30-120 Hz but require heavy neural network processing to extract depth and identity; radar provides reliable velocity and range estimation in adverse weather where cameras and LiDAR degrade. Modern perception architectures fuse all three modalities, training deep learning models to produce unified scene representations that downstream planners can act on. The sensor cost curve is critical: automotive-grade solid-state LiDAR has fallen from $75,000 (Velodyne HDL-64E, 2010) to under $500 (Ouster REV7, 2024), opening robotics, smart infrastructure, and industrial automation markets that were previously uneconomical.", chokepoint: "Partial", capital_intensity: "Medium", moat_type: "Process IP / Sensor design", margin_profile: "Medium–High", companies: [

        { tier: "Actuators & Motors", fn: "Converts electrical control commands into precise physical motion — the muscular layer of any robot, autonomous vehicle, or industrial automation system that translates AI planning decisions into real-world action. Actuators span a wide range: brushless DC motors with harmonic drives for humanoid robot joints (requiring high torque-to-weight ratio and precise position control); linear actuators for manufacturing robots; hydraulic actuators for heavy machinery; and micro-actuators for medical devices and precision instruments. The limiting factor for humanoid robotics specifically is joint actuator performance: human joints can generate 100+ Nm of torque at low weight, while matching this with electric actuators requires proprietary motor winding geometries, rare-earth permanent magnets (neodymium), and precision gear reduction — a supply chain that intersects directly with the Critical Minerals sector (Nd, Dy for NdFeB magnets). Soft robotics, pneumatic actuators, and electroactive polymer actuators represent alternative approaches that trade peak force for compliance and adaptability, relevant for human-robot interaction applications. No large-cap US pure-play public actuator company exists; the market is served by Maxon, Harmonic Drive, and diversified industrial conglomerates.", chokepoint: "N", capital_intensity: "Medium", moat_type: "Mechanical precision / Application-specific", margin_profile: "Medium", companies: [] },
        { tier: "Robot OS & Middleware", fn: "Provides the software framework for sensor-actuator integration, inter-node publish-subscribe communication, coordinate transforms, hardware abstraction, and system orchestration — the operating environment that makes heterogeneous robot components work together as a coherent system. ROS 2 (Robot Operating System) is the de facto open-source standard: it provides a peer-to-peer message-passing middleware (DDS-based), a library of perception, planning, and control packages, and a hardware abstraction layer that lets the same software stack run on different sensor and actuator combinations. ROS 2 has achieved dominant ecosystem position in research and increasingly in production deployments (Boston Dynamics, Fetch Robotics, Locus Robotics all use it), creating a strong developer network effect. The commercial middleware market adds enterprise features ROS lacks: real-time scheduling guarantees (ISO 26262 safety certification), fleet management integration, over-the-air update management, and security hardening. NVIDIA's Isaac ROS provides GPU-accelerated ROS 2 perception packages specifically optimized for Jetson hardware, deepening NVIDIA's stack lock-in across the physical AI supply chain.", chokepoint: "N", capital_intensity: "Low", moat_type: "Ecosystem / Developer lock-in", margin_profile: "Low–Medium", companies: [] },
        { tier: "AI Model Training & Deployment", fn: "Trains perception, planning, and language-conditioned manipulation models in the cloud using large datasets of real-world and simulated experience, then compiles and quantizes those models for deployment on edge compute modules with megawatt-class power budgets. Physical AI models have distinct training requirements from language models: they require photorealistic simulation environments (NVIDIA Omniverse, MuJoCo) that can generate millions of hours of synthetic robot experience without real-world risk, plus domain randomization techniques (varying lighting, textures, object positions) that ensure sim-to-real transfer. Imitation learning from human teleoperation demonstrations (used by Figure AI, 1X Technologies, Physical Intelligence) is an increasingly popular alternative to pure reinforcement learning, requiring infrastructure for teleoperation data capture, annotation, and training pipeline management. The deployment step is critical: a 7B-parameter vision-language-action model must be quantized to INT8 or INT4, compiled to TensorRT or CoreML format, and validated against the edge hardware's compute budget before it can run in real time on the robot. NVIDIA's ecosystem (Isaac Sim + Isaac ROS + Jetson + TAO Toolkit) provides the most complete end-to-end physical AI training-to-deployment pipeline.", chokepoint: "Partial", capital_intensity: "Medium", moat_type: "Data / Cloud training infra", margin_profile: "High", companies: [] },
        { tier: "System Integration & OEM Assembly", fn: "Integrates perception, compute, actuation, power, and software subsystems into a validated, deployable robot or edge AI device — and manages the OEM manufacturing, quality control, and field support that transforms prototypes into products shipped at scale. System integration is where the physical AI stack becomes a product: a perception stack that works in lab conditions must be validated across weather, lighting, and obstacle variations; actuators must be calibrated and matched to the control model; the power system must be sized for the target runtime; and the full system must pass the safety certifications (CE, UL, ISO 3691-4 for industrial robots, ISO 26262 for vehicles) required for deployment. This tier is the highest-human-capital layer of the physical AI stack: systems integration engineers who understand the interaction between mechanical tolerances, sensor calibration, software pipelines, and real-world deployment conditions are scarce and expensive. The investment moat here is application-specific: a robot integrator who has deployed 500 units in a specific warehouse environment has accumulated calibration data, failure mode knowledge, and customer process integration depth that a new entrant cannot replicate without deploying 500 units of its own.", chokepoint: "N", capital_intensity: "High", moat_type: "Systems engineering / Application knowledge", margin_profile: "Low–Medium", companies: [] },
        { tier: "Fleet Management & Operations Platform", fn: "Monitors, orchestrates, and continuously improves deployed robot fleets across multiple sites in real time — providing the cloud software layer that transforms individual robots from standalone machines into a networked, collectively-learning workforce. Fleet management covers remote monitoring (battery state, fault detection, uptime tracking), mission orchestration (dispatching robots to tasks based on priority and location), over-the-air model and software updates, and fleet-level analytics (throughput per robot, failure frequency by site, ROI vs. human labor). The investment moat at this tier is data network effects: a fleet management platform operating 10,000 robots accumulates a performance and failure dataset that improves routing algorithms, anomaly detection models, and predictive maintenance predictions in ways that a 100-robot competitor cannot match. Each new robot fleet enrolled makes the platform smarter for all other operators. As physical AI scales, fleet management becomes the primary monetization layer for robot-as-a-service (RaaS) business models: the robot itself may be sold at low margin, with recurring software and operations contracts delivering the lifetime value.", chokepoint: "N", capital_intensity: "Low", moat_type: "Data network effects / Switching cost", margin_profile: "High", companies: [] },
        { tier: "Autonomous Vehicles & ADAS", fn: "Productizes the full self-driving and driver-assistance stack for road vehicles — integrating multi-modal perception, crowdsourced HD map generation, motion planning, and safety policy enforcement into products delivered to automakers as both hardware modules (ADAS SoCs, sensor kits) and software-defined features (Over-the-Air Level 2+ upgrades). ADAS represents the highest-volume current application of physical AI: over 60M passenger vehicles shipped annually now include camera-based emergency braking, lane-keep assist, or adaptive cruise control, generating hundreds of billions of miles of training data per year. The moat in ADAS is the data flywheel: Mobileye has collected crowdsourced road data from 200M+ driving miles using its passive REM mapping system embedded in production vehicles, creating an HD map database competitors cannot replicate without the same installed base. Level 3-5 autonomous driving (eyes-off, hands-off at highway speeds or in geofenced areas) remains the large-prize category but is progressing more slowly than forecasts from 2018-2020 projected, with regulatory approval timelines in Western markets adding multi-year delays beyond technical readiness.", chokepoint: "Partial", capital_intensity: "Medium–High", moat_type: "Process IP + Data network effects + ASIL-D qualification", margin_profile: "Medium–High", companies: [

        { tier: "Payment Network Rails & Settlement", fn: "Provides the clearing, netting, and settlement backbone for all electronic money movement — the plumbing layer that processes trillions of dollars in transactions daily without which digital commerce, embedded finance, and AI-powered financial services cannot operate. Payment rails include real-time gross settlement systems (Fedwire, CHAPS), card network authorization and clearing (Visa/Mastercard rails), ACH batch settlement, and emerging real-time payment networks (RTP, FedNow) that enable instant fund transfer without batch delays. The rails layer is the ultimate chokepoint: every payment made through any fintech application — BNPL, neobank, B2B payment, digital wallet — ultimately clears over these rails. The strategic moat is absolute: Visa and Mastercard together process over $20 trillion in annual volume across 4B+ cards with four-party network effects (issuers, acquirers, merchants, cardholders) that have required 50 years to build and cannot be disintermediated without sovereign-level intervention. AI is beginning to penetrate the rails layer through real-time fraud scoring embedded in authorization flows.", chokepoint: "Y", capital_intensity: "Low", moat_type: "Ecosystem / Scale", margin_profile: "Very High", companies: [] },

        { tier: "Risk & Fraud AI Models", fn: "Detects and suppresses fraudulent transactions, account takeovers, synthetic identity fraud, and credit risk events in real time using machine learning models trained on hundreds of billions of historical transactions. Fraud detection is the highest-ROI AI application in financial services: a model that prevents 0.1% more fraud at a $1T-volume institution saves $1B annually with near-zero incremental cost, justifying enormous investment in model quality. Modern fraud models combine graph neural networks (detecting anomalous relationship patterns between accounts), behavioral biometrics (detecting account takeovers from typing patterns and device telemetry), and real-time velocity checks — all evaluated in under 100ms during payment authorization. The AI investment opportunity at this tier is diffuse: every payment network, bank, and e-commerce platform runs proprietary fraud models, and the market is served by a mix of network-embedded models (Visa Advanced Authorization), bank-internal ML teams, and vendor platforms (NICE Actimize, Featurespace). No large-cap public pure-play in our tracking universe currently.", chokepoint: "Partial", capital_intensity: "Low", moat_type: "Process IP / Switching cost", margin_profile: "Very High", companies: [] },

// tier → layer reverse index ("slug|tier" → layer index)
const _tierLayer={};
STACK.layers.forEach((L,i)=>L.boxes.forEach(b=>{if(b.slug&&b.tier)_tierLayer[b.slug+'|'+b.tier]=i;}));
function _layerLabel(i){const L=STACK.layers[i];return"L"+L.num+" "+L.name;}

function _tierLookup(slug,tierName){
  const s=DATA.sectors.find(x=>x.slug===slug);
  if(!s)return{sector:null,tier:null};
  return{sector:s,tier:s.tiers.find(t=>t.tier===tierName)||null};
}
function _chipHtml(tk,fallbackSector,ctxLabel,ctxFn){
  const info=TICKER_MAP[tk];
  const sName=((info&&info.sectorName)||fallbackSector||"").replace(/'/g,"\\'");
  const args="'"+tk+"','"+sName+"'"+(ctxLabel?",'"+String(ctxLabel).replace(/'/g,"\\'")+"','"+String(ctxFn||"").replace(/'/g,"\\'")+"'":"");
  return '<span class="chip" onclick="event.stopPropagation();openStackTicker('+args+')">'+esc(tk)+'</span>';
}
function _railFlow(f){return f==="in"?"\u2193 power in":f==="out"?"\u2191 heat out":f==="wrap"?"\u21bb wraps every layer":"";}
// One compact rail sub-box card — wired to its KB tier (clickable) or a muted gap.
function _railBoxCard(b,railTitle){
  if(b.gap){
    const chips=(b.chips||[]).map(t=>_chipHtml(t,"",railTitle,"showLayer(0)")).join("");
    return '<div class="rail-box gap"><div class="rail-box-label">'+esc(b.label)+'<span class="gap-tag">unmapped</span></div>'
      +(chips?'<div class="chip-row">'+chips+'</div>':'')+'</div>';
  }
  const{sector,tier}=_tierLookup(b.slug,b.tier);
  const choke=b.choke!==undefined?b.choke:(tier&&tier.chokepoint==="Y");
  const sName=sector?sector.name:"";
  const chips=(b.chips&&b.chips.length?b.chips:(tier?(tier.companies||[]).map(c=>c.ticker):[]))
    .slice(0,6).map(t=>_chipHtml(t,sName,railTitle,"showLayer(0)")).join("");
  const onclick=tier?' onclick="openStackTier(\''+b.slug+'\',\''+b.tier.replace(/'/g,"\\'")+'\')"':'';
  return '<div class="rail-box'+(choke?' choke':'')+'"'+onclick+'>'
    +'<div class="rail-box-label">'+(choke?'<span class="choke-mark">⧫</span>':'')+esc(b.label)+'</div>'
    +'<div class="chip-row">'+chips+'</div></div>';
}
function _railHtml(rail){
  const flow=rail.flow?'<span class="rail-flow '+rail.flow+'">'+esc(_railFlow(rail.flow))+'</span>':'';
  const groups=rail.groups.map(g=>{
    const boxes=(g.boxes&&g.boxes.length)?g.boxes.map(b=>_railBoxCard(b,rail.title)).join(""):'';
    return '<div class="rail-group"><div class="rail-group-label">'+esc(g.label)+'</div>'
      +'<div class="rail-box-col">'+boxes+'</div></div>';
  }).join("");
  return '<div class="rail-card '+rail.id+(rail.kind==="surface"?' surface':'')+'"><div class="rail-title">'+esc(rail.title)+flow+'</div>'
    +'<div class="rail-cap">'+esc(rail.cap)+'</div>'+groups+'</div>';
}

// Cluster a layer's boxes by their optional "group" tag, preserving order.
function _groupBoxes(boxes){
  const out=[],idx={};
  boxes.forEach(b=>{
    const g=b.group||"";
    if(idx[g]===undefined){idx[g]=out.length;out.push({group:g,boxes:[]});}
    out[idx[g]].boxes.push(b);
  });
  return out;
}
// Render one homepage sub-box card (handles gap boxes — muted, non-clickable).
function _subboxCard(b,i){
  const ctxL=_layerLabel(i),ctxF="openLayer("+i+")";
  if(b.gap){
    const chips=(b.chips||[]).slice(0,6).map(t=>_chipHtml(t,"",ctxL,ctxF)).join("");
    return '<div class="subbox gap"><div class="subbox-label">'+esc(b.label)+'<span class="gap-tag">unmapped</span></div>'
      +(chips?'<div class="chip-row">'+chips+'</div>':'')+'</div>';
  }
  const{sector,tier}=_tierLookup(b.slug,b.tier);
  const choke=b.choke!==undefined?b.choke:(tier&&tier.chokepoint==="Y");
  const sName=sector?sector.name:"";
  const chips=(b.chips&&b.chips.length?b.chips:(tier?(tier.companies||[]).map(c=>c.ticker):[]))
    .slice(0,6).map(t=>_chipHtml(t,sName,ctxL,ctxF)).join("");
  const onclick=tier?' onclick="openStackTier(\''+b.slug+'\',\''+b.tier.replace(/'/g,"\\'")+'\','+i+')"':'';
  return '<div class="subbox'+(choke?' choke':'')+'"'+onclick+'>'

}
function renderL0(){
  const leftRail=STACK.rails.filter(r=>r.side==="left").map(_railHtml).join("");
  const rightRail=STACK.rails.filter(r=>r.side==="right").map(_railHtml).join("");
  const stack=STACK.layers.map((L,i)=>{
    const inner=_groupBoxes(L.boxes).map(g=>{
      const cards=g.boxes.map(b=>_subboxCard(b,i)).join("");
      return g.group
        ? '<div class="subgroup"><div class="subgroup-band">'+esc(g.group)+'</div><div class="subbox-row">'+cards+'</div></div>'
        : '<div class="subbox-row">'+cards+'</div>';
    }).join("");
    let html='<div class="layer" style="--lh:'+L.hue+';--lbg:oklch(96.5% .03 '+L.hue+')">'
      +'<div class="layer-head" onclick="openLayer('+i+')" title="View this layer"><span class="layer-num">L'+L.num+'</span>'
      +'<span class="layer-name">'+esc(L.name)+'</span>'
      +'<span class="layer-tag">'+esc(L.tag)+'</span><span class="layer-go">View ›</span></div>'
      +'<div class="subbox-area">'+inner+'</div></div>';
    if(i<STACK.connectors.length){
      const c=STACK.connectors[i];
      html+='<div class="connector'+(c.choke?' choke':'')+'"><span class="connector-label">'+esc(c.label)+'</span></div>';
    }
    return html;
  }).join("");
  document.getElementById("l0").innerHTML=
    '<div class="stack-intro">The AI buildout as a single dependency stack — each layer <strong>runs on</strong> the one below it, all the way down to the critical minerals at the bedrock. The rails frame it: <strong>Power</strong> comes in (left), <strong>Heat</strong> comes out &amp; <strong>Security</strong> wraps around (right), and <strong>Edge &amp; Physical AI</strong> is where it all deploys into the world. Amber <span style="color:var(--amber)">⧫</span> marks chokepoints; hatched boxes are <strong>unmapped</strong> coverage gaps. Click a <strong>layer header</strong>, a <strong>sub-box</strong>, or a <strong>ticker</strong> to drill in.</div>'
    +'<div class="stack-grid"><div class="rail">'+leftRail+'</div>'
    +'<div class="stack">'+stack+'</div>'
    +'<div class="rail">'+rightRail+'</div></div>';
}

function openStackTier(slug,tierName,layerIdx){
  const s=DATA.sectors.find(x=>x.slug===slug);
  if(!s){return;}
  activeSector=s;
  activeLayerIdx=(layerIdx!==undefined&&layerIdx!==null)?layerIdx:(_tierLayer[slug+"|"+tierName]!==undefined?_tierLayer[slug+"|"+tierName]:null);
  const idx=s.tiers.findIndex(t=>t.tier===tierName);
  if(idx<0){return;}
  openTier(idx);
}

// Layer view (L1) — replaces the retired cross-cutting sector list.
function openLayer(i){
  activeLayerIdx=i;
  renderLayerView(i);
  showLayer(1);
}

function _layerBoxCard(b,i){
  const ctxL=_layerLabel(i),ctxF="openLayer("+i+")";

      +(chips?'<div class="chip-row">'+chips+'</div>':'')+'</div>';
  }
  const{sector,tier}=_tierLookup(b.slug,b.tier);
  const choke=b.choke!==undefined?b.choke:(tier&&tier.chokepoint==="Y");
  const sName=sector?sector.name:"";
  const chips=(b.chips&&b.chips.length?b.chips:(tier?(tier.companies||[]).map(c=>c.ticker):[]))
    .map(t=>_chipHtml(t,sName,ctxL,ctxF)).join("");
  const onclick=tier?' onclick="openStackTier(\''+b.slug+'\',\''+b.tier.replace(/'/g,"\\'")+'\','+i+')"':'';
  const count=tier&&tier.companies?tier.companies.length:0;
  return '<div class="layer-box'+(choke?' choke':'')+'"'+onclick+'>'
    +'<div class="layer-box-head"><span class="layer-box-label">'+(choke?'<span class="choke-mark">⧫</span>':'')+esc(b.label)+'</span>'
    +'<span class="layer-box-sector">'+esc(sName)+'</span></div>'

}

const WIKI_CACHE={};

async function openTicker(ticker,sName){
  showLayer(3);
  document.getElementById("l3").innerHTML='<div class="wiki-loading">Loading '+ticker+'…</div>';
  if(!(ticker in WIKI_CACHE)){
    try{
      // Try three-layer path first (TICKER/analysis.md), fall back to legacy TICKER.md
      let r=await fetch(rawGithubUrl(sName,ticker));
      if(r.ok){WIKI_CACHE[ticker]=await r.text();}
      else{r=await fetch(rawGithubUrl(sName,ticker,true));WIKI_CACHE[ticker]=r.ok?await r.text():null;}
    }catch(e){WIKI_CACHE[ticker]=null;}
  }
  renderL3(ticker,sName);
}

    +'</div>'

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Hierarchical breadcrumb trail. parts: [{label, fn?}, …]; an item without fn is the current (non-clickable) crumb.
function crumbTrail(parts){
  return '<div class="breadcrumb">'+parts.map((p,i)=>
    (i>0?'<span class="crumb-sep">›</span>':'')
    +(p.fn?'<span class="crumb-link" onclick="'+p.fn+'">'+esc(p.label)+'</span>'
          :'<span class="crumb-cur">'+esc(p.label)+'</span>')
  ).join('')+'</div>';
}

function inlineMd(text){
  let s=esc(text);
  s=s.replace(/\[\[([^\]]+)\]\]/g,'$1');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(?<![a-zA-Z0-9])_(.+?)_(?![a-zA-Z0-9])/g,'<em>$1</em>');
  s=s.replace(/`([^`]+)`/g,'<code class="wiki-code">$1</code>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}

function parseWiki(md){
  const lines=md.split('\n');
  let html='',inTable=false,tableRows=[],inList=false,listType='',sectionOpen=false;

  function flushTable(){
    if(!tableRows.length)return;
    const rows=tableRows.filter(r=>!/^\|[\s\-:|]+\|/.test(r));
    if(!rows.length){tableRows=[];inTable=false;return;}
    const cells=r=>r.split('|').slice(1,-1).map(c=>c.trim());
    const hdr=cells(rows[0]).map(h=>'<th>'+inlineMd(h)+'</th>').join('');
    const body=rows.slice(1).map(r=>'<tr>'+cells(r).map(c=>'<td>'+inlineMd(c)+'</td>').join('')+'</tr>').join('');
    html+='<div class="wiki-table-wrap"><table class="wiki-table"><thead><tr>'+hdr+'</tr></thead><tbody>'+body+'</tbody></table></div>';
    tableRows=[];inTable=false;
  }
  function flushList(){if(inList){html+='</ul>';inList=false;listType='';}}
  function closeSection(){if(sectionOpen){html+='</div>';sectionOpen=false;}}

  for(const line of lines){
    if(/^# /.test(line)||/^<!--/.test(line.trim()))continue;
    if(/^## /.test(line)){
      flushTable();flushList();closeSection();
      html+='<div class="wiki-section"><h2 class="wiki-h2">'+esc(line.slice(3).trim())+'</h2>';
      sectionOpen=true;continue;
    }
    if(/^### /.test(line)){flushTable();flushList();html+='<h3 class="wiki-h3">'+esc(line.slice(4).trim())+'</h3>';continue;}
    if(/^#### /.test(line)){flushTable();flushList();html+='<h4 class="wiki-h4">'+esc(line.slice(5).trim())+'</h4>';continue;}
    if(/^-{3,}$/.test(line.trim())){flushTable();flushList();continue;}
    if(/^\|/.test(line)){flushList();inTable=true;tableRows.push(line);continue;}
    else if(inTable)flushTable();
    if(/^> /.test(line)){flushList();html+='<div class="wiki-blockquote">'+inlineMd(line.slice(2).trim())+'</div>';continue;}
    if(/^- \[[ xX]\]/.test(line)){
      if(!inList||listType!=='checklist'){flushList();html+='<ul class="wiki-checklist">';inList=true;listType='checklist';}
      const done=/^- \[[xX]\]/.test(line);
      html+='<li class="'+(done?'done':'')+'">'+inlineMd(line.slice(6).trim())+'</li>';continue;
    }
    if(/^- /.test(line)){
      if(!inList||listType!=='ul'){flushList();html+='<ul class="wiki-list">';inList=true;listType='ul';}
      html+='<li>'+inlineMd(line.slice(2).trim())+'</li>';continue;
    }
    if(inList&&line.trim()===''){flushList();continue;}
    if(line.trim()===''){flushList();continue;}
    flushList();
    const p=inlineMd(line.trim());
    if(p){
      // italic-only line (e.g. *Last updated: …*)
      if(/^\*[^*].*[^*]\*$/.test(line.trim())||/^\*[^*]\*$/.test(line.trim()))
        html+='<p class="wiki-meta">'+p+'</p>';
      else
        html+='<p class="wiki-p">'+p+'</p>';
    }
  }
  flushTable();flushList();closeSection();
  return html;
}

function showTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));

  }

function renderTechRaces() {
  const groups={};
  DATA.tech_races.forEach(r=>{if(!groups[r.sector_group])groups[r.sector_group]=[];groups[r.sector_group].push(r);});
  const knownGroups=["AI Ecosystem","Crypto & Digital Assets","Healthcare & Biotech"];
  Object.keys(groups).forEach(g=>{if(!knownGroups.includes(g))knownGroups.push(g);});
  const html=knownGroups.map(g=>{
    const races=groups[g];
    if(!races||races.length===0)return '<div class="tech-group-label">'+esc(g)+'</div><div class="no-races">No active races yet — add entries to Technology Preferences.md as coverage expands.</div>';
    const cards=races.map(r=>{
      const conv=r.conviction.toLowerCase();
      const pills=r.tickers.map(t=>'<span class="exposure-pill '+t.exposure.toLowerCase()+'">'+esc(t.ticker)+'</span>').join('');
      return '<div class="race-card" onclick="openRace(\''+r.id+'\')">'

        +'<div class="race-card-name">'+esc(r.name)+'</div>'

  document.getElementById("tech-races").innerHTML='<h2 style="font-size:22px;font-weight:700;margin-bottom:32px">Technology Races</h2>'+html;

  document.getElementById("tech-race-detail").hidden=false;
}

function openTickerFromRace(raceId, ticker) {
  const r=DATA.tech_races.find(x=>x.id===raceId);
  const info=TICKER_MAP[ticker];
  _raceOrigin=r;
  activeSector=null;activeTierIdx=null;activeLayerIdx=null;
  openTicker(ticker,info?info.sectorName:'');
}

// ── Search ────────────────────────────────────────────────────────────────────
let _searchIdx = null;

function buildSearchIdx() {
  const idx = [];
  STACK.layers.forEach((L, i) => {
    idx.push({ type: "layer", label: _layerLabel(i), sub: L.tag, layerIdx: i, q: (L.name + " " + L.tag).toLowerCase() });
  });
  DATA.sectors.forEach(s => {
    s.tiers.forEach(t => {
      const layer = _tierLayer[s.slug + "|" + t.tier];
      const li = (layer !== undefined ? layer : "");
      idx.push({ type: "tier", label: t.tier, sub: s.name, slug: s.slug, tierName: t.tier, layerIdx: li, q: (t.tier + " " + (t.fn || "")).toLowerCase() });
      (t.companies || []).forEach(c => {
        idx.push({ type: "company", label: c.name, ticker: c.ticker || "", sub: t.tier + " · " + s.name, slug: s.slug, tierName: t.tier, layerIdx: li, q: ((c.ticker || "") + " " + c.name + " " + (c.notes || "")).toLowerCase() });
      });
    });
  });
  return idx;
}

function renderSearchResults(q) {
  const res = document.getElementById("search-results");
  if (!q) { res.hidden = true; return; }
  if (!_searchIdx) _searchIdx = buildSearchIdx();
  const hits = _searchIdx.filter(x => x.q.includes(q)).slice(0, 18);
  if (!hits.length) {
    res.innerHTML = "<div class=\"sr-empty\">No results</div>";
    res.hidden = false;
    return;
  }
  const groups = [["layer", "Layers"], ["tier", "Tiers"], ["company", "Companies"]];
  let html = "";
  groups.forEach(([type, label]) => {
    const group = hits.filter(h => h.type === type);
    if (!group.length) return;
    if (html) html += "<div class=\"sr-divider\"></div>";
    html += "<div class=\"sr-group-label\">" + label + "</div>";
    group.forEach(h => {
      const ticker = h.ticker ? "<span class=\"sr-ticker\">" + h.ticker + "</span>" : "";
      html += "<div class=\"sr-item\" data-type=\"" + h.type + "\""
        + (h.slug !== undefined ? " data-slug=\"" + esc(h.slug) + "\"" : "")
        + (h.tierName !== undefined ? " data-tiername=\"" + esc(h.tierName) + "\"" : "")
        + (h.layerIdx !== undefined && h.layerIdx !== "" ? " data-layer=\"" + h.layerIdx + "\"" : "")
        + ">"
        + ticker
        + "<div class=\"sr-text\"><div class=\"sr-label\">" + h.label + "</div><div class=\"sr-sub\">" + h.sub + "</div></div>"
        + "</div>";
    });
  });
  res.innerHTML = html;
  res.hidden = false;
}

document.getElementById("search-input").addEventListener("input", function () {
  renderSearchResults(this.value.trim().toLowerCase());
});

document.getElementById("search-input").addEventListener("keydown", function (e) {
  if (e.key === "Escape") {
    this.value = "";
    document.getElementById("search-results").hidden = true;
  }
});

document.getElementById("search-results").addEventListener("click", function (e) {
  const item = e.target.closest(".sr-item");
  if (!item) return;
  const type = item.dataset.type;
  const slug = item.dataset.slug;
  const tierName = item.dataset.tiername;
  const layer = item.dataset.layer;
  document.getElementById("search-input").value = "";
  document.getElementById("search-results").hidden = true;
  if (type === "layer") {
    openLayer(Number(layer));
  } else {
    openStackTier(slug, tierName, layer !== undefined ? Number(layer) : undefined);
  }
});

document.addEventListener("click", function (e) {
  if (!document.getElementById("search-wrap").contains(e.target)) {
    document.getElementById("search-results").hidden = true;
  }
});
</script>
