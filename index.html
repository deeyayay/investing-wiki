// ─── Router ───────────────────────────────────────────────────────────────────
function navigate(hash) {
  history.pushState(null, '', hash || '#');
  renderView(hash);
}
window.addEventListener('hashchange', () => renderView(location.hash));
window.addEventListener('load', () => renderView(location.hash));

function renderView(hash) {
  const app = document.getElementById('app');
  if (!hash || hash === '#' || hash === '#macro') renderMacro(app);
  else if (hash.startsWith('#sector/')) renderSector(app, hash.slice(8));
  else if (hash.startsWith('#ticker/')) renderTicker(app, hash.slice(8).toUpperCase());
  else renderMacro(app);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function impactPill(n) {
  return `<span class="imp-${n}">${n}</span>`;
}
function sigBadge(s) {
  if (!s) return '';
  return `<span class="sig-${s}">${s}</span>`;
}
function tickerChip(sym) {
  const t = KB.tickers[sym];
  return `<button class="ticker-chip" onclick="navigate('#ticker/${sym}')" aria-label="View ${sym}">${sym}</button>`;
}
function sectorChip(slug, name) {
  return `<button class="sector-chip" onclick="navigate('#sector/${slug}')" aria-label="View ${name} sector">${name}</button>`;
}
function healthDot(sector) {
  const items = KB.digest.items.filter(i => KB.tickers[i.ticker] && KB.tickers[i.ticker].sector === sector.name);
  const max = items.reduce((m,i) => Math.max(m, i.impact), 0);
  const color = max >= 5 ? 'var(--red)' : max >= 3 ? 'var(--amber)' : 'var(--green)';
  return `<span class="health-dot" style="background:${color}"></span>`;
}
function scoreBadge(scoring) {
  if (!scoring) return '';
  const c = scoring.composite;
  const cls = c >= 8 ? 'score-9' : c >= 7 ? 'score-7' : c >= 5 ? 'score-5' : 'score-low';
  return `<span class="score-badge ${cls}">${c}/10</span>`;
}

function renderChainMap(sector) {
  const sc = sector.supply_chain;
  // Group nodes by tier
  const tierMap = {};
  sc.tiers.forEach(t => { tierMap[t.tier] = {info: t, nodes: []}; });
  sc.nodes.forEach(n => {
    const key = n.tier;
    if (!tierMap[key]) tierMap[key] = {info:{chokepoint:'N'},nodes:[]};
    tierMap[key].nodes.push(n);
  });

  // Get all edges for highlight
  const edges = KB.ecosystem_graph.edges;

  let html = `<div class="chain-map"><div class="chain-lanes" id="chain-lanes-${sector.slug}">`;

  Object.entries(tierMap).forEach(([tierName, {info, nodes}]) => {
    const isChokepoint = info.chokepoint === 'Y';
    html += `<div class="tier-col">
      <div class="tier-header${isChokepoint ? ' chokepoint' : ''}" title="${info.function||''}">${tierName}</div>
      <div class="tier-body">`;

    nodes.forEach(n => {
      if (n.gap) {
        html += `<button class="node-chip gap-node" title="${n.notes || 'No public player'}" disabled aria-label="Gap: ${n.company}">⚠ ${n.company.slice(0,18)}</button>`;
      } else {
        const inKB = !!KB.tickers[n.ticker];

        const cpIcon = isChokepoint ? '<span class="chokepoint-icon">◆</span>' : '';
        html += `<button class="node-chip${inKB ? ' in-kb' : ' not-in-kb'}${isPortfolio ? ' portfolio' : ''}"
          ${inKB ? `onclick="navigate('#ticker/${n.ticker}')"` : ''}
          onmouseenter="${inKB ? `highlightNode('${n.ticker}','${sector.slug}')` : ''}"
          onmouseleave="clearHighlight('${sector.slug}')"
          title="${n.company}${n.notes ? ' — ' + n.notes : ''}"
          aria-label="${n.ticker}: ${n.company}"
        >${cpIcon}${n.ticker}</button>`;
      }
    });

    html += `</div></div>`;
  });

  html += `</div>`;

  // Legend
  html += `<div class="chain-legend">
    <span>● Hover a node to highlight supply relationships</span>
    <span><span style="color:var(--amber)">◆</span> = Chokepoint tier</span>
    <span><span style="color:var(--green)">■</span> = Supplies this node</span>
    <span><span style="color:var(--blue)">■</span> = This node supplies</span>
    <span style="border:1px dashed var(--muted);padding:1px 4px;border-radius:3px">⚠</span> = Structural gap (no public player)
  </div>`;

  // Framework status
  const fs = sc.framework_status;
  const steps = [
    {key:'mapped',label:'Mapped',cmd:null},
    {key:'nodes_registered',label:'Nodes Registered',cmd:`/add-ticker TICKER --sector "${sector.name}"`},
    {key:'ground_truth',label:'Ground Truth',cmd:`/stock-research-all --sector "${sector.name}"`},
    {key:'matrix_built',label:'Matrix Built',cmd:`/build-customer-matrix "${sector.name}"`},
    {key:'framework_written',label:'Framework Written',cmd:'Write _Sector Framework.md manually'}
  ];
  html += `<div style="margin-top:12px"><span style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.07em;text-transform:uppercase">Framework Progress</span></div>
  <div class="fw-status">`;
  steps.forEach(s => {
    const done = fs[s.key];
    html += `<span class="fw-pill ${done ? 'done' : 'todo'}" title="${done ? '✓ Complete' : (s.cmd || '')}">${done ? '✓' : '○'} ${s.label}</span>`;
  });
  html += `</div></div>`;

  return html;
}

// Node highlight logic
function highlightNode(ticker, slug) {
  const edges = KB.ecosystem_graph.edges;
  const upstream = new Set(edges.filter(e => e.target === ticker).map(e => e.source));
  const downstream = new Set(edges.filter(e => e.source === ticker).map(e => e.target));

  document.querySelectorAll('.node-chip.in-kb').forEach(chip => {
    const t = chip.getAttribute('aria-label').split(':')[0];
    if (t === ticker) return;
    if (upstream.has(t)) {
      chip.classList.add('highlighted-up');
      chip.classList.remove('dimmed');
    } else if (downstream.has(t)) {
      chip.classList.add('highlighted-down');
      chip.classList.remove('dimmed');
    } else {
      chip.classList.add('dimmed');
    }
  });
}

function clearHighlight(slug) {
  document.querySelectorAll('.node-chip').forEach(chip => {
    chip.classList.remove('highlighted-up','highlighted-down','dimmed');
  });
}

    digestItems.forEach(item => {
      html += `<div class="news-entry">
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">${impactPill(item.impact)}<span style="font-size:11px;color:var(--muted)">${KB.digest.date}</span></div>
        <div class="news-headline">${item.headline}</div>
        <div class="news-detail">${item.summary}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Sentiment
  const sent = KB.sentiment.by_ticker[sym];
  if (sent) {
    html += `<div class="section-block">
      <div class="section-label">Social Sentiment</div>
      <div style="display:flex;gap:10px;align-items:center">
        <span style="font-size:16px;font-weight:700">${sent.mentions}</span>
        <span style="font-size:12px;color:var(--muted)">signals</span>
        <span class="badge badge-purple">${sent.velocity_label}</span>
        <span style="font-size:12px;color:var(--muted)">Last: ${sent.last_signal_date}</span>
      </div>
    </div>`;
  }

  // Ecosystem
  html += `<div class="section-block">
    <div class="section-label">Ecosystem — Supply Chain Relationships</div>`;
  html += renderEcosystemPanel(sym);
  html += `</div>`;

  app.innerHTML = html;
}

function renderEcosystemPanel(sym) {
  const ecosystems = KB.ecosystem_graph.ecosystems;
  const edges = KB.ecosystem_graph.edges;

  // Case A: explicit ecosystem map
  if (ecosystems[sym]) {
    const eco = ecosystems[sym];
    let html = '';
    Object.entries(eco.tiers).forEach(([tierNum, nodes]) => {
      const label = eco.tier_labels[tierNum] || `Tier ${tierNum}`;
      html += `<div class="eco-zone">
        <div class="eco-zone-label">Tier ${tierNum} — ${label}</div>
        <div class="eco-chips">`;
      nodes.forEach(n => {
        const inKB = !!KB.tickers[n.ticker];
        html += `<button class="eco-chip${inKB ? '' : ''}" ${inKB ? `onclick="navigate('#ticker/${n.ticker}')"` : 'style="opacity:.5;cursor:default"'} title="${n.company}: ${n.relationship}" aria-label="${n.ticker}">${n.ticker}</button>`;
      });
      html += `</div></div>`;
    });

    // Center node
    html = `<div class="eco-center"><span style="font-size:16px;font-weight:700;color:var(--amber)">● ${sym}</span><div style="font-size:11px;color:var(--muted);margin-top:2px">This position</div></div>` + html;

    html += `<div class="chain-legend" style="margin-top:8px">
      <span><span style="color:var(--amber)">■</span> = Ecosystem map edges</span>
      <span><span style="color:var(--blue)">■</span> = Cross-ticker signal edges</span>
    </div>`;
    return html;
  }

  // Case B: cross-ticker signals only
  const upstream = edges.filter(e => e.target === sym);
  const downstream = edges.filter(e => e.source === sym);

  if (upstream.length === 0 && downstream.length === 0) {
    return `<p style="color:var(--muted);font-size:13px">No ecosystem relationships logged yet. Run <code>/ticker-monitor --deep ${sym}</code> to scan for supply chain links.</p>`;
  }

  let html = '';
  if (upstream.length > 0) {
    html += `<div class="eco-zone">
      <div class="eco-zone-label">Upstream (supplies / enables ${sym})</div>
      <div class="eco-chips">`;
    upstream.forEach(e => {
      const inKB = !!KB.tickers[e.source];
      html += `<button class="eco-chip up-chip" ${inKB ? `onclick="navigate('#ticker/${e.source}')"` : 'style="cursor:default"'} title="${e.implication ? e.implication.slice(0,80) : ''}" aria-label="${e.source}">${e.source}</button>`;
    });
    html += `</div></div>`;
  }

  html += `<div class="eco-center"><span style="font-size:16px;font-weight:700;color:var(--amber)">● ${sym}</span></div>`;

  if (downstream.length > 0) {
    html += `<div class="eco-zone">
      <div class="eco-zone-label">Downstream (${sym} supplies / enables)</div>
      <div class="eco-chips">`;
    downstream.forEach(e => {
      const inKB = !!KB.tickers[e.target];
      html += `<button class="eco-chip down-chip" ${inKB ? `onclick="navigate('#ticker/${e.target}')"` : 'style="cursor:default"'} title="${e.implication ? e.implication.slice(0,80) : ''}" aria-label="${e.target}">${e.target}</button>`;
    });
    html += `</div></div>`;
  }

  html += `<div class="chain-legend">
    <span><span style="color:var(--green)">■</span> Upstream (green border)</span>
    <span><span style="color:var(--blue)">■</span> Downstream (blue border)</span>
  </div>`;
  return html;
}
</script>
</body>
</html>
