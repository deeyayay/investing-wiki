* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; font-size: 13px; }
#hdr {

.site-title { font-weight: 700; letter-spacing: .08em; color: var(--amber); font-size: 12px; white-space: nowrap; }
.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn {

}
.filter-btn:hover { color: var(--text); border-color: var(--muted); }
.filter-btn.active { background: var(--amber); color: #000; border-color: var(--amber); font-weight: 700; }
#reset-btn {
  padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; margin-left: 4px;
}
#reset-btn:hover { color: var(--text); }
#layout { display: flex; height: calc(100vh - 48px); overflow: hidden; }
#stack-panel {
  width: 45%; min-width: 320px; position: relative;
  overflow-y: auto; border-right: 1px solid var(--border); padding: 16px;
}
#edge-svg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;

}
#detail-panel { flex: 1; overflow-y: auto; padding: 20px; }
.dim-row { margin-bottom: 18px; }
.dim-label {

// Helpers
function nameToSlug(name) {
  return name.toLowerCase().replace(/\s*&\s*/g, '-').replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
}
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '…' : s;
}
function chokeBadge(c) {
  if (c === 'Y') return '<span class="choke-badge-y">⬥ Y</span>';
  if (c === 'Partial') return '<span class="choke-badge-partial">◈ P</span>';
  return '<span class="choke-badge-no">No</span>';
}

// Build slug → name index
DATA.sectors.forEach(s => { s.slug = nameToSlug(s.name); });

// Compute per-sector edge stats
function getSectorEdges(name) {
  return DATA.edges.filter(e => e.from === name || e.to === name);
}
function getSectorChokeCount(name) {
  return DATA.edges.filter(e => e.from === name && e.chokepoint === 'Y').length;
}

// Render stack
const DIM_INFO = {
  D1: { label: 'D1 · AI Manufacturing Base', cls: 'd1' },
  D2: { label: 'D2 · AI Connectivity', cls: 'd2' },
  D3: { label: 'D3 · AI Infrastructure', cls: 'd3' },
  D4: { label: 'D4 · AI Enablement', cls: 'd4' },
  D5: { label: 'D5 · AI Applications', cls: 'd5' }
};

function renderStack() {
  const stack = document.getElementById('stack');
  ['D1','D2','D3','D4','D5'].forEach(dim => {
    const sectors = DATA.sectors.filter(s => s.dimension === dim);
    if (!sectors.length) return;
    const info = DIM_INFO[dim];
    const row = document.createElement('div');
    row.className = 'dim-row';
    row.dataset.dim = dim;
    const allEdges = sectors.reduce((sum, s) => sum + getSectorEdges(s.name).length, 0);
    const allChoke = sectors.reduce((sum, s) => sum + getSectorChokeCount(s.name), 0);
    row.innerHTML = `<div class="dim-label ${info.cls}">${info.label}</div><div class="dim-sectors" id="dim-sectors-${dim}"></div>`;
    stack.appendChild(row);
    const container = row.querySelector('.dim-sectors');
    sectors.forEach(s => {
      const card = document.createElement('div');
      card.className = 'sector-card';
      card.dataset.slug = s.slug;
      card.dataset.dim = dim;
      card.dataset.name = s.name;
      const chokeCount = getSectorChokeCount(s.name);
      const edgeCount = getSectorEdges(s.name).length;
      card.innerHTML = `
        <div class="card-name">${s.name}</div>
        <div class="card-meta">
          <span class="dim-badge ${info.cls}">${dim}</span>
          ${chokeCount > 0 ? `<span class="choke-count">⬥${chokeCount}</span>` : ''}
          <span class="edge-count">${edgeCount} edges</span>
        </div>`;
      card.addEventListener('click', () => selectSector(s.slug));
      container.appendChild(card);
    });
  });
}

// State
let currentSelected = null;
let activeFilter = 'all';

function selectSector(slug) {
  currentSelected = slug;
  const selectedSector = DATA.sectors.find(s => s.slug === slug);
  if (!selectedSector) return;
  const selectedName = selectedSector.name;

  document.querySelectorAll('.sector-card').forEach(c => {
    const sName = c.dataset.name;
    const isSelected = c.dataset.slug === slug;
    const connEdges = DATA.edges.filter(e =>
      (e.from === selectedName && e.to === sName) ||
      (e.to === selectedName && e.from === sName)
    );
    const isDown = connEdges.some(e => e.from === selectedName);
    const isUp = connEdges.some(e => e.to === selectedName);
    c.classList.toggle('selected', isSelected);
    c.classList.toggle('upstream', !isSelected && isUp);
    c.classList.toggle('downstream', !isSelected && isDown);
    c.classList.toggle('dimmed', !isSelected && !isUp && !isDown);
  });

  drawEdges(slug, activeFilter);
  renderDetail(slug);
  if (window.innerWidth <= 768) {
    document.getElementById('detail-panel').classList.add('open');
  }
}

function drawEdges(slug, filter) {
  const svg = document.getElementById('edge-svg');
  // Remove old paths
  svg.querySelectorAll('path').forEach(p => p.remove());
  if (!slug) return;

  const selectedSector = DATA.sectors.find(s => s.slug === slug);
  if (!selectedSector) return;
  const selectedName = selectedSector.name;

  const panel = document.getElementById('stack-panel');
  const panelRect = panel.getBoundingClientRect();

  let edges = DATA.edges.filter(e => e.from === selectedName || e.to === selectedName);
  if (filter === 'Y') edges = edges.filter(e => e.chokepoint === 'Y');
  else if (filter !== 'all') edges = edges.filter(e => e.flow === filter);

  edges.forEach(edge => {
    const fromSlug = nameToSlug(edge.from);
    const toSlug = nameToSlug(edge.to);
    const fromCard = document.querySelector(`.sector-card[data-slug="${fromSlug}"]`);
    const toCard = document.querySelector(`.sector-card[data-slug="${toSlug}"]`);
    if (!fromCard || !toCard) return;

    const fr = fromCard.getBoundingClientRect();
    const tr = toCard.getBoundingClientRect();
    const scrollTop = panel.scrollTop;

    const sx = fr.right - panelRect.left;
    const sy = fr.top + fr.height / 2 - panelRect.top + scrollTop;
    const tx = tr.left - panelRect.left;
    const ty = tr.top + tr.height / 2 - panelRect.top + scrollTop;

    // If same-row (similar y), offset vertically to avoid collision
    const sameRow = Math.abs(sy - ty) < 40;
    let cx1, cy1, cx2, cy2;
    if (sameRow) {
      const mid = (sx + tx) / 2;
      cx1 = sx + (tx - sx) * 0.3;
      cy1 = sy - 40;
      cx2 = tx - (tx - sx) * 0.3;
      cy2 = ty - 40;
    } else {
      cx1 = sx + Math.abs(tx - sx) * 0.5;
      cy1 = sy;
      cx2 = tx - Math.abs(tx - sx) * 0.3;
      cy2 = ty;
    }

    let stroke, marker;
    if (edge.chokepoint === 'Y') {
      stroke = '#d4a017'; marker = 'url(#arrow-amber)';
    } else if (edge.from === selectedName) {
      stroke = '#58a6ff'; marker = 'url(#arrow-blue)';
    } else {
      stroke = '#3fb950'; marker = 'url(#arrow-green)';
    }
    const sw = edge.chokepoint === 'Y' ? 2.5 : 1.5;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${sx} ${sy} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${tx} ${ty}`);
    path.setAttribute('stroke', stroke);
    path.setAttribute('stroke-width', sw);
    path.setAttribute('fill', 'none');
    path.setAttribute('marker-end', marker);
    path.setAttribute('opacity', '0.8');
    svg.appendChild(path);
  });
}

function renderDetail(slug) {
  const sector = DATA.sectors.find(s => s.slug === slug);
  if (!sector) return;

  let outbound = DATA.edges.filter(e => e.from === sector.name);
  let inbound = DATA.edges.filter(e => e.to === sector.name);

  if (activeFilter === 'Y') {
    outbound = outbound.filter(e => e.chokepoint === 'Y');
    inbound = inbound.filter(e => e.chokepoint === 'Y');
  } else if (activeFilter !== 'all') {
    outbound = outbound.filter(e => e.flow === activeFilter);
    inbound = inbound.filter(e => e.flow === activeFilter);
  }

  const allOut = DATA.edges.filter(e => e.from === sector.name);
  const allIn = DATA.edges.filter(e => e.to === sector.name);

  const tierRows = sector.tiers.map(t => `
    <tr class="tier-row choke-${t.chokepoint.toLowerCase()}"
        data-processes="${escHtml(t.processes)}"
        data-products="${escHtml(t.key_products)}">
      <td class="tier-name">${t.tier}</td>
      <td>${chokeBadge(t.chokepoint)}</td>
      <td class="tier-fn">${truncate(t.function, 60)}</td>
      <td class="tier-proc">${truncate(t.processes, 70)}</td>
    </tr>`).join('');

  const edgeCard = (e, dir) => {
    const other = dir === 'out' ? e.to : e.from;
    const otherSlug = nameToSlug(other);
    const flowCls = 'flow-' + e.flow.toLowerCase();
    return `<div class="edge-card">
      <span class="flow-badge ${flowCls}">${e.flow}</span>
      <span class="edge-sector-chip" data-slug="${otherSlug}">${other}</span>
      <span class="edge-product">${truncate(e.product, 80)}</span>
      ${e.chokepoint === 'Y' ? '<span class="choke-badge-y">⬥Y</span>' : ''}
    </div>`;
  };

  const outHtml = outbound.map(e => edgeCard(e, 'out')).join('') || '<p style="color:var(--muted);font-size:12px;padding:8px 0">None matching filter</p>';
  const inHtml = inbound.map(e => edgeCard(e, 'in')).join('') || '<p style="color:var(--muted);font-size:12px;padding:8px 0">None matching filter</p>';

  const dimInfo = DIM_INFO[sector.dimension];
  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-header">
      <h2>${sector.name}</h2>
      <span class="dim-badge ${dimInfo.cls}">${sector.dimension}</span>
    </div>
    <section class="detail-section">
      <div class="section-title">Supply Chain Tiers (${sector.tiers.length})</div>
      <table class="tier-table">
        <thead><tr><th>Tier</th><th>Choke</th><th>Function</th><th>Processes (excerpt)</th></tr></thead>
        <tbody>${tierRows}</tbody>
      </table>
      <p class="hint">Hover any row for full processes &amp; key products</p>
    </section>
    <section class="detail-section">
      <div class="section-title">→ Outbound (${allOut.length} edges, showing ${outbound.length})</div>
      <div class="edge-list">${outHtml}</div>
    </section>
    <section class="detail-section">
      <div class="section-title">← Inbound (${allIn.length} edges, showing ${inbound.length})</div>
      <div class="edge-list">${inHtml}</div>
    </section>`;

  // Wire tier tooltips
  document.querySelectorAll('.tier-row').forEach(row => {
    row.addEventListener('mouseenter', () => showTooltip(row.dataset.processes, row.dataset.products));
    row.addEventListener('mouseleave', hideTooltip);
  });
  // Wire sector chips
  document.querySelectorAll('.edge-sector-chip').forEach(chip => {
    chip.addEventListener('click', () => selectSector(chip.dataset.slug));
  });
}

function showTooltip(processes, products) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML = `<b>Processes:</b><br>${processes}<hr><b>Key Products / Materials:</b><br>${products}`;
  tt.style.display = 'block';
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }
document.addEventListener('mousemove', e => {
  const tt = document.getElementById('tooltip');
  if (tt.style.display === 'block') {
    tt.style.left = Math.min(e.clientX + 14, window.innerWidth - 420) + 'px';
    tt.style.top = Math.min(e.clientY + 14, window.innerHeight - 200) + 'px';
  }
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (currentSelected) {
      drawEdges(currentSelected, activeFilter);
      renderDetail(currentSelected);
    }
  });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  currentSelected = null;
  document.querySelectorAll('.sector-card').forEach(c => {
    c.classList.remove('selected','upstream','downstream','dimmed');
  });
  const svg = document.getElementById('edge-svg');
  svg.querySelectorAll('path').forEach(p => p.remove());
  document.getElementById('detail-panel').innerHTML = '<div class="detail-empty">Select a sector to explore its supply chain tiers and ecosystem connections.</div>';
  if (window.innerWidth <= 768) document.getElementById('detail-panel').classList.remove('open');
});

window.addEventListener('resize', () => {
  if (currentSelected) drawEdges(currentSelected, activeFilter);
});

document.getElementById('stack-panel').addEventListener('scroll', () => {
  if (currentSelected) drawEdges(currentSelected, activeFilter);
});

// Init
renderStack();
</script>
